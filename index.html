    const coins = [

    // فلاتر الوقت الجديدة
    const periods = [
      { id: '15m', label: '15د', interval: '1m', limit: 100 },

    ];

    const calcPeriods = [
      { id: '1h', label: 'ساعة', hours: 1 },
      { id: '4h', label: '4 ساعات', hours: 4 },

    ];

    // ========== دوال الحساب ==========
    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = [];
      const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return [];
      const result = [null];
      for (let i = 1; i < data.length; i++) {
        if (i < period) { result.push(null); continue; }
        let gains = 0, losses = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const change = data[j].close - data[j-1].close;
          if (change > 0) gains += change; else losses -= change;
        }
        result.push(losses === 0 ? 100 : 100 - (100 / (1 + (gains/period) / (losses/period))));
      }
      return result;
    }

    function calcMACD(data, fast, slow, signal) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);
      const macdLine = emaFast.map((v, i) => (v && emaSlow[i]) ? v - emaSlow[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calcEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => (v && signalLine[i]) ? v - signalLine[i] : null);
      return { macdLine, signalLine, histogram };
    }

    function calcBollinger(data, period, deviation) {
      const sma = data.map((d, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);
      const upper = [], lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + deviation * std); lower.push(sma[i] - deviation * std);
      }
      return { sma, upper, lower };
    }

    function calcVWAP(data) {
      let cumVol = 0, cumVolPrice = 0;
      return data.map(d => { cumVol += d.volume || 1; cumVolPrice += ((d.high + d.low + d.close) / 3) * (d.volume || 1); return cumVol > 0 ? cumVolPrice / cumVol : null; });
    }

    function calcStochastic(data, kPeriod, dPeriod) {
      const k = data.map((d, i) => {
        if (i < kPeriod - 1) return null;
        const slice = data.slice(i - kPeriod + 1, i + 1);
        const high = Math.max(...slice.map(x => x.high)); const low = Math.min(...slice.map(x => x.low));
        return high === low ? 50 : ((d.close - low) / (high - low)) * 100;
      });
      const dV = k.map((v, i) => { if (i < kPeriod + dPeriod - 2) return null; const slice = k.slice(i - dPeriod + 1, i + 1).filter(x => x !== null); return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null; });
      return { k, d: dV };
    }

    function calcATR(data, period) {
      return data.map((d, i) => { if (i < period) return null; let sum = 0; for (let j = i - period + 1; j <= i; j++) { const tr = j === 0 ? d.high - d.low : Math.max(data[j].high - data[j].low, Math.abs(data[j].high - data[j-1].close), Math.abs(data[j].low - data[j-1].close)); sum += tr; } return sum / period; });
    }

    function calcFibonacci(data) {
      if (data.length < 10) return [];
      const high = Math.max(...data.map(d => d.high));
      const low = Math.min(...data.map(d => d.low));
      const diff = high - low;
      return [
        { level: 0, value: high, label: '0%' },
        { level: 0.236, value: high - diff * 0.236, label: '23.6%' },
        { level: 0.382, value: high - diff * 0.382, label: '38.2%' },
        { level: 0.5, value: high - diff * 0.5, label: '50%' },
        { level: 0.618, value: high - diff * 0.618, label: '61.8%' },
        { level: 1, value: low, label: '100%' }
      ];
    }

    function calcSupportResistance(data) {
      if (data.length < 20) return { support: null, resistance: null };
      const recent = data.slice(-50);
      const lows = recent.map(d => d.low).sort((a, b) => a - b);
      const highs = recent.map(d => d.high).sort((a, b) => b - a);
      return {
        support: lows[Math.floor(lows.length * 0.1)],
        resistance: highs[Math.floor(highs.length * 0.1)]
      };
    }

    // ========== ML: اكتشاف الأنماط ==========
    function detectPatterns(data) {
      if (data.length < 5) return [];
      const patterns = [];
      const last = data.length - 1;
      
      // Hammer (مطرقة) - انعكاس صعودي
      const c = data[last];
      const body = Math.abs(c.close - c.open);
      const lowerWick = Math.min(c.open, c.close) - c.low;
      const upperWick = c.high - Math.max(c.open, c.close);
      if (lowerWick > body * 2 && upperWick < body * 0.5) {
        patterns.push({ name: 'مطرقة 🔨', type: 'bullish', confidence: 75, description: 'انعكاس صعودي محتمل' });
      }
      
      // Doji (دوجي) - تردد
      if (body < (c.high - c.low) * 0.1) {
        patterns.push({ name: 'دوجي ⭐', type: 'neutral', confidence: 60, description: 'تردد في السوق' });
      }
      
      // Engulfing (ابتلاع)
      if (data.length >= 2) {
        const prev = data[last - 1];
        // Bullish Engulfing
        if (prev.close < prev.open && c.close > c.open && c.open < prev.close && c.close > prev.open) {
          patterns.push({ name: 'ابتلاع صعودي 🟢', type: 'bullish', confidence: 80, description: 'إشارة شراء قوية' });
        }
        // Bearish Engulfing
        if (prev.close > prev.open && c.close < c.open && c.open > prev.close && c.close < prev.open) {
          patterns.push({ name: 'ابتلاع هبوطي 🔴', type: 'bearish', confidence: 80, description: 'إشارة بيع قوية' });
        }
      }
      
      // Three White Soldiers (ثلاث جنود بيض)
      if (data.length >= 3) {
        const c1 = data[last - 2], c2 = data[last - 1], c3 = data[last];
        if (c1.close > c1.open && c2.close > c2.open && c3.close > c3.open &&
            c2.close > c1.close && c3.close > c2.close) {
          patterns.push({ name: 'ثلاث جنود 🎖️', type: 'bullish', confidence: 85, description: 'اتجاه صعودي قوي' });
        }
      }
      
      // Morning Star (نجمة الصباح)
      if (data.length >= 3) {
        const c1 = data[last - 2], c2 = data[last - 1], c3 = data[last];
        if (c1.close < c1.open && Math.abs(c2.close - c2.open) < (c1.high - c1.low) * 0.3 && c3.close > c3.open) {
          patterns.push({ name: 'نجمة الصباح 🌅', type: 'bullish', confidence: 78, description: 'انعكاس صعودي' });
        }
      }
      
      return patterns;
    }

    // ========== ML: توقع الاتجاه ==========
    function predictTrend(data, indicators) {
      if (data.length < 20) return { direction: 'neutral', probability: 50, timeframe: '4 ساعات' };
      
      let bullishScore = 0, bearishScore = 0;
      const s = toolSettings;
      
      // تحليل EMA
      if (s.ema.enabled && indicators.emaData) {
        const ema20 = indicators.emaData[20]?.[data.length - 1];
        const ema50 = indicators.emaData[50]?.[data.length - 1];
        if (ema20 && ema50) {
          if (currentPrice > ema20 && ema20 > ema50) bullishScore += 15;
          else if (currentPrice < ema20 && ema20 < ema50) bearishScore += 15;
        }
      }
      
      // تحليل RSI
      if (s.rsi.enabled && indicators.rsi) {
        if (indicators.rsi < 30) bullishScore += 20;
        else if (indicators.rsi > 70) bearishScore += 20;
        else if (indicators.rsi < 50) bearishScore += 5;
        else bullishScore += 5;
      }
      
      // تحليل MACD
      if (s.macd.enabled && indicators.macdHist !== null) {
        if (indicators.macdHist > 0) bullishScore += 15;
        else bearishScore += 15;
        
        // تقاطع MACD
        const hist = indicators.macdData?.histogram;
        if (hist && hist.length >= 2) {
          const prevHist = hist[hist.length - 2];
          if (prevHist < 0 && indicators.macdHist > 0) bullishScore += 10; // تقاطع صعودي
          if (prevHist > 0 && indicators.macdHist < 0) bearishScore += 10; // تقاطع هبوطي
        }
      }
      
      // تحليل Bollinger
      if (s.bollinger.enabled && indicators.bbLower && indicators.bbUpper) {
        if (currentPrice < indicators.bbLower) bullishScore += 10;
        else if (currentPrice > indicators.bbUpper) bearishScore += 10;
      }
      
      // تحليل الفوليوم
      const avgVolume = data.slice(-20).reduce((a, b) => a + b.volume, 0) / 20;
      const lastVolume = data[data.length - 1].volume;
      if (lastVolume > avgVolume * 1.5) {
        if (data[data.length - 1].close > data[data.length - 1].open) bullishScore += 10;
        else bearishScore += 10;
      }
      
      // تحليل Fear & Greed
      if (fearGreedData) {
        if (fearGreedData.value < 25) bullishScore += 10;
        else if (fearGreedData.value > 75) bearishScore += 10;
      }
      
      // حساب الاحتمالية
      const total = bullishScore + bearishScore;
      let probability, direction;
      
      if (bullishScore > bearishScore) {
        direction = 'bullish';
        probability = Math.min(90, 50 + (bullishScore - bearishScore) * 2);
      } else if (bearishScore > bullishScore) {
        direction = 'bearish';
        probability = Math.min(90, 50 + (bearishScore - bullishScore) * 2);
      } else {
        direction = 'neutral';
        probability = 50;
      }
      
      return { direction, probability: Math.round(probability), timeframe: '4 ساعات' };
    }

    // ========== إشارات الدخول الذكية ==========
    function getSmartSignal(indicators, patterns, trend) {
      let score = 0;
      const signals = [];
      const s = toolSettings;
      
      // RSI
      if (s.rsi.enabled && indicators.rsi) {
        if (indicators.rsi < s.rsi.oversold) { score += 25; signals.push('RSI مشبع بيع'); }
        else if (indicators.rsi > s.rsi.overbought) { score -= 25; signals.push('RSI مشبع شراء'); }
      }
      
      // MACD تقاطع
      if (s.macd.enabled && indicators.macdData) {
        const hist = indicators.macdData.histogram;
        if (hist && hist.length >= 2) {
          if (hist[hist.length - 2] < 0 && hist[hist.length - 1] > 0) { score += 20; signals.push('MACD تقاطع صعودي'); }
          if (hist[hist.length - 2] > 0 && hist[hist.length - 1] < 0) { score -= 20; signals.push('MACD تقاطع هبوطي'); }
        }
      }
      
      // EMA
      if (s.ema.enabled && indicators.emaData) {
        let above = 0, total = 0;
        Object.entries(s.ema.periods).forEach(([p, en]) => { 
          if (en && indicators.emaData[p]) { 
            total++; 
            if (currentPrice > indicators.emaData[p][chartData.length - 1]) above++; 
          } 
        });
        if (total > 0) {
          if (above / total >= 0.7) { score += 15; signals.push('فوق المتوسطات'); }
          else if (above / total <= 0.3) { score -= 15; signals.push('تحت المتوسطات'); }
        }
      }
      
      // Bollinger
      if (s.bollinger.enabled) {
        if (currentPrice < indicators.bbLower) { score += 15; signals.push('تحت بولنجر السفلي'); }
        if (currentPrice > indicators.bbUpper) { score -= 15; signals.push('فوق بولنجر العلوي'); }
      }
      
      // أنماط الشموع
      patterns.forEach(p => {
        if (p.type === 'bullish') score += p.confidence * 0.2;
        if (p.type === 'bearish') score -= p.confidence * 0.2;
      });
      
      // Fear & Greed
      if (fearGreedData) {
        if (fearGreedData.value < 25) { score += 10; signals.push('خوف شديد'); }
        if (fearGreedData.value > 75) { score -= 10; signals.push('طمع شديد'); }
      }
      
      // تحديد نوع الإشارة
      let signalType, signalEmoji, signalColor, signalText;
      if (score >= 50) {
        signalType = 'gold';
        signalEmoji = '🏆';
        signalColor = 'from-yellow-500 to-amber-600';
        signalText = 'إشارة ذهبية - ادخل الآن!';
      } else if (score >= 25) {
        signalType = 'silver';
        signalEmoji = '🥈';
        signalColor = 'from-gray-400 to-gray-500';
        signalText = 'إشارة فضية - فرصة جيدة';
      } else if (score >= 0) {
        signalType = 'neutral';
        signalEmoji = '⏳';
        signalColor = 'from-gray-600 to-gray-700';
        signalText = 'انتظر - لا إشارة واضحة';
      } else if (score >= -25) {
        signalType = 'caution';
        signalEmoji = '⚠️';
        signalColor = 'from-orange-500 to-orange-600';
        signalText = 'حذر - راقب السوق';
      } else {
        signalType = 'danger';
        signalEmoji = '🛑';
        signalColor = 'from-red-500 to-red-600';
        signalText = 'ابتعد - إشارة سلبية';
      }
      
      return { signalType, signalEmoji, signalColor, signalText, score, signals };
    }

    // ========== حاسبة المخاطر ==========
    function calculateRisk() {
      const atr = indicators.atr || currentPrice * 0.02;
      const stopLoss = currentPrice - atr * 2;
      const target1 = currentPrice + atr * 2;
      const target2 = currentPrice + atr * 4;
      
      const riskAmount = riskCapital * (riskPercent / 100);
      const stopDistance = currentPrice - stopLoss;
      const positionSize = stopDistance > 0 ? riskAmount / stopDistance : 0;
      const positionValue = positionSize * currentPrice;
      
      const potentialLoss = riskAmount;
      const potentialProfit1 = positionSize * (target1 - currentPrice);
      const potentialProfit2 = positionSize * (target2 - currentPrice);
      
      const riskReward1 = potentialProfit1 / potentialLoss;
      const riskReward2 = potentialProfit2 / potentialLoss;
      
      return {
        stopLoss, target1, target2,
        riskAmount, positionSize, positionValue,
        potentialLoss, potentialProfit1, potentialProfit2,
        riskReward1, riskReward2
      };
    }

    function formatPrice(p) { if (!p || isNaN(p)) return '-'; return p >= 1000 ? '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '$' + p.toFixed(4); }
    function formatUSD(p) { return !p || isNaN(p) ? '-' : '$' + p.toFixed(2); }

    function calculateIndicators() {
      if (!chartData.length) return;
      const last = chartData.length - 1;
      const s = toolSettings;
      const emaData = {};
      [9, 20, 50, 100, 200].forEach(p => { if (s.ema.periods[p]) emaData[p] = calcEMA(chartData, p); });
      const rsi = calcRSI(chartData, s.rsi.period);
      const macd = calcMACD(chartData, s.macd.fast, s.macd.slow, s.macd.signal);
      const bollinger = calcBollinger(chartData, s.bollinger.period, s.bollinger.deviation);
      const vwap = calcVWAP(chartData);
      const stoch = calcStochastic(chartData, s.stochastic.kPeriod, s.stochastic.dPeriod);
      const atr = calcATR(chartData, s.atr.period);
      const fib = calcFibonacci(chartData);
      const sr = calcSupportResistance(chartData);
      
      indicators = { 
        emaData, rsi: rsi[last], rsiData: rsi, 
        macdHist: macd.histogram[last], macdData: macd, 
        bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bbSma: bollinger.sma[last], bollingerData: bollinger, 
        vwap: vwap[last], vwapData: vwap, 
        stochK: stoch.k[last], stochD: stoch.d[last], stochData: stoch, 
        atr: atr[last], atrPercent: atr[last] ? (atr[last] / currentPrice) * 100 : 0, atrData: atr,
        fibonacci: fib, supportResistance: sr
      };
    }

    function doSmartAnalysis() {
      let bullish = 0, bearish = 0; const analysis = []; const comparison = []; const s = toolSettings;
      if (s.ema.enabled && indicators.emaData) {
        let above = 0, total = 0;
        Object.entries(s.ema.periods).forEach(([p, en]) => { if (en && indicators.emaData[p]) { total++; if (currentPrice > indicators.emaData[p][chartData.length - 1]) above++; } });
        if (total > 0) { const r = above / total; if (r >= 0.6) { bullish += 2; analysis.push(`EMA: ${above}/${total}`); } else { bearish += 2; analysis.push(`EMA: ${above}/${total}`); } comparison.push({ tool: 'EMA', result: `${above}/${total}`, good: r >= 0.5 }); }
      }
      if (s.rsi.enabled && indicators.rsi) {
        if (indicators.rsi < s.rsi.oversold) { bullish += 2; analysis.push(`RSI: مشبع بيع`); }
        else if (indicators.rsi > s.rsi.overbought) { bearish += 2; analysis.push(`RSI: مشبع شراء`); }
        comparison.push({ tool: 'RSI', result: indicators.rsi.toFixed(0), good: indicators.rsi < s.rsi.overbought });
      }
      if (s.macd.enabled && indicators.macdHist !== null) {
        if (indicators.macdHist > 0) { bullish += 2; analysis.push('MACD: إيجابي'); } else { bearish += 2; analysis.push('MACD: سلبي'); }
        comparison.push({ tool: 'MACD', result: indicators.macdHist > 0 ? '▲' : '▼', good: indicators.macdHist > 0 });
      }
      if (s.bollinger.enabled && indicators.bbUpper) {
        if (currentPrice < indicators.bbLower) bullish += 1.5; else if (currentPrice > indicators.bbUpper) bearish += 1.5;
        comparison.push({ tool: 'بولنجر', result: currentPrice < indicators.bbLower ? 'شراء' : currentPrice > indicators.bbUpper ? 'بيع' : 'محايد', good: currentPrice <= indicators.bbUpper });
      }
      if (fearGreedData) { if (fearGreedData.value < 25) { bullish += 1; } else if (fearGreedData.value > 75) { bearish += 1; } }
      
      const score = bullish - bearish;
      let decision, emoji, bgColor;
      if (score >= 4) { decision = 'شراء قوي'; emoji = '🚀'; bgColor = 'from-green-600 to-emerald-700'; }
      else if (score >= 2) { decision = 'شراء'; emoji = '🟢'; bgColor = 'from-green-700 to-green-800'; }
      else if (score >= -1) { decision = 'انتظار'; emoji = '🟡'; bgColor = 'from-yellow-600 to-amber-700'; }
      else if (score >= -3) { decision = 'تراجع'; emoji = '🟠'; bgColor = 'from-orange-600 to-orange-700'; }
      else { decision = 'ابتعد'; emoji = '🔴'; bgColor = 'from-red-600 to-red-700'; }
      
      const confidence = Math.min(95, 50 + Math.abs(score) * 8);
      return { decision, emoji, bgColor, confidence, analysis: analysis.join(' | '), comparison, bullish, bearish, score };
    }

          const colors = { 9: '#f97316', 20: '#3b82f6', 50: '#22c55e', 100: '#a855f7', 200: '#eab308' }; 
          Object.entries(s.ema.periods).forEach(([p, en]) => { 
            if (en && indicators.emaData[p]) mainChart.addLineSeries({ color: colors[p], lineWidth: 2 }).setData(indicators.emaData[p].map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); 
          }); 
        }
        
        // Bollinger
        if (s.bollinger.enabled && indicators.bollingerData) { 
          mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.upper.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); 
          mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.lower.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); 
        }
        
        // VWAP
        if (s.vwap.enabled && indicators.vwapData) {
          mainChart.addLineSeries({ color: '#06b6d4', lineWidth: 2, lineStyle: 2 }).setData(indicators.vwapData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
        }
        
        // Support/Resistance
        if (s.support.enabled && indicators.supportResistance) {
          const sr = indicators.supportResistance;
          if (sr.support) mainChart.addLineSeries({ color: '#22c55e', lineWidth: 2, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: sr.support })));
          if (sr.resistance) mainChart.addLineSeries({ color: '#ef4444', lineWidth: 2, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: sr.resistance })));
        }
        
        mainChart.timeScale().fitContent();
      }
      
      // RSI
      if (s.rsi.enabled && indicators.rsiData) { 
        const c = document.getElementById('rsiChart'); 
        if (c) { 
          if (rsiChart) { rsiChart.remove(); rsiChart = null; } 
          rsiChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 80, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); 
          rsiChart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 }).setData(indicators.rsiData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); 
          rsiChart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: s.rsi.overbought }))); 
          rsiChart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: s.rsi.oversold }))); 
          rsiChart.timeScale().fitContent(); 
        } 
      }
      
      // MACD
      if (s.macd.enabled && indicators.macdData) { 
        const c = document.getElementById('macdChart'); 
        if (c) { 
          if (macdChart) { macdChart.remove(); macdChart = null; } 
          macdChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 80, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); 
          macdChart.addHistogramSeries({ color: '#22c55e' }).setData(indicators.macdData.histogram.map((v, i) => v !== null ? { time: chartData[i].time, value: v, color: v >= 0 ? '#22c55e' : '#ef4444' } : null).filter(Boolean)); 
          macdChart.timeScale().fitContent(); 
        } 
      }
    }

    function createAIChart() {
      if (!chartData.length) return;
      const c = document.getElementById('aiChart');
      if (!c) return;
      if (aiChart) { aiChart.remove(); aiChart = null; }
      
      const risk = calculateRisk();
      
      aiChart = LightweightCharts.createChart(c, { 
        width: c.clientWidth, height: 200, 
        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, 
        grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
        rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
        timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true },
        handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false }
      });
      
      aiChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderUpColor: '#22c55e', borderDownColor: '#ef4444', wickUpColor: '#22c55e', wickDownColor: '#ef4444' }).setData(chartData);
      
      // خطوط الدخول والوقف والأهداف
      aiChart.addLineSeries({ color: '#3b82f6', lineWidth: 2, lineStyle: 0 }).setData(chartData.slice(-20).map(d => ({ time: d.time, value: currentPrice })));
      aiChart.addLineSeries({ color: '#ef4444', lineWidth: 2, lineStyle: 2 }).setData(chartData.slice(-20).map(d => ({ time: d.time, value: risk.stopLoss })));
      aiChart.addLineSeries({ color: '#22c55e', lineWidth: 2, lineStyle: 2 }).setData(chartData.slice(-20).map(d => ({ time: d.time, value: risk.target1 })));
      aiChart.addLineSeries({ color: '#10b981', lineWidth: 2, lineStyle: 2 }).setData(chartData.slice(-20).map(d => ({ time: d.time, value: risk.target2 })));
      
      aiChart.timeScale().fitContent();
    }

    // ========== الأحداث ==========
    async function fetchData() {
      const period = periods.find(p => p.id === currentPeriod);
      if (!period) return;
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`);
        const json = await res.json();
        chartData = json.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
        if (chartData.length > 0) { currentPrice = chartData[chartData.length - 1].close; priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100; }
        calculateIndicators(); render();
      } catch (e) { console.error(e); }
    }

    async function loadFearGreed() {
      try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        const data = await res.json();
        if (data?.data?.[0]) { const fg = data.data[0]; fearGreedData = { value: parseInt(fg.value), classification_ar: { 'Extreme Fear': 'خوف شديد', 'Fear': 'خوف', 'Neutral': 'محايد', 'Greed': 'طمع', 'Extreme Greed': 'طمع شديد' }[fg.value_classification] || fg.value_classification }; }
      } catch (e) { console.error(e); }
    }

    async function loadNews() {
      newsLoading = true; if (currentPage === 'news') render();
      const fallback = [
        { title: 'الفيدرالي يثبت الفائدة', sentiment: 'positive', category: 'regulation', icon: '🏛️', source: 'Fed', timeAgo: 'منذ 2س' },
        { title: 'SEC توافق على ETF', sentiment: 'positive', category: 'regulation', icon: '✅', source: 'SEC', timeAgo: 'منذ 5س' },
        { title: 'BlackRock تشتري BTC', sentiment: 'positive', category: 'adoption', icon: '🏦', source: 'Bloomberg', timeAgo: 'منذ يوم' },
      ];
      try {
        const res = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,ETH');
        const data = await res.json();
        if (data?.Data?.length > 0) {
          newsData = data.Data.slice(0, 8).map(item => {
            const t = item.title.toLowerCase();
            let sentiment = 'neutral', category = 'market', icon = '📰';
            if (t.match(/surge|rally|bull|gain|rise|approve|buy|bullish|high/)) sentiment = 'positive';
            else if (t.match(/crash|drop|bear|fall|ban|hack|fear|sell/)) sentiment = 'negative';
            if (t.match(/sec|regulation|fed|policy/)) { category = 'regulation'; icon = '⚖️'; }
            else if (t.match(/etf|blackrock|adopt/)) { category = 'adoption'; icon = '🚀'; }
            const secs = Math.floor((Date.now() - item.published_on * 1000) / 1000);
            let timeAgo = 'الآن'; if (secs >= 86400) timeAgo = 'منذ ' + Math.floor(secs / 86400) + ' ي'; else if (secs >= 3600) timeAgo = 'منذ ' + Math.floor(secs / 3600) + ' س';
            return { title: item.title, sentiment, category, icon, source: item.source_info?.name || 'News', timeAgo };
          });
        } else newsData = fallback;
      } catch (e) { newsData = fallback; }
      newsLoading = false; if (currentPage === 'news') render();
    }

    function toggleToolEnabled(tool) { toolSettings[tool].enabled = !toolSettings[tool].enabled; calculateIndicators(); render(); }
    function toggleEMAPeriod(period) { toolSettings.ema.periods[period] = !toolSettings.ema.periods[period]; calculateIndicators(); render(); }
    function updateSetting(tool, key, value) { toolSettings[tool][key] = value; calculateIndicators(); render(); }
    function toggleExpand(tool) { expandedTools[tool] = !expandedTools[tool]; render(); }
    function resetSettings() { toolSettings = { ema: { enabled: true, periods: { 9: true, 20: true, 50: true, 100: false, 200: true } }, rsi: { enabled: true, period: 14, oversold: 30, overbought: 70 }, macd: { enabled: true, fast: 12, slow: 26, signal: 9 }, bollinger: { enabled: true, period: 20, deviation: 2 }, vwap: { enabled: true }, stochastic: { enabled: false, kPeriod: 14, dPeriod: 3, oversold: 20, overbought: 80 }, adx: { enabled: false, period: 14 }, fibonacci: { enabled: true }, atr: { enabled: true, period: 14 }, support: { enabled: true } }; calculateIndicators(); render(); }
    function applyAndGoToChart() { calculateIndicators(); switchPage('analysis'); }
    function selectCoin(symbol) { currentCoin = symbol; fetchData(); }
    function selectPeriod(id) { currentPeriod = id; fetchData(); }
    function switchPage(page) { currentPage = page; render(); }
    function setNewsFilter(id) { newsFilter = id; render(); }
    function updateRiskCapital(v) { riskCapital = parseFloat(v) || 1000; render(); }
    function updateRiskPercent(v) { riskPercent = Math.min(10, Math.max(1, parseFloat(v) || 2)); render(); }

    window.selectCoin = selectCoin; window.selectPeriod = selectPeriod; window.switchPage = switchPage; window.loadNews = loadNews;
    window.setNewsFilter = setNewsFilter; window.toggleToolEnabled = toggleToolEnabled; window.toggleEMAPeriod = toggleEMAPeriod;
    window.updateSetting = updateSetting; window.toggleExpand = toggleExpand; window.resetSettings = resetSettings;
    window.applyAndGoToChart = applyAndGoToChart; window.updateRiskCapital = updateRiskCapital; window.updateRiskPercent = updateRiskPercent;

    window.addEventListener('resize', () => {
      if (mainChart) mainChart.applyOptions({ width: document.getElementById('mainChart')?.clientWidth || 0 });
      if (rsiChart) rsiChart.applyOptions({ width: document.getElementById('rsiChart')?.clientWidth || 0 });
      if (macdChart) macdChart.applyOptions({ width: document.getElementById('macdChart')?.clientWidth || 0 });
      if (aiChart) aiChart.applyOptions({ width: document.getElementById('aiChart')?.clientWidth || 0 });
    });

    fetchData(); loadFearGreed(); loadNews();
  </script>
</body>
</html>
