<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const formatPrice = (p) => {
      if (!p || isNaN(p)) return '-';
      if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return p.toFixed(p >= 1 ? 4 : 6);
    };

    const timeAgo = (date) => {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return 'الآن';
      if (seconds < 3600) return `منذ ${Math.floor(seconds / 60)} د`;
      if (seconds < 86400) return `منذ ${Math.floor(seconds / 3600)} س`;
      return `منذ ${Math.floor(seconds / 86400)} ي`;
    };

    // Technical Indicators
    const calculateEMA = (data, period) => {
      if (!data || data.length < period) return data?.map(() => null) || [];
      const result = [];
      const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    };

    const calculateSMA = (data, period) => data.map((_, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);

    const calculateRSI = (data, period = 14) => {
      if (!data || data.length < period + 1) return data?.map(() => null) || [];
      const result = [null];
      const gains = [], losses = [];
      for (let i = 1; i < data.length; i++) {
        const change = data[i].close - data[i - 1].close;
        gains.push(change > 0 ? change : 0);
        losses.push(change < 0 ? Math.abs(change) : 0);
      }
      for (let i = 0; i < gains.length; i++) {
        if (i < period - 1) result.push(null);
        else {
          const avgGain = gains.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          const avgLoss = losses.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          result.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
        }
      }
      return result;
    };

    const calculateMACD = (data, fast = 12, slow = 26, signal = 9) => {
      const emaFast = calculateEMA(data, fast);
      const emaSlow = calculateEMA(data, slow);
      const macdLine = emaFast.map((v, i) => v && emaSlow[i] ? v - emaSlow[i] : null);
      const macdData = data.map((_, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calculateEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => v && signalLine[i] ? v - signalLine[i] : null);
      return { macdLine, signalLine, histogram };
    };

    const calculateBollingerBands = (data, period = 20, stdDev = 2) => {
      const sma = calculateSMA(data, period);
      const upper = [], lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + stdDev * std);
        lower.push(sma[i] - stdDev * std);
      }
      return { sma, upper, lower };
    };

    const calculateVWAP = (data) => {
      let cumVol = 0, cumVolPrice = 0;
      return data.map(d => { cumVol += d.volume || 1; cumVolPrice += ((d.high + d.low + d.close) / 3) * (d.volume || 1); return cumVol > 0 ? cumVolPrice / cumVol : null; });
    };

    const calculateStochastic = (data, kPeriod = 14, dPeriod = 3) => {
      const kValues = data.map((_, i) => {
        if (i < kPeriod - 1) return null;
        const slice = data.slice(i - kPeriod + 1, i + 1);
        const high = Math.max(...slice.map(d => d.high));
        const low = Math.min(...slice.map(d => d.low));
        return high === low ? 50 : ((data[i].close - low) / (high - low)) * 100;
      });
      const dValues = kValues.map((_, i) => {
        if (i < kPeriod + dPeriod - 2) return null;
        const slice = kValues.slice(i - dPeriod + 1, i + 1).filter(v => v !== null);
        return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
      });
      return { k: kValues, d: dValues };
    };

    const calculateADX = (data, period = 14) => {
      if (data.length < period + 1) return data.map(() => null);
      const tr = [], plusDM = [], minusDM = [];
      for (let i = 1; i < data.length; i++) {
        tr.push(Math.max(data[i].high - data[i].low, Math.abs(data[i].high - data[i-1].close), Math.abs(data[i].low - data[i-1].close)));
        const highDiff = data[i].high - data[i-1].high;
        const lowDiff = data[i-1].low - data[i].low;
        plusDM.push(highDiff > lowDiff && highDiff > 0 ? highDiff : 0);
        minusDM.push(lowDiff > highDiff && lowDiff > 0 ? lowDiff : 0);
      }
      const smoothedTR = [], smoothedPlusDM = [], smoothedMinusDM = [];
      for (let i = 0; i < tr.length; i++) {
        if (i < period - 1) { smoothedTR.push(null); smoothedPlusDM.push(null); smoothedMinusDM.push(null); }
        else if (i === period - 1) { smoothedTR.push(tr.slice(0, period).reduce((a, b) => a + b, 0)); smoothedPlusDM.push(plusDM.slice(0, period).reduce((a, b) => a + b, 0)); smoothedMinusDM.push(minusDM.slice(0, period).reduce((a, b) => a + b, 0)); }
        else { smoothedTR.push(smoothedTR[i-1] - smoothedTR[i-1]/period + tr[i]); smoothedPlusDM.push(smoothedPlusDM[i-1] - smoothedPlusDM[i-1]/period + plusDM[i]); smoothedMinusDM.push(smoothedMinusDM[i-1] - smoothedMinusDM[i-1]/period + minusDM[i]); }
      }
      const plusDI = smoothedTR.map((tr, i) => tr ? (smoothedPlusDM[i] / tr) * 100 : null);
      const minusDI = smoothedTR.map((tr, i) => tr ? (smoothedMinusDM[i] / tr) * 100 : null);
      const dx = plusDI.map((plus, i) => { if (!plus || !minusDI[i]) return null; const sum = plus + minusDI[i]; return sum === 0 ? 0 : (Math.abs(plus - minusDI[i]) / sum) * 100; });
      const adx = dx.map((_, i) => { if (i < period * 2 - 2) return null; const slice = dx.slice(i - period + 1, i + 1).filter(v => v !== null); return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null; });
      return [null, ...adx];
    };

    const calculateFibonacci = (data) => {
      const high = Math.max(...data.map(d => d.high));
      const low = Math.min(...data.map(d => d.low));
      const diff = high - low;
      return { level0: low, level236: low + diff * 0.236, level382: low + diff * 0.382, level50: low + diff * 0.5, level618: low + diff * 0.618, level786: low + diff * 0.786, level100: high };
    };

    const calculateATR = (data, period = 14) => {
      const tr = data.map((d, i) => i === 0 ? d.high - d.low : Math.max(d.high - d.low, Math.abs(d.high - data[i-1].close), Math.abs(d.low - data[i-1].close)));
      return tr.map((_, i) => i < period - 1 ? null : tr.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period);
    };

    const calculateSupportResistance = (data) => {
      if (data.length < 20) return { support: [], resistance: [] };
      const highs = data.map(d => d.high), lows = data.map(d => d.low);
      const support = [], resistance = [];
      for (let i = 5; i < data.length - 5; i++) {
        if (lows.slice(i - 5, i).every(l => l >= lows[i]) && lows.slice(i + 1, i + 6).every(l => l >= lows[i])) support.push(lows[i]);
        if (highs.slice(i - 5, i).every(h => h <= highs[i]) && highs.slice(i + 1, i + 6).every(h => h <= highs[i])) resistance.push(highs[i]);
      }
      return { support: [...new Set(support)].sort((a, b) => a - b).slice(-3), resistance: [...new Set(resistance)].sort((a, b) => b - a).slice(-3) };
    };

    const COINS = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿', color: '#f7931a' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ', color: '#627eea' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈', color: '#f3ba2f' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎', color: '#00ffa3' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕', color: '#00aae4' },
    ];

    const TIME_PERIODS = [
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 },
      { id: '3y', label: '3 سنوات', interval: '1w', limit: 156 },
    ];

    const TOOLS = [
      { id: 'ema', name: 'EMA', color: '#3b82f6', icon: '📈' },
      { id: 'rsi', name: 'RSI', color: '#8b5cf6', icon: '💪' },
      { id: 'macd', name: 'MACD', color: '#22c55e', icon: '🚀' },
      { id: 'bollinger', name: 'بولنجر', color: '#ec4899', icon: '📊' },
      { id: 'vwap', name: 'VWAP', color: '#f59e0b', icon: '⚖️' },
      { id: 'stochastic', name: 'Stoch', color: '#06b6d4', icon: '⚡' },
      { id: 'adx', name: 'ADX', color: '#a855f7', icon: '💎' },
      { id: 'fibonacci', name: 'فيبو', color: '#14b8a6', icon: '🔢' },
      { id: 'atr', name: 'ATR', color: '#f43f5e', icon: '📉' },
      { id: 'support', name: 'دعم', color: '#64748b', icon: '🎯' },
    ];

    const EMA_PERIODS = [9, 20, 50, 100, 200];
    const EMA_COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];

    const useLocalStorage = (key, initialValue) => {
      const [value, setValue] = useState(() => { try { return JSON.parse(localStorage.getItem(key)) || initialValue; } catch { return initialValue; } });
      useEffect(() => { localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
      return [value, setValue];
    };

    function useMarketData(symbol, period) {
      const [data, setData] = useState([]);
      const [price, setPrice] = useState(null);
      const [loading, setLoading] = useState(true);
      const [priceChange, setPriceChange] = useState(0);
      const wsRef = useRef(null);

      useEffect(() => {
        setLoading(true);
        const fetchKlines = async () => {
          try {
            const periodConfig = TIME_PERIODS.find(p => p.id === period) || TIME_PERIODS[4];
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${periodConfig.interval}&limit=${periodConfig.limit}`);
            const json = await res.json();
            const formatted = json.map(c => ({ time: c[0] / 1000, open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
            setData(formatted);
            if (formatted.length > 0) { setPrice(formatted[formatted.length - 1].close); setPriceChange(((formatted[formatted.length - 1].close - formatted[0].open) / formatted[0].open) * 100); }
            setLoading(false);
          } catch (e) { setLoading(false); }
        };
        fetchKlines();
        if (wsRef.current) wsRef.current.close();
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);
        wsRef.current = ws;
        ws.onmessage = (e) => setPrice(parseFloat(JSON.parse(e.data).p));
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [symbol, period]);

      return { data, price, loading, priceChange };
    }

    async function getAIAnalysis(coinName, price, indicators, activeTools, toolSettings, period) {
      const prompt = `أنت محلل فني خبير. المستخدم اختار أدوات معينة. قارن تحليلك مع اختياراته.
العملة: ${coinName} | السعر: $${formatPrice(price)} | الفترة: ${period}
الأدوات المختارة: ${activeTools.join(', ')}

البيانات:
${activeTools.includes('ema') ? `EMA: ${toolSettings.emaPeriods.map(p => `EMA${p}=$${formatPrice(indicators[`ema${p}`])} ${price > indicators[`ema${p}`] ? '✅' : '❌'}`).join(' | ')}` : ''}
${activeTools.includes('rsi') ? `RSI${toolSettings.rsiPeriod}: ${indicators.rsi?.toFixed(1)} ${indicators.rsi < 30 ? '🟢مشبع بيع' : indicators.rsi > 70 ? '🔴مشبع شراء' : '⚪طبيعي'}` : ''}
${activeTools.includes('macd') ? `MACD: ${indicators.macdHist > 0 ? '🟢إيجابي' : '🔴سلبي'}` : ''}
${activeTools.includes('bollinger') ? `بولنجر: ${price < indicators.bbLower ? '🟢تحت السفلي' : price > indicators.bbUpper ? '🔴فوق العلوي' : '⚪داخل'}` : ''}
${activeTools.includes('vwap') ? `VWAP: ${price > indicators.vwap ? 'فوق' : 'تحت'}` : ''}
${activeTools.includes('stochastic') ? `Stoch: K=${indicators.stochK?.toFixed(0)} ${indicators.stochK < 20 ? '🟢' : indicators.stochK > 80 ? '🔴' : '⚪'}` : ''}
${activeTools.includes('adx') ? `ADX: ${indicators.adx?.toFixed(0)} ${indicators.adx > 25 ? '💪قوي' : '😐ضعيف'}` : ''}
${activeTools.includes('atr') ? `ATR: ${indicators.atrPercent?.toFixed(2)}%` : ''}

أجب JSON فقط:
{"decision":"شراء قوي/شراء/انتظار/تراجع/ابتعد","confidence":رقم,"analysis":"تحليل مختصر","comparison":[{"tool":"اسم","your_result":"نتيجة","ai_says":"رأي AI","match":true/false}],"suggestions":"اقتراحات","entry":رقم,"stopLoss":رقم,"target1":رقم,"target2":رقم,"warnings":"تحذيرات"}`;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1500, messages: [{ role: "user", content: prompt }] })
        });
        const data = await response.json();
        const text = data.content?.map(item => item.type === "text" ? item.text : "").join("") || "";
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) return JSON.parse(jsonMatch[0]);
      } catch (error) { console.error("AI Error:", error); }
      return null;
    }

    async function fetchAndAnalyzeNews() {
      try {
        const response = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,ETH,Trading,Regulation');
        const data = await response.json();
        const news = data.Data?.slice(0, 12) || [];
        return await analyzeNewsWithAI(news);
      } catch { return []; }
    }

    async function analyzeNewsWithAI(newsItems) {
      const newsText = newsItems.map((n, i) => `${i+1}. ${n.title}`).join('\n');
      const prompt = `حلل هذه الأخبار:
${newsText}

أجب JSON:
{"news":[{"index":1,"sentiment":"positive/negative/neutral","impact":"high/medium/low","coins":["BTC"],"summary_ar":"ملخص عربي"}],"market_mood":"bullish/bearish/neutral","market_summary":"ملخص السوق"}`;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2000, messages: [{ role: "user", content: prompt }] })
        });
        const data = await response.json();
        const text = data.content?.map(item => item.type === "text" ? item.text : "").join("") || "";
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          const analysis = JSON.parse(jsonMatch[0]);
          return newsItems.map((news, i) => ({ ...news, ...analysis.news.find(n => n.index === i + 1), market_mood: analysis.market_mood, market_summary: analysis.market_summary }));
        }
      } catch {}
      return newsItems.map(n => ({ ...n, sentiment: 'neutral', impact: 'medium', coins: [], summary_ar: n.title }));
    }

    function AnalysisPage() {
      const [coin, setCoin] = useState(COINS[0]);
      const [period, setPeriod] = useState('1y');
      const [activeTools, setActiveTools] = useLocalStorage('aq_tools', ['ema', 'rsi', 'macd']);
      const [aiEnabled, setAiEnabled] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiResult, setAiResult] = useState(null);
      const [toolSettings] = useLocalStorage('aq_tool_settings', { emaPeriods: [20, 50, 200], rsiPeriod: 14 });
      const chartContainerRef = useRef(null);
      const chartRef = useRef(null);
      const seriesRef = useRef({});

      const { data, price, loading, priceChange } = useMarketData(coin.symbol, period);

      const indicators = useMemo(() => {
        if (!data || data.length < 30 || !price) return null;
        const last = data.length - 1;
        const emaData = {};
        EMA_PERIODS.forEach(p => { const ema = calculateEMA(data, p); emaData[`ema${p}`] = ema[last]; emaData[`ema${p}Data`] = ema; });
        const rsi = calculateRSI(data, toolSettings.rsiPeriod);
        const macd = calculateMACD(data);
        const bollinger = calculateBollingerBands(data);
        const vwap = calculateVWAP(data);
        const stochastic = calculateStochastic(data);
        const adx = calculateADX(data);
        const fibonacci = calculateFibonacci(data);
        const atr = calculateATR(data);
        const sr = calculateSupportResistance(data);
        return { ...emaData, rsi: rsi[last], rsiData: rsi, macd: macd.macdLine[last], macdSignal: macd.signalLine[last], macdHist: macd.histogram[last], macdData: macd, bbUpper: bollinger.upper[last], bbMiddle: bollinger.sma[last], bbLower: bollinger.lower[last], bollingerData: bollinger, vwap: vwap[last], vwapData: vwap, stochK: stochastic.k[last], stochD: stochastic.d[last], adx: adx[last], fib382: fibonacci.level382, fib50: fibonacci.level50, fib618: fibonacci.level618, fibData: fibonacci, atr: atr[last], atrPercent: (atr[last] / price) * 100, support: sr.support, resistance: sr.resistance };
      }, [data, price, toolSettings]);

      useEffect(() => {
        if (!chartContainerRef.current || !data.length) return;
        if (chartRef.current) { chartRef.current.remove(); chartRef.current = null; seriesRef.current = {}; }
        const chart = LightweightCharts.createChart(chartContainerRef.current, { width: chartContainerRef.current.clientWidth, height: 280, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, crosshair: { mode: LightweightCharts.CrosshairMode.Normal }, rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true } });
        chartRef.current = chart;
        const candleSeries = chart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderDownColor: '#ef4444', borderUpColor: '#22c55e', wickDownColor: '#ef4444', wickUpColor: '#22c55e' });
        candleSeries.setData(data);
        seriesRef.current.candles = candleSeries;
        const handleResize = () => chart.applyOptions({ width: chartContainerRef.current?.clientWidth || 0 });
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [data, coin.symbol, period]);

      useEffect(() => {
        if (!chartRef.current || !data.length || !indicators) return;
        const chart = chartRef.current;
        Object.entries(seriesRef.current).forEach(([key, series]) => { if (key !== 'candles') try { chart.removeSeries(series); } catch {} });
        seriesRef.current = { candles: seriesRef.current.candles };

        if (activeTools.includes('ema')) {
          toolSettings.emaPeriods.forEach((p, idx) => {
            const emaData = indicators[`ema${p}Data`];
            if (emaData) { const series = chart.addLineSeries({ color: EMA_COLORS[idx % EMA_COLORS.length], lineWidth: 2 }); series.setData(emaData.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean)); seriesRef.current[`ema${p}`] = series; }
          });
        }
        if (activeTools.includes('bollinger') && indicators.bollingerData) {
          const upper = chart.addLineSeries({ color: '#ec4899', lineWidth: 1 }); upper.setData(indicators.bollingerData.upper.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean)); seriesRef.current.bbUpper = upper;
          const lower = chart.addLineSeries({ color: '#ec4899', lineWidth: 1 }); lower.setData(indicators.bollingerData.lower.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean)); seriesRef.current.bbLower = lower;
        }
        if (activeTools.includes('vwap') && indicators.vwapData) { const series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 2, lineStyle: 2 }); series.setData(indicators.vwapData.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean)); seriesRef.current.vwap = series; }
        if (activeTools.includes('fibonacci') && indicators.fibData) { const fib = indicators.fibData; [fib.level236, fib.level382, fib.level50, fib.level618].forEach((level, idx) => { const line = chart.addLineSeries({ color: '#14b8a6', lineWidth: 1, lineStyle: 2 }); line.setData(data.map(d => ({ time: d.time, value: level }))); seriesRef.current[`fib${idx}`] = line; }); }
        if (activeTools.includes('support')) {
          indicators.support?.forEach((level, idx) => { const line = chart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 1 }); line.setData(data.map(d => ({ time: d.time, value: level }))); seriesRef.current[`support${idx}`] = line; });
          indicators.resistance?.forEach((level, idx) => { const line = chart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 1 }); line.setData(data.map(d => ({ time: d.time, value: level }))); seriesRef.current[`resistance${idx}`] = line; });
        }
      }, [activeTools, data, indicators, toolSettings]);

      const toggleTool = (toolId) => {
        if (toolId === 'ai') {
          if (!aiEnabled && indicators) { setAiEnabled(true); runAIAnalysis(); }
          else { setAiEnabled(false); setAiResult(null); }
        } else { setActiveTools(prev => prev.includes(toolId) ? prev.filter(t => t !== toolId) : [...prev, toolId]); }
      };

      const runAIAnalysis = async () => {
        if (!indicators || !price) return;
        setAiLoading(true);
        const periodLabel = TIME_PERIODS.find(p => p.id === period)?.label || period;
        const result = await getAIAnalysis(coin.name, price, indicators, activeTools, toolSettings, periodLabel);
        setAiResult(result);
        setAiLoading(false);
      };

      const getToolResult = (toolId) => {
        if (!indicators || !price) return null;
        switch (toolId) {
          case 'ema': const emaAbove = toolSettings.emaPeriods.filter(p => price > indicators[`ema${p}`]).length; return { value: `${emaAbove}/${toolSettings.emaPeriods.length}`, signal: emaAbove >= toolSettings.emaPeriods.length / 2 ? 'bullish' : 'bearish' };
          case 'rsi': return { value: indicators.rsi?.toFixed(0), signal: indicators.rsi < 30 ? 'bullish' : indicators.rsi > 70 ? 'bearish' : 'neutral' };
          case 'macd': return { value: indicators.macdHist > 0 ? '▲' : '▼', signal: indicators.macdHist > 0 ? 'bullish' : 'bearish' };
          case 'bollinger': return { value: price < indicators.bbLower ? '🟢' : price > indicators.bbUpper ? '🔴' : '⚪', signal: price < indicators.bbLower ? 'bullish' : price > indicators.bbUpper ? 'bearish' : 'neutral' };
          case 'vwap': return { value: price > indicators.vwap ? '⬆️' : '⬇️', signal: price < indicators.vwap ? 'bullish' : 'neutral' };
          case 'stochastic': return { value: `${indicators.stochK?.toFixed(0)}`, signal: indicators.stochK < 20 ? 'bullish' : indicators.stochK > 80 ? 'bearish' : 'neutral' };
          case 'adx': return { value: indicators.adx?.toFixed(0), signal: indicators.adx > 25 ? 'bullish' : 'neutral' };
          case 'atr': return { value: `${indicators.atrPercent?.toFixed(1)}%`, signal: indicators.atrPercent < 3 ? 'bullish' : 'neutral' };
          case 'fibonacci': return { value: '📐', signal: 'neutral' };
          case 'support': return { value: `${indicators.support?.length || 0}`, signal: 'neutral' };
          default: return null;
        }
      };

      const getSignalColor = (signal) => signal === 'bullish' ? 'bg-green-900/50 text-green-400 border-green-600' : signal === 'bearish' ? 'bg-red-900/50 text-red-400 border-red-600' : 'bg-gray-800 text-gray-400 border-gray-600';
      const periodConfig = TIME_PERIODS.find(p => p.id === period);

      return (
        <div className="pb-20">
          <div className="flex gap-2 overflow-x-auto no-scrollbar px-4 py-3 -mx-4">
            {COINS.map(c => (<button key={c.symbol} onClick={() => { setCoin(c); setAiResult(null); setAiEnabled(false); }} className={`flex items-center gap-2 px-4 py-2 rounded-xl whitespace-nowrap ${coin.symbol === c.symbol ? 'ai-gradient' : 'glass'}`}><span className="text-lg">{c.icon}</span><span className="text-sm">{c.name}</span></button>))}
          </div>

          <div className="glass rounded-xl p-3 mx-4 mb-3">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-3"><span className="text-3xl">{coin.icon}</span><div><p className="font-bold">{coin.name}</p><p className="text-xs text-gray-400">{periodConfig?.label}</p></div></div>
              <div className="text-left"><p className="text-2xl font-bold">${formatPrice(price)}</p><p className={`text-sm ${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}`}>{priceChange >= 0 ? '▲' : '▼'} {Math.abs(priceChange).toFixed(2)}%</p></div>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-3">
            {TIME_PERIODS.map(p => (<button key={p.id} onClick={() => { setPeriod(p.id); setAiResult(null); }} className={`px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${period === p.id ? 'ai-gradient' : 'glass'}`}>{p.label}</button>))}
          </div>

          <div className="glass rounded-xl p-2 mx-4 mb-3">
            {loading ? (<div className="h-[280px] flex items-center justify-center"><div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>) : (<div ref={chartContainerRef} style={{ height: 280 }}></div>)}
          </div>

          <div className="px-4 mb-3">
            <p className="text-sm text-gray-400 mb-2">🔧 أدوات التحليل:</p>
            <div className="flex flex-wrap gap-2">
              {TOOLS.map(tool => { const isActive = activeTools.includes(tool.id); const result = isActive ? getToolResult(tool.id) : null; return (<button key={tool.id} onClick={() => toggleTool(tool.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border ${isActive ? getSignalColor(result?.signal) : 'glass border-transparent opacity-50'}`}><span>{tool.icon}</span><span>{tool.name}</span>{result && <span className="text-xs opacity-75">({result.value})</span>}</button>); })}
            </div>
            <button onClick={() => toggleTool('ai')} className={`w-full mt-3 py-3 rounded-xl font-bold flex items-center justify-center gap-2 ${aiEnabled ? 'ai-gradient animate-glow' : 'ai-border'}`}><span className="text-xl">🤖</span><span>تحليل الذكاء الاصطناعي</span><span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${aiEnabled ? 'bg-white border-white' : 'border-gray-500'}`}>{aiEnabled && <span className="text-indigo-600 text-xs">✓</span>}</span></button>
          </div>

          {activeTools.length > 0 && indicators && (
            <div className="glass rounded-xl p-3 mx-4 mb-3">
              <p className="text-sm text-gray-400 mb-2">📋 ملخص تحليلك:</p>
              <div className="grid grid-cols-2 gap-2">
                {activeTools.map(toolId => { const tool = TOOLS.find(t => t.id === toolId); const result = getToolResult(toolId); if (!tool || !result) return null; return (<div key={toolId} className={`p-2 rounded-lg border ${getSignalColor(result.signal)}`}><div className="flex items-center gap-2"><span>{tool.icon}</span><span className="text-sm font-bold">{tool.name}</span></div><p className="text-lg font-bold mt-1">{result.value}</p></div>); })}
              </div>
            </div>
          )}

          {aiLoading && (<div className="ai-border p-4 mx-4 mb-3 animate-slideUp"><div className="flex items-center justify-center gap-3"><div className="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><span className="text-indigo-400">🧠 جاري التحليل...</span></div></div>)}

          {aiEnabled && aiResult && !aiLoading && (
            <div className="space-y-3 mx-4 animate-slideUp">
              <div className={`rounded-xl p-4 text-center ${aiResult.decision?.includes('شراء قوي') ? 'bg-gradient-to-r from-green-600 to-emerald-700' : aiResult.decision?.includes('شراء') ? 'bg-gradient-to-r from-green-700 to-green-800' : aiResult.decision?.includes('انتظار') ? 'bg-gradient-to-r from-yellow-600 to-amber-700' : 'bg-gradient-to-r from-red-600 to-red-700'}`}><p className="text-3xl font-bold">{aiResult.decision}</p><p className="text-lg mt-1">الثقة: {aiResult.confidence}%</p></div>
              <div className="ai-border p-4"><p className="text-sm text-gray-400 mb-2">🧠 تحليل AI:</p><p className="text-lg">{aiResult.analysis}</p></div>
              {aiResult.comparison && aiResult.comparison.length > 0 && (<div className="glass rounded-xl p-4"><p className="text-sm text-gray-400 mb-2">📊 مقارنة مع تحليلك:</p><div className="space-y-2">{aiResult.comparison.map((comp, i) => (<div key={i} className={`flex justify-between items-center p-2 rounded-lg ${comp.match ? 'bg-green-900/30' : 'bg-yellow-900/30'}`}><span className="font-bold">{comp.tool}</span><div className="flex items-center gap-2"><span className="text-sm">{comp.your_result}</span><span>{comp.match ? '✅' : '💡'}</span><span className="text-sm text-gray-400">{comp.ai_says}</span></div></div>))}</div></div>)}
              {aiResult.suggestions && (<div className="glass rounded-xl p-4"><p className="text-sm text-gray-400 mb-2">💡 اقتراحات:</p><p>{aiResult.suggestions}</p></div>)}
              {aiResult.entry && (<div className="glass rounded-xl p-4"><p className="text-sm text-gray-400 mb-2">🎯 نقاط الدخول:</p><div className="grid grid-cols-2 gap-2"><div className="bg-blue-900/30 rounded-lg p-2 text-center"><p className="text-xs text-blue-300">📍 دخول</p><p className="font-bold">${formatPrice(aiResult.entry)}</p></div><div className="bg-red-900/30 rounded-lg p-2 text-center"><p className="text-xs text-red-300">🛑 وقف</p><p className="font-bold">${formatPrice(aiResult.stopLoss)}</p></div><div className="bg-green-900/30 rounded-lg p-2 text-center"><p className="text-xs text-green-300">🎯 هدف 1</p><p className="font-bold">${formatPrice(aiResult.target1)}</p></div><div className="bg-green-900/40 rounded-lg p-2 text-center"><p className="text-xs text-green-300">🎯 هدف 2</p><p className="font-bold">${formatPrice(aiResult.target2)}</p></div></div></div>)}
              {aiResult.warnings && (<div className="bg-yellow-900/30 border border-yellow-600/50 rounded-xl p-4"><p className="text-sm text-yellow-400 mb-1">⚠️ تحذيرات:</p><p className="text-yellow-200">{aiResult.warnings}</p></div>)}
            </div>
          )}
        </div>
      );
    }

    function NewsPage() {
      const [news, setNews] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');
      const [coinFilter, setCoinFilter] = useState('all');
      const [marketMood, setMarketMood] = useState(null);
      const [marketSummary, setMarketSummary] = useState('');

      useEffect(() => { loadNews(); }, []);

      const loadNews = async () => { setLoading(true); const analyzedNews = await fetchAndAnalyzeNews(); setNews(analyzedNews); if (analyzedNews.length > 0) { setMarketMood(analyzedNews[0].market_mood); setMarketSummary(analyzedNews[0].market_summary); } setLoading(false); };

      const filteredNews = news.filter(n => { if (filter !== 'all' && n.sentiment !== filter) return false; if (coinFilter !== 'all' && !n.coins?.includes(coinFilter)) return false; return true; });

      const getSentimentStyle = (sentiment) => sentiment === 'positive' ? { bg: 'bg-green-900/30', border: 'border-green-600', dot: 'bg-green-500' } : sentiment === 'negative' ? { bg: 'bg-red-900/30', border: 'border-red-600', dot: 'bg-red-500' } : { bg: 'bg-gray-800', border: 'border-gray-600', dot: 'bg-yellow-500' };
      const getImpactStars = (impact) => impact === 'high' ? '⭐⭐⭐' : impact === 'medium' ? '⭐⭐' : '⭐';

      const positiveCount = news.filter(n => n.sentiment === 'positive').length;
      const negativeCount = news.filter(n => n.sentiment === 'negative').length;
      const neutralCount = news.filter(n => n.sentiment === 'neutral').length;

      return (
        <div className="pb-20 px-4">
          <div className="flex justify-between items-center py-3"><h2 className="text-xl font-bold">📰 أخبار السوق</h2><button onClick={loadNews} className="p-2 glass rounded-lg">{loading ? <span className="animate-spin">⏳</span> : '🔄'}</button></div>

          {marketMood && (<div className={`rounded-xl p-4 mb-4 ${marketMood === 'bullish' ? 'bg-gradient-to-r from-green-900/50 to-green-800/50' : marketMood === 'bearish' ? 'bg-gradient-to-r from-red-900/50 to-red-800/50' : 'bg-gradient-to-r from-gray-800 to-gray-700'}`}><div className="flex items-center gap-3 mb-2"><span className="text-3xl">{marketMood === 'bullish' ? '🐂' : marketMood === 'bearish' ? '🐻' : '😐'}</span><div><p className="font-bold">مزاج السوق: {marketMood === 'bullish' ? 'صعودي' : marketMood === 'bearish' ? 'هبوطي' : 'محايد'}</p><p className="text-sm text-gray-300">{marketSummary}</p></div></div><div className="flex gap-4 text-sm"><span className="text-green-400">🟢 {positiveCount}</span><span className="text-yellow-400">🟡 {neutralCount}</span><span className="text-red-400">🔴 {negativeCount}</span></div></div>)}

          <div className="flex gap-2 overflow-x-auto no-scrollbar mb-3 -mx-4 px-4">
            {[{ id: 'all', label: 'الكل', icon: '📋' }, { id: 'positive', label: 'إيجابي', icon: '🟢' }, { id: 'neutral', label: 'محايد', icon: '🟡' }, { id: 'negative', label: 'سلبي', icon: '🔴' }].map(f => (<button key={f.id} onClick={() => setFilter(f.id)} className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${filter === f.id ? 'ai-gradient' : 'glass'}`}><span>{f.icon}</span><span>{f.label}</span></button>))}
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4 -mx-4 px-4">
            <button onClick={() => setCoinFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${coinFilter === 'all' ? 'bg-gray-700' : 'glass'}`}>الكل</button>
            {['BTC', 'ETH', 'BNB', 'SOL', 'XRP'].map(c => (<button key={c} onClick={() => setCoinFilter(c)} className={`px-3 py-1 rounded-lg text-sm ${coinFilter === c ? 'bg-gray-700' : 'glass'}`}>{c}</button>))}
          </div>

          {loading ? (<div className="space-y-3">{[1, 2, 3, 4, 5].map(i => (<div key={i} className="glass rounded-xl p-4 animate-pulse"><div className="h-4 bg-gray-700 rounded w-3/4 mb-2"></div><div className="h-3 bg-gray-700 rounded w-1/2"></div></div>))}</div>) : (
            <div className="space-y-3">
              {filteredNews.map((item, i) => { const style = getSentimentStyle(item.sentiment); return (
                <div key={i} className={`rounded-xl p-4 border ${style.bg} ${style.border} animate-slideUp`} style={{ animationDelay: `${i * 50}ms` }}>
                  <div className="flex items-start gap-3">
                    <div className={`w-3 h-3 rounded-full mt-1.5 ${style.dot}`}></div>
                    <div className="flex-1">
                      <p className="font-bold text-sm mb-1">{item.summary_ar || item.title}</p>
                      <div className="flex flex-wrap gap-2 mb-2">{item.coins?.map(c => (<span key={c} className="text-xs px-2 py-0.5 bg-gray-700 rounded">{c}</span>))}<span className="text-xs">{getImpactStars(item.impact)}</span></div>
                      <div className="flex justify-between items-center text-xs text-gray-400"><span>{item.source || 'CryptoCompare'}</span><span>{timeAgo(item.published_on * 1000)}</span></div>
                    </div>
                  </div>
                  {item.url && (<a href={item.url} target="_blank" rel="noopener noreferrer" className="block mt-2 text-xs text-indigo-400 hover:underline">📖 قراءة المزيد</a>)}
                </div>
              ); })}
            </div>
          )}
          {!loading && filteredNews.length === 0 && (<div className="text-center py-10"><p className="text-4xl mb-2">📭</p><p className="text-gray-400">لا توجد أخبار بهذا الفلتر</p></div>)}
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState('analysis');
      return (
        <div className="min-h-screen bg-[#0a0a0f] text-white">
          <div className="ai-gradient p-4 sticky top-0 z-30"><div className="flex justify-between items-center"><div><h1 className="text-xl font-bold">⚡ AQ Pro</h1><p className="text-xs opacity-80">التحليل الذكي للعملات الرقمية</p></div><div className="flex items-center gap-2"><span className="text-2xl">🤖</span><span className="px-2 py-1 rounded-full text-xs bg-white/20 animate-pulse">AI</span></div></div></div>
          <div className="pt-2">{page === 'analysis' && <AnalysisPage />}{page === 'news' && <NewsPage />}</div>
          <div className="fixed bottom-0 left-0 right-0 bg-[#0a0a0f]/95 backdrop-blur-lg border-t border-white/10 px-4 py-3 z-40"><div className="flex justify-around max-w-md mx-auto"><button onClick={() => setPage('analysis')} className={`flex flex-col items-center gap-1 px-6 py-2 rounded-xl ${page === 'analysis' ? 'ai-gradient' : ''}`}><span className="text-xl">📊</span><span className="text-xs">التحليل</span></button><button onClick={() => setPage('news')} className={`flex flex-col items-center gap-1 px-6 py-2 rounded-xl ${page === 'news' ? 'ai-gradient' : ''}`}><span className="text-xl">📰</span><span className="text-xs">الأخبار</span></button></div></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
