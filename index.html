<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AQ Pro - التحليل الذكي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; font-family: system-ui; color: white; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .ai-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .ai-border { border: 2px solid transparent; background: linear-gradient(#0a0a0f, #0a0a0f) padding-box, linear-gradient(135deg, #6366f1, #8b5cf6) border-box; border-radius: 12px; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 30px rgba(99,102,241,0.7); } }
    .animate-glow { animation: glow 2s infinite; }
    input[type="number"] { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 12px; color: white; width: 100%; font-size: 18px; }
    input[type="number"]:focus { outline: none; border-color: #8b5cf6; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // State
    let currentPage = 'analysis';
    let currentCoin = 'BTCUSDT';
    let currentPeriod = '1d';
    let chartData = [];
    let currentPrice = 0;
    let priceChange = 0;
    let mainChart = null;
    let rsiChart = null;
    let macdChart = null;
    let stochChart = null;
    let activeTools = ['ema', 'rsi', 'macd'];
    let newsData = [];
    let indicators = {};
    let calcAmount = 100;
    let calcPeriod = '1d';

    const coins = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕' }
    ];

    const periods = [
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 }
    ];

    const calcPeriods = [
      { id: '1h', label: 'ساعة', hours: 1 },
      { id: '2h', label: 'ساعتين', hours: 2 },
      { id: '6h', label: '6 ساعات', hours: 6 },
      { id: '1d', label: 'يوم', hours: 24 },
      { id: '1w', label: 'أسبوع', hours: 168 }
    ];

    const tools = [
      { id: 'ema', name: 'EMA', icon: '📈' },
      { id: 'rsi', name: 'RSI', icon: '💪' },
      { id: 'macd', name: 'MACD', icon: '🚀' },
      { id: 'bollinger', name: 'بولنجر', icon: '📊' },
      { id: 'vwap', name: 'VWAP', icon: '⚖️' },
      { id: 'stochastic', name: 'Stoch', icon: '⚡' },
      { id: 'adx', name: 'ADX', icon: '💎' },
      { id: 'fibonacci', name: 'فيبو', icon: '🔢' },
      { id: 'atr', name: 'ATR', icon: '📉' },
      { id: 'support', name: 'دعم', icon: '🎯' }
    ];

    // Calculations
    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = [];
      const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return [];
      const result = [null];
      for (let i = 1; i < data.length; i++) {
        if (i < period) { result.push(null); continue; }
        let gains = 0, losses = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const change = data[j].close - data[j-1].close;
          if (change > 0) gains += change;
          else losses -= change;
        }
        const avgGain = gains / period;
        const avgLoss = losses / period;
        result.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
      }
      return result;
    }

    function calcMACD(data) {
      const ema12 = calcEMA(data, 12);
      const ema26 = calcEMA(data, 26);
      const macdLine = ema12.map((v, i) => (v && ema26[i]) ? v - ema26[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calcEMA(macdData, 9);
      const histogram = macdLine.map((v, i) => (v && signalLine[i]) ? v - signalLine[i] : null);
      return { macdLine, signalLine, histogram };
    }

    function calcBollinger(data, period) {
      const sma = data.map((d, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);
      const upper = [], lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + 2 * std);
        lower.push(sma[i] - 2 * std);
      }
      return { sma, upper, lower };
    }

    function calcVWAP(data) {
      let cumVol = 0, cumVolPrice = 0;
      return data.map(d => {
        cumVol += d.volume || 1;
        cumVolPrice += ((d.high + d.low + d.close) / 3) * (d.volume || 1);
        return cumVol > 0 ? cumVolPrice / cumVol : null;
      });
    }

    function calcStochastic(data, period) {
      const k = data.map((d, i) => {
        if (i < period - 1) return null;
        const slice = data.slice(i - period + 1, i + 1);
        const high = Math.max(...slice.map(x => x.high));
        const low = Math.min(...slice.map(x => x.low));
        return high === low ? 50 : ((d.close - low) / (high - low)) * 100;
      });
      const dValues = k.map((v, i) => {
        if (i < period + 2) return null;
        const slice = k.slice(i - 2, i + 1).filter(x => x !== null);
        return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
      });
      return { k, d: dValues };
    }

    function calcATR(data, period) {
      return data.map((d, i) => {
        if (i < period) return null;
        let sum = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const tr = j === 0 ? d.high - d.low : Math.max(data[j].high - data[j].low, Math.abs(data[j].high - data[j-1].close), Math.abs(data[j].low - data[j-1].close));
          sum += tr;
        }
        return sum / period;
      });
    }

    function formatPrice(p) {
      if (!p || isNaN(p)) return '-';
      if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return '$' + p.toFixed(4);
    }

    function formatUSD(p) {
      if (!p || isNaN(p)) return '-';
      return '$' + p.toFixed(2);
    }

    function calculateIndicators() {
      if (!chartData.length) return;
      const last = chartData.length - 1;
      const ema20 = calcEMA(chartData, 20);
      const ema50 = calcEMA(chartData, 50);
      const ema200 = calcEMA(chartData, 200);
      const rsi = calcRSI(chartData, 14);
      const macd = calcMACD(chartData);
      const bollinger = calcBollinger(chartData, 20);
      const vwap = calcVWAP(chartData);
      const stoch = calcStochastic(chartData, 14);
      const atr = calcATR(chartData, 14);

      indicators = {
        ema20: ema20[last], ema50: ema50[last], ema200: ema200[last],
        ema20Data: ema20, ema50Data: ema50, ema200Data: ema200,
        rsi: rsi[last], rsiData: rsi,
        macdHist: macd.histogram[last], macdData: macd,
        bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bollingerData: bollinger,
        vwap: vwap[last], vwapData: vwap,
        stochK: stoch.k[last], stochD: stoch.d[last], stochData: stoch,
        atr: atr[last], atrPercent: atr[last] ? (atr[last] / currentPrice) * 100 : 0
      };
    }

    function getToolResult(id) {
      if (!indicators || !currentPrice) return { value: '-', signal: 'neutral' };
      switch (id) {
        case 'ema':
          let above = 0;
          if (currentPrice > indicators.ema20) above++;
          if (currentPrice > indicators.ema50) above++;
          if (currentPrice > indicators.ema200) above++;
          return { value: above + '/3', signal: above >= 2 ? 'bullish' : 'bearish' };
        case 'rsi':
          return { value: indicators.rsi ? indicators.rsi.toFixed(0) : '-', signal: indicators.rsi < 30 ? 'bullish' : indicators.rsi > 70 ? 'bearish' : 'neutral' };
        case 'macd':
          return { value: indicators.macdHist > 0 ? '▲' : '▼', signal: indicators.macdHist > 0 ? 'bullish' : 'bearish' };
        case 'bollinger':
          return { value: currentPrice < indicators.bbLower ? '🟢' : currentPrice > indicators.bbUpper ? '🔴' : '⚪', signal: currentPrice < indicators.bbLower ? 'bullish' : currentPrice > indicators.bbUpper ? 'bearish' : 'neutral' };
        case 'vwap':
          return { value: currentPrice > indicators.vwap ? '⬆️' : '⬇️', signal: currentPrice > indicators.vwap ? 'bullish' : 'neutral' };
        case 'stochastic':
          return { value: indicators.stochK ? indicators.stochK.toFixed(0) : '-', signal: indicators.stochK < 20 ? 'bullish' : indicators.stochK > 80 ? 'bearish' : 'neutral' };
        default:
          return { value: '-', signal: 'neutral' };
      }
    }

    function getSignalColor(signal, active) {
      if (!active) return 'bg-gray-800 border-gray-700 opacity-50';
      if (signal === 'bullish') return 'bg-green-900/50 border-green-600 text-green-400';
      if (signal === 'bearish') return 'bg-red-900/50 border-red-600 text-red-400';
      return 'bg-gray-800 border-gray-600 text-gray-300';
    }

    function doSmartAnalysis() {
      let bullish = 0, bearish = 0;
      const analysis = [];
      const comparison = [];

      if (activeTools.includes('ema')) {
        let above = 0;
        if (currentPrice > indicators.ema20) above++;
        if (currentPrice > indicators.ema50) above++;
        if (currentPrice > indicators.ema200) above++;
        if (above >= 2) { bullish += 2; analysis.push('السعر فوق المتوسطات'); }
        else { bearish += 2; analysis.push('السعر تحت المتوسطات'); }
        comparison.push({ tool: 'EMA', result: above + '/3', good: above >= 2 });
      }

      if (activeTools.includes('rsi') && indicators.rsi) {
        if (indicators.rsi < 30) { bullish += 2; analysis.push('RSI مشبع بيع'); }
        else if (indicators.rsi > 70) { bearish += 2; analysis.push('RSI مشبع شراء'); }
        comparison.push({ tool: 'RSI', result: indicators.rsi.toFixed(0), good: indicators.rsi < 70 });
      }

      if (activeTools.includes('macd')) {
        if (indicators.macdHist > 0) { bullish += 2; analysis.push('MACD إيجابي'); }
        else { bearish += 2; analysis.push('MACD سلبي'); }
        comparison.push({ tool: 'MACD', result: indicators.macdHist > 0 ? '▲' : '▼', good: indicators.macdHist > 0 });
      }

      if (activeTools.includes('bollinger')) {
        if (currentPrice < indicators.bbLower) { bullish += 1.5; }
        else if (currentPrice > indicators.bbUpper) { bearish += 1.5; }
        comparison.push({ tool: 'بولنجر', result: currentPrice < indicators.bbLower ? 'تحت' : currentPrice > indicators.bbUpper ? 'فوق' : 'داخل', good: currentPrice <= indicators.bbUpper });
      }

      if (activeTools.includes('stochastic') && indicators.stochK) {
        if (indicators.stochK < 20) { bullish += 1.5; }
        else if (indicators.stochK > 80) { bearish += 1.5; }
        comparison.push({ tool: 'Stoch', result: 'K:' + indicators.stochK.toFixed(0), good: indicators.stochK < 80 });
      }

      const score = bullish - bearish;
      let decision, emoji, bgColor;
      if (score >= 4) { decision = 'شراء قوي'; emoji = '🚀'; bgColor = 'from-green-600 to-emerald-700'; }
      else if (score >= 2) { decision = 'شراء'; emoji = '🟢'; bgColor = 'from-green-700 to-green-800'; }
      else if (score >= -1) { decision = 'انتظار'; emoji = '🟡'; bgColor = 'from-yellow-600 to-amber-700'; }
      else if (score >= -3) { decision = 'تراجع'; emoji = '🟠'; bgColor = 'from-orange-600 to-orange-700'; }
      else { decision = 'ابتعد'; emoji = '🔴'; bgColor = 'from-red-600 to-red-700'; }

      const confidence = Math.min(95, 50 + Math.abs(score) * 8);
      const atr = indicators.atr || currentPrice * 0.02;

      let suggestions = [];
      if (!activeTools.includes('rsi')) suggestions.push('جرب RSI');
      if (!activeTools.includes('macd')) suggestions.push('أضف MACD');
      if (activeTools.length < 3) suggestions.push('استخدم 3 أدوات على الأقل');

      let warnings = [];
      if (indicators.rsi > 70) warnings.push('RSI مرتفع');
      if (indicators.atrPercent > 5) warnings.push('تقلب عالي');

      return { decision, emoji, bgColor, confidence, analysis: analysis.join(' | '), comparison, bullish, bearish, score, entry: currentPrice, stopLoss: currentPrice - atr * 2, target1: currentPrice + atr * 2, target2: currentPrice + atr * 4, suggestions: suggestions.join(' • ') || 'تحليلك ممتاز!', warnings: warnings.join(' • ') };
    }

    function calculatePrediction(amount, periodId) {
      const period = calcPeriods.find(p => p.id === periodId);
      if (!period || !indicators.atr || !currentPrice) return null;

      const analysis = doSmartAnalysis();
      const hourlyVolatility = (indicators.atrPercent || 2) / 24;
      const totalHours = period.hours;
      const volatility = hourlyVolatility * Math.sqrt(totalHours);

      // Trend factor based on analysis score
      let trendFactor = 0;
      if (analysis.score >= 4) trendFactor = 0.7;
      else if (analysis.score >= 2) trendFactor = 0.4;
      else if (analysis.score >= -1) trendFactor = 0;
      else if (analysis.score >= -3) trendFactor = -0.4;
      else trendFactor = -0.7;

      // Calculate scenarios
      const optimisticChange = volatility * (1 + trendFactor);
      const pessimisticChange = -volatility * (1 - trendFactor);
      const realisticChange = volatility * trendFactor * 0.5;

      const optimistic = amount * (1 + optimisticChange / 100);
      const pessimistic = amount * (1 + pessimisticChange / 100);
      const realistic = amount * (1 + realisticChange / 100);

      return {
        optimistic: { value: optimistic, change: optimisticChange, profit: optimistic - amount },
        pessimistic: { value: pessimistic, change: pessimisticChange, profit: pessimistic - amount },
        realistic: { value: realistic, change: realisticChange, profit: realistic - amount },
        confidence: analysis.confidence,
        trend: analysis.decision
      };
    }

    // Render
    function render() {
      const coin = coins.find(c => c.symbol === currentCoin);
      const period = periods.find(p => p.id === currentPeriod);

      document.getElementById('app').innerHTML = `
        <div class="min-h-screen pb-20">
          <!-- Header -->
          <div class="ai-gradient p-4">
            <div class="flex justify-between items-center">
              <div>
                <h1 class="text-xl font-bold">⚡ AQ Pro</h1>
                <p class="text-xs opacity-80">التحليل الذكي للعملات الرقمية</p>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-2xl">🤖</span>
                <span class="px-2 py-1 rounded-full text-xs bg-white/20">AI</span>
              </div>
            </div>
          </div>

          <!-- Coins (show on all pages) -->
          <div class="flex gap-2 overflow-x-auto hide-scroll px-4 py-3">
            ${coins.map(c => `
              <button onclick="selectCoin('${c.symbol}')" class="flex items-center gap-2 px-4 py-2 rounded-xl whitespace-nowrap ${c.symbol === currentCoin ? 'ai-gradient' : 'glass'}">
                <span class="text-lg">${c.icon}</span>
                <span class="text-sm">${c.name}</span>
              </button>
            `).join('')}
          </div>

          ${currentPage === 'analysis' ? renderAnalysisPage(coin, period) : ''}
          ${currentPage === 'ai' ? renderAIPage(coin) : ''}
          ${currentPage === 'news' ? renderNewsPage() : ''}

          <!-- Bottom Navigation -->
          <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0f]/95 backdrop-blur border-t border-white/10 px-4 py-3 z-50">
            <div class="flex justify-around max-w-md mx-auto">
              <button onclick="switchPage('analysis')" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl ${currentPage === 'analysis' ? 'ai-gradient' : ''}">
                <span class="text-xl">📊</span>
                <span class="text-xs">التحليل</span>
              </button>
              <button onclick="switchPage('ai')" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl ${currentPage === 'ai' ? 'ai-gradient' : ''}">
                <span class="text-xl">🤖</span>
                <span class="text-xs">الذكاء</span>
              </button>
              <button onclick="switchPage('news')" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl ${currentPage === 'news' ? 'ai-gradient' : ''}">
                <span class="text-xl">📰</span>
                <span class="text-xs">الأخبار</span>
              </button>
            </div>
          </div>
        </div>
      `;

      if (currentPage === 'analysis') {
        setTimeout(createCharts, 100);
      }
    }

    function renderAnalysisPage(coin, period) {
      return `
        <!-- Price Card -->
        <div class="glass rounded-xl p-3 mx-4 mb-3">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
              <span class="text-3xl">${coin ? coin.icon : ''}</span>
              <div>
                <p class="font-bold">${coin ? coin.name : ''}</p>
                <p class="text-xs text-gray-400">${period ? period.label : ''}</p>
              </div>
            </div>
            <div class="text-left">
              <p class="text-2xl font-bold">${formatPrice(currentPrice)}</p>
              <p class="text-sm ${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">
                ${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%
              </p>
            </div>
          </div>
        </div>

        <!-- Periods -->
        <div class="flex gap-2 overflow-x-auto hide-scroll px-4 mb-3">
          ${periods.map(p => `
            <button onclick="selectPeriod('${p.id}')" class="px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${p.id === currentPeriod ? 'ai-gradient' : 'glass'}">
              ${p.label}
            </button>
          `).join('')}
        </div>

        <!-- Main Chart -->
        <div class="glass rounded-xl p-2 mx-4 mb-1">
          <div id="mainChart" style="height: 220px;"></div>
        </div>

        <!-- RSI Chart -->
        ${activeTools.includes('rsi') ? `
          <div class="glass rounded-xl p-2 mx-4 mb-1">
            <div class="flex justify-between items-center px-2 mb-1">
              <span class="text-xs text-purple-400 font-bold">💪 RSI (14)</span>
              <span class="text-sm font-bold ${indicators.rsi < 30 ? 'text-green-400' : indicators.rsi > 70 ? 'text-red-400' : 'text-gray-300'}">${indicators.rsi ? indicators.rsi.toFixed(1) : '-'}</span>
            </div>
            <div id="rsiChart" style="height: 80px;"></div>
          </div>
        ` : ''}

        <!-- MACD Chart -->
        ${activeTools.includes('macd') ? `
          <div class="glass rounded-xl p-2 mx-4 mb-1">
            <div class="flex justify-between items-center px-2 mb-1">
              <span class="text-xs text-green-400 font-bold">🚀 MACD</span>
              <span class="text-sm font-bold ${indicators.macdHist > 0 ? 'text-green-400' : 'text-red-400'}">${indicators.macdHist > 0 ? '▲ صعودي' : '▼ هبوطي'}</span>
            </div>
            <div id="macdChart" style="height: 80px;"></div>
          </div>
        ` : ''}

        <!-- Stochastic Chart -->
        ${activeTools.includes('stochastic') ? `
          <div class="glass rounded-xl p-2 mx-4 mb-1">
            <div class="flex justify-between items-center px-2 mb-1">
              <span class="text-xs text-cyan-400 font-bold">⚡ Stochastic</span>
              <span class="text-sm font-bold text-gray-300">K: ${indicators.stochK ? indicators.stochK.toFixed(0) : '-'}</span>
            </div>
            <div id="stochChart" style="height: 80px;"></div>
          </div>
        ` : ''}

        <!-- Tools -->
        <div class="px-4 mb-3 mt-2">
          <p class="text-sm text-gray-400 mb-2">🔧 أدوات التحليل:</p>
          <div class="flex flex-wrap gap-2">
            ${tools.map(tool => {
              const isActive = activeTools.includes(tool.id);
              const result = getToolResult(tool.id);
              return `
                <button onclick="toggleTool('${tool.id}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border ${getSignalColor(result.signal, isActive)}">
                  <span>${tool.icon}</span>
                  <span>${tool.name}</span>
                  ${isActive ? `<span class="text-xs opacity-75">(${result.value})</span>` : ''}
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderAIPage(coin) {
      const analysis = doSmartAnalysis();
      const prediction = calculatePrediction(calcAmount, calcPeriod);
      const selectedPeriod = calcPeriods.find(p => p.id === calcPeriod);

      return `
        <div class="px-4 space-y-4">
          <!-- Current Price -->
          <div class="glass rounded-xl p-4 text-center">
            <p class="text-gray-400 text-sm">السعر الحالي</p>
            <p class="text-3xl font-bold">${formatPrice(currentPrice)}</p>
            <p class="text-sm ${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">
              ${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%
            </p>
          </div>

          <!-- AI Decision -->
          <div class="rounded-xl p-4 text-center bg-gradient-to-r ${analysis.bgColor}">
            <p class="text-4xl mb-2">${analysis.emoji}</p>
            <p class="text-3xl font-bold">${analysis.decision}</p>
            <p class="text-lg mt-1">الثقة: ${analysis.confidence}%</p>
            <div class="flex justify-center gap-4 mt-2 text-sm">
              <span>🟢 ${analysis.bullish.toFixed(1)}</span>
              <span>🔴 ${analysis.bearish.toFixed(1)}</span>
            </div>
          </div>

          <!-- Analysis -->
          <div class="ai-border p-4">
            <p class="text-sm text-gray-400 mb-2">🧠 التحليل:</p>
            <p class="text-sm">${analysis.analysis}</p>
          </div>

          <!-- Comparison -->
          ${analysis.comparison.length > 0 ? `
            <div class="glass rounded-xl p-4">
              <p class="text-sm text-gray-400 mb-2">📊 مقارنة المؤشرات:</p>
              <div class="space-y-2">
                ${analysis.comparison.map(c => `
                  <div class="flex justify-between items-center p-2 rounded-lg ${c.good ? 'bg-green-900/30' : 'bg-red-900/30'}">
                    <span class="font-bold text-sm">${c.tool}</span>
                    <span>${c.good ? '✅' : '❌'} ${c.result}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}

          <!-- Entry Points -->
          <div class="glass rounded-xl p-4">
            <p class="text-sm text-gray-400 mb-2">🎯 نقاط الدخول:</p>
            <div class="grid grid-cols-2 gap-2">
              <div class="bg-blue-900/30 rounded-lg p-2 text-center">
                <p class="text-xs text-blue-300">📍 دخول</p>
                <p class="font-bold">${formatPrice(analysis.entry)}</p>
              </div>
              <div class="bg-red-900/30 rounded-lg p-2 text-center">
                <p class="text-xs text-red-300">🛑 وقف</p>
                <p class="font-bold">${formatPrice(analysis.stopLoss)}</p>
              </div>
              <div class="bg-green-900/30 rounded-lg p-2 text-center">
                <p class="text-xs text-green-300">🎯 هدف 1</p>
                <p class="font-bold">${formatPrice(analysis.target1)}</p>
              </div>
              <div class="bg-green-900/40 rounded-lg p-2 text-center">
                <p class="text-xs text-green-300">🎯 هدف 2</p>
                <p class="font-bold">${formatPrice(analysis.target2)}</p>
              </div>
            </div>
          </div>

          ${analysis.warnings ? `
            <div class="bg-yellow-900/30 border border-yellow-600/50 rounded-xl p-4">
              <p class="text-sm text-yellow-400 mb-1">⚠️ تحذيرات:</p>
              <p class="text-yellow-200 text-sm">${analysis.warnings}</p>
            </div>
          ` : ''}

          <!-- Calculator Section -->
          <div class="ai-border p-4">
            <p class="text-lg font-bold mb-4 text-center">🧮 حاسبة الأرباح التنبؤية</p>
            
            <!-- Amount Input -->
            <div class="mb-4">
              <label class="text-sm text-gray-400 block mb-2">💵 المبلغ (دولار)</label>
              <input type="number" id="calcAmount" value="${calcAmount}" onchange="updateCalcAmount(this.value)" placeholder="أدخل المبلغ" min="1">
            </div>

            <!-- Period Selection -->
            <div class="mb-4">
              <label class="text-sm text-gray-400 block mb-2">⏰ الفترة الزمنية</label>
              <div class="flex gap-2 flex-wrap">
                ${calcPeriods.map(p => `
                  <button onclick="updateCalcPeriod('${p.id}')" class="px-3 py-2 rounded-lg text-sm ${p.id === calcPeriod ? 'ai-gradient' : 'glass'}">
                    ${p.label}
                  </button>
                `).join('')}
              </div>
            </div>

            ${prediction ? `
              <!-- Results -->
              <div class="space-y-3 mt-4">
                <p class="text-center text-gray-400 text-sm">
                  توقع ${formatUSD(calcAmount)} بعد ${selectedPeriod ? selectedPeriod.label : ''}
                </p>

                <!-- Optimistic -->
                <div class="bg-green-900/30 border border-green-600/50 rounded-xl p-3">
                  <div class="flex justify-between items-center">
                    <div>
                      <p class="text-xs text-green-300">🚀 السيناريو المتفائل</p>
                      <p class="text-2xl font-bold text-green-400">${formatUSD(prediction.optimistic.value)}</p>
                    </div>
                    <div class="text-left">
                      <p class="text-green-400 font-bold">+${prediction.optimistic.change.toFixed(2)}%</p>
                      <p class="text-xs text-green-300">+${formatUSD(prediction.optimistic.profit)}</p>
                    </div>
                  </div>
                </div>

                <!-- Realistic -->
                <div class="bg-blue-900/30 border border-blue-600/50 rounded-xl p-3">
                  <div class="flex justify-between items-center">
                    <div>
                      <p class="text-xs text-blue-300">📊 السيناريو المتوقع</p>
                      <p class="text-2xl font-bold text-blue-400">${formatUSD(prediction.realistic.value)}</p>
                    </div>
                    <div class="text-left">
                      <p class="text-blue-400 font-bold">${prediction.realistic.change >= 0 ? '+' : ''}${prediction.realistic.change.toFixed(2)}%</p>
                      <p class="text-xs text-blue-300">${prediction.realistic.profit >= 0 ? '+' : ''}${formatUSD(prediction.realistic.profit)}</p>
                    </div>
                  </div>
                </div>

                <!-- Pessimistic -->
                <div class="bg-red-900/30 border border-red-600/50 rounded-xl p-3">
                  <div class="flex justify-between items-center">
                    <div>
                      <p class="text-xs text-red-300">⚠️ السيناريو المتشائم</p>
                      <p class="text-2xl font-bold text-red-400">${formatUSD(prediction.pessimistic.value)}</p>
                    </div>
                    <div class="text-left">
                      <p class="text-red-400 font-bold">${prediction.pessimistic.change.toFixed(2)}%</p>
                      <p class="text-xs text-red-300">${formatUSD(prediction.pessimistic.profit)}</p>
                    </div>
                  </div>
                </div>

                <p class="text-xs text-gray-500 text-center mt-2">
                  ⚠️ هذه تقديرات تقريبية بناءً على التحليل الفني وليست نصيحة استثمارية
                </p>
              </div>
            ` : ''}
          </div>

          <!-- Suggestions -->
          <div class="glass rounded-xl p-4">
            <p class="text-sm text-gray-400 mb-2">💡 اقتراحات:</p>
            <p class="text-sm">${analysis.suggestions}</p>
          </div>
        </div>
      `;
    }

    function renderNewsPage() {
      const positive = newsData.filter(n => n.sentiment === 'positive').length;
      const negative = newsData.filter(n => n.sentiment === 'negative').length;
      const neutral = newsData.filter(n => n.sentiment === 'neutral').length;
      const mood = positive > negative ? 'bullish' : negative > positive ? 'bearish' : 'neutral';

      return `
        <div class="px-4 py-3">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">📰 أخبار السوق</h2>
            <button onclick="loadNews()" class="p-2 glass rounded-lg">🔄</button>
          </div>

          <!-- Market Mood -->
          <div class="rounded-xl p-4 mb-4 ${mood === 'bullish' ? 'bg-gradient-to-r from-green-900/50 to-green-800/50' : mood === 'bearish' ? 'bg-gradient-to-r from-red-900/50 to-red-800/50' : 'bg-gradient-to-r from-gray-800 to-gray-700'}">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-3xl">${mood === 'bullish' ? '🐂' : mood === 'bearish' ? '🐻' : '😐'}</span>
              <p class="font-bold">مزاج السوق: ${mood === 'bullish' ? 'صعودي' : mood === 'bearish' ? 'هبوطي' : 'محايد'}</p>
            </div>
            <div class="flex gap-4 text-sm">
              <span class="text-green-400">🟢 ${positive}</span>
              <span class="text-yellow-400">🟡 ${neutral}</span>
              <span class="text-red-400">🔴 ${negative}</span>
            </div>
          </div>

          <!-- News List -->
          <div class="space-y-3">
            ${newsData.length === 0 ? '<p class="text-center text-gray-400 py-8">جاري التحميل...</p>' : ''}
            ${newsData.map(item => `
              <div class="rounded-xl p-4 border ${item.sentiment === 'positive' ? 'bg-green-900/30 border-green-600' : item.sentiment === 'negative' ? 'bg-red-900/30 border-red-600' : 'bg-gray-800 border-gray-600'}">
                <div class="flex items-start gap-3">
                  <div class="w-3 h-3 rounded-full mt-1.5 ${item.sentiment === 'positive' ? 'bg-green-500' : item.sentiment === 'negative' ? 'bg-red-500' : 'bg-yellow-500'}"></div>
                  <div class="flex-1">
                    <p class="font-bold text-sm mb-2">${item.title}</p>
                    <div class="flex justify-between text-xs text-gray-400">
                      <span>${item.source || 'CryptoCompare'}</span>
                      <span>${item.timeAgo}</span>
                    </div>
                    ${item.url ? `<a href="${item.url}" target="_blank" class="block mt-2 text-xs text-indigo-400">📖 قراءة المزيد</a>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function createCharts() {
      if (!chartData.length) return;

      // Main Chart
      const mainContainer = document.getElementById('mainChart');
      if (mainContainer) {
        if (mainChart) { mainChart.remove(); mainChart = null; }
        mainChart = LightweightCharts.createChart(mainContainer, {
          width: mainContainer.clientWidth, height: 220,
          layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
          timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true }
        });
        const candles = mainChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderUpColor: '#22c55e', borderDownColor: '#ef4444', wickUpColor: '#22c55e', wickDownColor: '#ef4444' });
        candles.setData(chartData);

        if (activeTools.includes('ema') && indicators.ema20Data) {
          mainChart.addLineSeries({ color: '#3b82f6', lineWidth: 2 }).setData(indicators.ema20Data.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          mainChart.addLineSeries({ color: '#22c55e', lineWidth: 2 }).setData(indicators.ema50Data.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          if (indicators.ema200Data) {
            mainChart.addLineSeries({ color: '#f59e0b', lineWidth: 2 }).setData(indicators.ema200Data.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          }
        }
        if (activeTools.includes('bollinger') && indicators.bollingerData) {
          mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.upper.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.lower.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
        }
        if (activeTools.includes('vwap') && indicators.vwapData) {
          mainChart.addLineSeries({ color: '#06b6d4', lineWidth: 2, lineStyle: 2 }).setData(indicators.vwapData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
        }
        mainChart.timeScale().fitContent();
      }

      // RSI Chart
      if (activeTools.includes('rsi') && indicators.rsiData) {
        const rsiContainer = document.getElementById('rsiChart');
        if (rsiContainer) {
          if (rsiChart) { rsiChart.remove(); rsiChart = null; }
          rsiChart = LightweightCharts.createChart(rsiContainer, {
            width: rsiContainer.clientWidth, height: 80,
            layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { visible: false }
          });
          rsiChart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 }).setData(indicators.rsiData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          rsiChart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: 70 })));
          rsiChart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: 30 })));
          rsiChart.timeScale().fitContent();
        }
      }

      // MACD Chart
      if (activeTools.includes('macd') && indicators.macdData) {
        const macdContainer = document.getElementById('macdChart');
        if (macdContainer) {
          if (macdChart) { macdChart.remove(); macdChart = null; }
          macdChart = LightweightCharts.createChart(macdContainer, {
            width: macdContainer.clientWidth, height: 80,
            layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { visible: false }
          });
          macdChart.addHistogramSeries({ color: '#22c55e' }).setData(indicators.macdData.histogram.map((v, i) => v !== null ? { time: chartData[i].time, value: v, color: v >= 0 ? '#22c55e' : '#ef4444' } : null).filter(Boolean));
          macdChart.addLineSeries({ color: '#3b82f6', lineWidth: 2 }).setData(indicators.macdData.macdLine.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          macdChart.addLineSeries({ color: '#f59e0b', lineWidth: 2 }).setData(indicators.macdData.signalLine.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          macdChart.timeScale().fitContent();
        }
      }

      // Stochastic Chart
      if (activeTools.includes('stochastic') && indicators.stochData) {
        const stochContainer = document.getElementById('stochChart');
        if (stochContainer) {
          if (stochChart) { stochChart.remove(); stochChart = null; }
          stochChart = LightweightCharts.createChart(stochContainer, {
            width: stochContainer.clientWidth, height: 80,
            layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { visible: false }
          });
          stochChart.addLineSeries({ color: '#06b6d4', lineWidth: 2 }).setData(indicators.stochData.k.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          stochChart.addLineSeries({ color: '#f59e0b', lineWidth: 2 }).setData(indicators.stochData.d.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));
          stochChart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: 80 })));
          stochChart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2 }).setData(chartData.map(d => ({ time: d.time, value: 20 })));
          stochChart.timeScale().fitContent();
        }
      }
    }

    // Actions
    async function fetchData() {
      const period = periods.find(p => p.id === currentPeriod);
      if (!period) return;
      try {
        const url = `https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`;
        const res = await fetch(url);
        const json = await res.json();
        chartData = json.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
        if (chartData.length > 0) {
          currentPrice = chartData[chartData.length - 1].close;
          priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100;
        }
        calculateIndicators();
        render();
      } catch (e) { console.error(e); }
    }

    async function loadNews() {
      try {
        const res = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,ETH,Trading,Regulation');
        const data = await res.json();
        newsData = (data.Data || []).slice(0, 15).map(item => {
          const title = item.title.toLowerCase();
          let sentiment = 'neutral';
          if (title.match(/surge|rally|bull|gain|rise|soar|jump|up|high|record/)) sentiment = 'positive';
          else if (title.match(/crash|drop|bear|fall|plunge|sink|warn|down|low|fear/)) sentiment = 'negative';
          const seconds = Math.floor((Date.now() - item.published_on * 1000) / 1000);
          let timeAgo = 'الآن';
          if (seconds >= 86400) timeAgo = 'منذ ' + Math.floor(seconds / 86400) + ' ي';
          else if (seconds >= 3600) timeAgo = 'منذ ' + Math.floor(seconds / 3600) + ' س';
          else if (seconds >= 60) timeAgo = 'منذ ' + Math.floor(seconds / 60) + ' د';
          return { ...item, sentiment, timeAgo };
        });
        if (currentPage === 'news') render();
      } catch (e) { console.error(e); }
    }

    function selectCoin(symbol) { currentCoin = symbol; fetchData(); }
    function selectPeriod(id) { currentPeriod = id; fetchData(); }
    function toggleTool(id) { activeTools = activeTools.includes(id) ? activeTools.filter(t => t !== id) : [...activeTools, id]; render(); }
    function switchPage(page) { currentPage = page; if (page === 'news' && newsData.length === 0) loadNews(); render(); }
    function updateCalcAmount(value) { calcAmount = parseFloat(value) || 100; render(); }
    function updateCalcPeriod(id) { calcPeriod = id; render(); }

    // Global
    window.selectCoin = selectCoin;
    window.selectPeriod = selectPeriod;
    window.toggleTool = toggleTool;
    window.switchPage = switchPage;
    window.loadNews = loadNews;
    window.updateCalcAmount = updateCalcAmount;
    window.updateCalcPeriod = updateCalcPeriod;

    // Resize handler
    window.addEventListener('resize', () => {
      if (mainChart) mainChart.applyOptions({ width: document.getElementById('mainChart')?.clientWidth || 0 });
      if (rsiChart) rsiChart.applyOptions({ width: document.getElementById('rsiChart')?.clientWidth || 0 });
      if (macdChart) macdChart.applyOptions({ width: document.getElementById('macdChart')?.clientWidth || 0 });
      if (stochChart) stochChart.applyOptions({ width: document.getElementById('stochChart')?.clientWidth || 0 });
    });

    // Start
    fetchData();
    loadNews();
  </script>
</body>
</html>
