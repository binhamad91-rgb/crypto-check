    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.7); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .animate-glow { animation: glow 2s infinite; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .ai-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7); }
    .ai-border { border: 2px solid transparent; background: linear-gradient(#0a0a0f, #0a0a0f) padding-box, linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7) border-box; border-radius: 12px; }

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const formatPrice = (p) => {
      if (!p || isNaN(p)) return '-';
      if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return p.toFixed(p >= 1 ? 4 : 6);
    };

    const timeAgo = (date) => {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return 'الآن';
      if (seconds < 3600) return 'منذ ' + Math.floor(seconds / 60) + ' د';
      if (seconds < 86400) return 'منذ ' + Math.floor(seconds / 3600) + ' س';
      return 'منذ ' + Math.floor(seconds / 86400) + ' ي';
    };

    const calculateEMA = (data, period) => {
      if (!data || data.length < period) return data ? data.map(() => null) : [];
      const result = [];
      const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    };

    const calculateRSI = (data, period) => {
      if (!data || data.length < period + 1) return data ? data.map(() => null) : [];
      const result = [null];
      const gains = [];
      const losses = [];
      for (let i = 1; i < data.length; i++) {
        const change = data[i].close - data[i - 1].close;
        gains.push(change > 0 ? change : 0);
        losses.push(change < 0 ? Math.abs(change) : 0);
      }
      for (let i = 0; i < gains.length; i++) {
        if (i < period - 1) result.push(null);
        else {
          const avgGain = gains.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          const avgLoss = losses.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          result.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
        }
      }
      return result;
    };

    const calculateMACD = (data) => {
      const emaFast = calculateEMA(data, 12);
      const emaSlow = calculateEMA(data, 26);
      const macdLine = emaFast.map((v, i) => v && emaSlow[i] ? v - emaSlow[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calculateEMA(macdData, 9);
      const histogram = macdLine.map((v, i) => v && signalLine[i] ? v - signalLine[i] : null);
      return { macdLine, signalLine, histogram };
    };

    const calculateBollinger = (data, period) => {
      const sma = data.map((d, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);
      const upper = [];
      const lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + 2 * std);
        lower.push(sma[i] - 2 * std);
      }
      return { sma, upper, lower };
    };

    const calculateVWAP = (data) => {
      let cumVol = 0;
      let cumVolPrice = 0;
      return data.map(d => {
        cumVol += d.volume || 1;
        cumVolPrice += ((d.high + d.low + d.close) / 3) * (d.volume || 1);
        return cumVol > 0 ? cumVolPrice / cumVol : null;
      });
    };

    const calculateStochastic = (data, kPeriod) => {
      const kValues = data.map((d, i) => {
        if (i < kPeriod - 1) return null;
        const slice = data.slice(i - kPeriod + 1, i + 1);
        const high = Math.max(...slice.map(x => x.high));
        const low = Math.min(...slice.map(x => x.low));
        return high === low ? 50 : ((d.close - low) / (high - low)) * 100;
      });
      const dValues = kValues.map((v, i) => {
        if (i < kPeriod + 2) return null;
        const slice = kValues.slice(i - 2, i + 1).filter(x => x !== null);
        return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
      });
      return { k: kValues, d: dValues };
    };

    const calculateADX = (data, period) => {
      if (data.length < period + 1) return data.map(() => null);
      const tr = [];
      const plusDM = [];
      const minusDM = [];
      for (let i = 1; i < data.length; i++) {
        tr.push(Math.max(data[i].high - data[i].low, Math.abs(data[i].high - data[i-1].close), Math.abs(data[i].low - data[i-1].close)));
        const highDiff = data[i].high - data[i-1].high;
        const lowDiff = data[i-1].low - data[i].low;
        plusDM.push(highDiff > lowDiff && highDiff > 0 ? highDiff : 0);
        minusDM.push(lowDiff > highDiff && lowDiff > 0 ? lowDiff : 0);
      }
      const smoothedTR = [];
      const smoothedPlusDM = [];
      const smoothedMinusDM = [];
      for (let i = 0; i < tr.length; i++) {
        if (i < period - 1) { smoothedTR.push(null); smoothedPlusDM.push(null); smoothedMinusDM.push(null); }
        else if (i === period - 1) {
          smoothedTR.push(tr.slice(0, period).reduce((a, b) => a + b, 0));
          smoothedPlusDM.push(plusDM.slice(0, period).reduce((a, b) => a + b, 0));
          smoothedMinusDM.push(minusDM.slice(0, period).reduce((a, b) => a + b, 0));
        } else {
          smoothedTR.push(smoothedTR[i-1] - smoothedTR[i-1]/period + tr[i]);
          smoothedPlusDM.push(smoothedPlusDM[i-1] - smoothedPlusDM[i-1]/period + plusDM[i]);
          smoothedMinusDM.push(smoothedMinusDM[i-1] - smoothedMinusDM[i-1]/period + minusDM[i]);
        }
      }
      const plusDI = smoothedTR.map((t, i) => t ? (smoothedPlusDM[i] / t) * 100 : null);
      const minusDI = smoothedTR.map((t, i) => t ? (smoothedMinusDM[i] / t) * 100 : null);
      const dx = plusDI.map((plus, i) => {
        if (!plus || !minusDI[i]) return null;
        const sum = plus + minusDI[i];
        return sum === 0 ? 0 : (Math.abs(plus - minusDI[i]) / sum) * 100;
      });
      const adx = dx.map((d, i) => {
        if (i < period * 2 - 2) return null;
        const slice = dx.slice(i - period + 1, i + 1).filter(x => x !== null);
        return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
      });
      return [null, ...adx];
    };

    const calculateATR = (data, period) => {
      const tr = data.map((d, i) => i === 0 ? d.high - d.low : Math.max(d.high - d.low, Math.abs(d.high - data[i-1].close), Math.abs(d.low - data[i-1].close)));
      return tr.map((t, i) => i < period - 1 ? null : tr.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period);
    };

    const calculateFibonacci = (data) => {
      const high = Math.max(...data.map(d => d.high));
      const low = Math.min(...data.map(d => d.low));
      const diff = high - low;
      return { level236: low + diff * 0.236, level382: low + diff * 0.382, level50: low + diff * 0.5, level618: low + diff * 0.618 };
    };

    const calculateSupportResistance = (data) => {
      if (data.length < 20) return { support: [], resistance: [] };
      const support = [];
      const resistance = [];
      for (let i = 5; i < data.length - 5; i++) {
        const lowsL = data.slice(i - 5, i).every(d => d.low >= data[i].low);
        const lowsR = data.slice(i + 1, i + 6).every(d => d.low >= data[i].low);
        if (lowsL && lowsR) support.push(data[i].low);
        const highsL = data.slice(i - 5, i).every(d => d.high <= data[i].high);
        const highsR = data.slice(i + 1, i + 6).every(d => d.high <= data[i].high);
        if (highsL && highsR) resistance.push(data[i].high);
      }
      return { support: [...new Set(support)].slice(-3), resistance: [...new Set(resistance)].slice(-3) };
    };

    function performSmartAnalysis(price, indicators, activeTools, toolSettings) {
      const signals = [];
      const analysis = [];
      const comparison = [];
      
      if (activeTools.includes('ema')) {
        const emaPeriods = toolSettings.emaPeriods || [20, 50, 200];
        let bullish = 0;
        emaPeriods.forEach(p => {
          const emaVal = indicators['ema' + p];
          if (emaVal && price > emaVal) bullish++;
        });
        const emaSignal = bullish >= emaPeriods.length / 2 ? 'bullish' : 'bearish';
        signals.push({ tool: 'EMA', signal: emaSignal, weight: 2 });
        comparison.push({ tool: 'EMA', your_result: bullish + '/' + emaPeriods.length + ' فوق', ai_says: emaSignal === 'bullish' ? '✅ إيجابي' : '❌ سلبي', match: emaSignal === 'bullish' });
        if (emaSignal === 'bullish') analysis.push('السعر فوق المتوسطات');
        else analysis.push('السعر تحت المتوسطات');
      }
      
      if (activeTools.includes('rsi')) {
        const rsi = indicators.rsi;
        let rsiSignal = 'neutral';
        if (rsi < 30) { rsiSignal = 'bullish'; analysis.push('RSI مشبع بيع - فرصة شراء'); }
        else if (rsi > 70) { rsiSignal = 'bearish'; analysis.push('RSI مشبع شراء - احذر'); }
        else { analysis.push('RSI طبيعي'); }
        signals.push({ tool: 'RSI', signal: rsiSignal, weight: 2 });
        comparison.push({ tool: 'RSI', your_result: rsi ? rsi.toFixed(0) : '-', ai_says: rsiSignal === 'bullish' ? '✅ فرصة' : rsiSignal === 'bearish' ? '⚠️ حذر' : '⚪ محايد', match: rsiSignal !== 'bearish' });
      }
      
      if (activeTools.includes('macd')) {
        const hist = indicators.macdHist;
        const macdSignal = hist > 0 ? 'bullish' : 'bearish';
        signals.push({ tool: 'MACD', signal: macdSignal, weight: 2 });
        comparison.push({ tool: 'MACD', your_result: hist > 0 ? '▲' : '▼', ai_says: macdSignal === 'bullish' ? '✅ صعودي' : '❌ هبوطي', match: macdSignal === 'bullish' });
        if (macdSignal === 'bullish') analysis.push('MACD إيجابي');
        else analysis.push('MACD سلبي');
      }
      
      if (activeTools.includes('bollinger')) {
        let bbSignal = 'neutral';
        if (price < indicators.bbLower) { bbSignal = 'bullish'; analysis.push('السعر تحت البولنجر - ارتداد متوقع'); }
        else if (price > indicators.bbUpper) { bbSignal = 'bearish'; analysis.push('السعر فوق البولنجر - تصحيح متوقع'); }
        signals.push({ tool: 'Bollinger', signal: bbSignal, weight: 1.5 });
        comparison.push({ tool: 'بولنجر', your_result: bbSignal === 'bullish' ? 'تحت' : bbSignal === 'bearish' ? 'فوق' : 'داخل', ai_says: bbSignal === 'bullish' ? '✅' : bbSignal === 'bearish' ? '⚠️' : '⚪', match: bbSignal !== 'bearish' });
      }
      
      if (activeTools.includes('stochastic')) {
        const stochK = indicators.stochK;
        let stochSignal = 'neutral';
        if (stochK < 20) { stochSignal = 'bullish'; analysis.push('Stoch مشبع بيع'); }
        else if (stochK > 80) { stochSignal = 'bearish'; analysis.push('Stoch مشبع شراء'); }
        signals.push({ tool: 'Stochastic', signal: stochSignal, weight: 1.5 });
        comparison.push({ tool: 'Stoch', your_result: 'K:' + (stochK ? stochK.toFixed(0) : '-'), ai_says: stochSignal === 'bullish' ? '✅' : stochSignal === 'bearish' ? '⚠️' : '⚪', match: stochSignal !== 'bearish' });
      }
      
      if (activeTools.includes('adx')) {
        const adx = indicators.adx;
        const adxSignal = adx > 25 ? 'bullish' : 'neutral';
        signals.push({ tool: 'ADX', signal: adxSignal, weight: 1 });
        comparison.push({ tool: 'ADX', your_result: adx ? adx.toFixed(0) : '-', ai_says: adx > 25 ? '💪 قوي' : '😐 ضعيف', match: adx > 20 });
        if (adx > 25) analysis.push('اتجاه قوي');
      }
      
      let bullishScore = 0;
      let bearishScore = 0;
      let totalWeight = 0;
      signals.forEach(s => {
        totalWeight += s.weight;
        if (s.signal === 'bullish') bullishScore += s.weight;
        else if (s.signal === 'bearish') bearishScore += s.weight;
      });
      
      const confidence = totalWeight > 0 ? Math.round(((bullishScore > bearishScore ? bullishScore : bearishScore) / totalWeight) * 100) : 50;
      const netScore = bullishScore - bearishScore;
      
      let decision;
      let decisionEmoji;
      if (netScore >= 4) { decision = 'شراء قوي'; decisionEmoji = '🚀'; }
      else if (netScore >= 2) { decision = 'شراء'; decisionEmoji = '🟢'; }
      else if (netScore >= -1) { decision = 'انتظار'; decisionEmoji = '🟡'; }
      else if (netScore >= -3) { decision = 'تراجع'; decisionEmoji = '🟠'; }
      else { decision = 'ابتعد'; decisionEmoji = '🔴'; }
      
      const atr = indicators.atr || price * 0.02;
      const entry = price;
      const stopLoss = price - (atr * 2);
      const target1 = price + (atr * 2);
      const target2 = price + (atr * 4);
      
      let suggestions = [];
      if (!activeTools.includes('rsi')) suggestions.push('جرب RSI');
      if (!activeTools.includes('macd')) suggestions.push('أضف MACD');
      if (activeTools.length < 3) suggestions.push('استخدم 3 أدوات على الأقل');
      
      let warnings = [];
      if (indicators.rsi > 70) warnings.push('RSI مرتفع');
      if (indicators.atrPercent > 5) warnings.push('تقلب عالي');
      
      return { decision, decisionEmoji, confidence, analysis: analysis.join(' | '), comparison, suggestions: suggestions.join(' • ') || 'تحليلك جيد!', entry, stopLoss, target1, target2, warnings: warnings.join(' • ') || null, bullishScore, bearishScore };
    }

    const COINS = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕' },
    ];

    const TIME_PERIODS = [
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 },
      { id: '3y', label: '3 سنوات', interval: '1w', limit: 156 },
    ];

    const TOOLS = [
      { id: 'ema', name: 'EMA', icon: '📈' },
      { id: 'rsi', name: 'RSI', icon: '💪' },
      { id: 'macd', name: 'MACD', icon: '🚀' },
      { id: 'bollinger', name: 'بولنجر', icon: '📊' },
      { id: 'vwap', name: 'VWAP', icon: '⚖️' },
      { id: 'stochastic', name: 'Stoch', icon: '⚡' },
      { id: 'adx', name: 'ADX', icon: '💎' },
      { id: 'fibonacci', name: 'فيبو', icon: '🔢' },
      { id: 'atr', name: 'ATR', icon: '📉' },
      { id: 'support', name: 'دعم', icon: '🎯' },
    ];

    const EMA_COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];

    function useMarketData(symbol, period) {
      const [data, setData] = useState([]);
      const [price, setPrice] = useState(null);
      const [loading, setLoading] = useState(true);
      const [priceChange, setPriceChange] = useState(0);
      const wsRef = useRef(null);

      useEffect(() => {
        setLoading(true);
        const fetchKlines = async () => {
          try {
            const periodConfig = TIME_PERIODS.find(p => p.id === period) || TIME_PERIODS[4];
            const res = await fetch('https://api.binance.com/api/v3/klines?symbol=' + symbol + '&interval=' + periodConfig.interval + '&limit=' + periodConfig.limit);
            const json = await res.json();
            const formatted = json.map(c => ({ time: c[0] / 1000, open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
            setData(formatted);
            if (formatted.length > 0) {
              setPrice(formatted[formatted.length - 1].close);
              setPriceChange(((formatted[formatted.length - 1].close - formatted[0].open) / formatted[0].open) * 100);
            }
            setLoading(false);
          } catch (e) {
            console.error(e);
            setLoading(false);
          }
        };
        fetchKlines();
        if (wsRef.current) wsRef.current.close();
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/' + symbol.toLowerCase() + '@trade');
        wsRef.current = ws;
        ws.onmessage = (e) => setPrice(parseFloat(JSON.parse(e.data).p));
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [symbol, period]);

      return { data, price, loading, priceChange };
    }

    function RSIChart({ data, rsiData }) {
      const containerRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current || !data.length || !rsiData.length) return;
        if (chartRef.current) { chartRef.current.remove(); chartRef.current = null; }

        const chart = LightweightCharts.createChart(containerRef.current, {
          width: containerRef.current.clientWidth,
          height: 100,
          layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
          timeScale: { visible: false },
        });
        chartRef.current = chart;

        const rsiSeries = chart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 });
        rsiSeries.setData(rsiData.map((v, i) => v !== null ? { time: data[i].time, value: v } : null).filter(Boolean));

        chart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2 }).setData(data.map(d => ({ time: d.time, value: 70 })));
        chart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2 }).setData(data.map(d => ({ time: d.time, value: 30 })));

        chart.timeScale().fitContent();
        const handleResize = () => chart.applyOptions({ width: containerRef.current ? containerRef.current.clientWidth : 0 });
        window.addEventListener('resize', handleResize);
        return () => { window.removeEventListener('resize', handleResize); if (chartRef.current) chartRef.current.remove(); };
      }, [data, rsiData]);

      return React.createElement('div', { ref: containerRef, style: { height: 100 } });
    }

    function MACDChart({ data, macdData }) {
      const containerRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current || !data.length || !macdData) return;
        if (chartRef.current) { chartRef.current.remove(); chartRef.current = null; }

        const chart = LightweightCharts.createChart(containerRef.current, {
          width: containerRef.current.clientWidth,
          height: 100,
          layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
          timeScale: { visible: false },
        });
        chartRef.current = chart;

        const histSeries = chart.addHistogramSeries({ color: '#22c55e' });
        histSeries.setData(macdData.histogram.map((v, i) => v !== null ? { time: data[i].time, value: v, color: v >= 0 ? '#22c55e' : '#ef4444' } : null).filter(Boolean));

        chart.addLineSeries({ color: '#3b82f6', lineWidth: 2 }).setData(macdData.macdLine.map((v, i) => v !== null ? { time: data[i].time, value: v } : null).filter(Boolean));
        chart.addLineSeries({ color: '#f59e0b', lineWidth: 2 }).setData(macdData.signalLine.map((v, i) => v !== null ? { time: data[i].time, value: v } : null).filter(Boolean));

        chart.timeScale().fitContent();
        const handleResize = () => chart.applyOptions({ width: containerRef.current ? containerRef.current.clientWidth : 0 });
        window.addEventListener('resize', handleResize);
        return () => { window.removeEventListener('resize', handleResize); if (chartRef.current) chartRef.current.remove(); };
      }, [data, macdData]);

      return React.createElement('div', { ref: containerRef, style: { height: 100 } });
    }

    function StochChart({ data, stochData }) {
      const containerRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current || !data.length || !stochData) return;
        if (chartRef.current) { chartRef.current.remove(); chartRef.current = null; }

        const chart = LightweightCharts.createChart(containerRef.current, {
          width: containerRef.current.clientWidth,
          height: 100,
          layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
          timeScale: { visible: false },
        });
        chartRef.current = chart;

        chart.addLineSeries({ color: '#06b6d4', lineWidth: 2 }).setData(stochData.k.map((v, i) => v !== null ? { time: data[i].time, value: v } : null).filter(Boolean));
        chart.addLineSeries({ color: '#f59e0b', lineWidth: 2 }).setData(stochData.d.map((v, i) => v !== null ? { time: data[i].time, value: v } : null).filter(Boolean));
        chart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2 }).setData(data.map(d => ({ time: d.time, value: 80 })));
        chart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2 }).setData(data.map(d => ({ time: d.time, value: 20 })));

        chart.timeScale().fitContent();
        const handleResize = () => chart.applyOptions({ width: containerRef.current ? containerRef.current.clientWidth : 0 });
        window.addEventListener('resize', handleResize);
        return () => { window.removeEventListener('resize', handleResize); if (chartRef.current) chartRef.current.remove(); };
      }, [data, stochData]);

      return React.createElement('div', { ref: containerRef, style: { height: 100 } });
    }

    function AnalysisPage() {
      const [coin, setCoin] = useState(COINS[0]);
      const [period, setPeriod] = useState('1y');
      const [activeTools, setActiveTools] = useState(['ema', 'rsi', 'macd']);
      const [aiEnabled, setAiEnabled] = useState(false);
      const [aiResult, setAiResult] = useState(null);
      const toolSettings = { emaPeriods: [20, 50, 200], rsiPeriod: 14 };
      const chartContainerRef = useRef(null);
      const chartRef = useRef(null);
      const seriesRef = useRef({});

      const { data, price, loading, priceChange } = useMarketData(coin.symbol, period);

      const indicators = useMemo(() => {
        if (!data || data.length < 30 || !price) return null;
        const last = data.length - 1;
        const ema20 = calculateEMA(data, 20);
        const ema50 = calculateEMA(data, 50);
        const ema200 = calculateEMA(data, 200);
        const rsi = calculateRSI(data, 14);
        const macd = calculateMACD(data);
        const bollinger = calculateBollinger(data, 20);
        const vwap = calculateVWAP(data);
        const stochastic = calculateStochastic(data, 14);
        const adx = calculateADX(data, 14);
        const fibonacci = calculateFibonacci(data);
        const atr = calculateATR(data, 14);
        const sr = calculateSupportResistance(data);
        return {
          ema20: ema20[last], ema50: ema50[last], ema200: ema200[last],
          ema20Data: ema20, ema50Data: ema50, ema200Data: ema200,
          rsi: rsi[last], rsiData: rsi,
          macdHist: macd.histogram[last], macdData: macd,
          bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bollingerData: bollinger,
          vwap: vwap[last], vwapData: vwap,
          stochK: stochastic.k[last], stochD: stochastic.d[last], stochData: stochastic,
          adx: adx[last], adxData: adx,
          fib382: fibonacci.level382, fib50: fibonacci.level50, fib618: fibonacci.level618, fibData: fibonacci,
          atr: atr[last], atrPercent: atr[last] ? (atr[last] / price) * 100 : 0,
          support: sr.support, resistance: sr.resistance
        };
      }, [data, price]);

      useEffect(() => {
        if (!chartContainerRef.current || !data.length) return;
        if (chartRef.current) { chartRef.current.remove(); chartRef.current = null; seriesRef.current = {}; }
        
        const chart = LightweightCharts.createChart(chartContainerRef.current, {
          width: chartContainerRef.current.clientWidth,
          height: 220,
          layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
          timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true }
        });
        chartRef.current = chart;
        
        const candleSeries = chart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderDownColor: '#ef4444', borderUpColor: '#22c55e', wickDownColor: '#ef4444', wickUpColor: '#22c55e' });
        candleSeries.setData(data);
        seriesRef.current.candles = candleSeries;
        
        const handleResize = () => chart.applyOptions({ width: chartContainerRef.current ? chartContainerRef.current.clientWidth : 0 });
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [data, coin.symbol, period]);

      useEffect(() => {
        if (!chartRef.current || !data.length || !indicators) return;
        const chart = chartRef.current;
        
        Object.entries(seriesRef.current).forEach(([key, series]) => {
          if (key !== 'candles') try { chart.removeSeries(series); } catch (e) {}
        });
        seriesRef.current = { candles: seriesRef.current.candles };

        if (activeTools.includes('ema')) {
          const emas = [{ data: indicators.ema20Data, color: EMA_COLORS[0] }, { data: indicators.ema50Data, color: EMA_COLORS[1] }, { data: indicators.ema200Data, color: EMA_COLORS[2] }];
          emas.forEach((ema, idx) => {
            if (ema.data) {
              const series = chart.addLineSeries({ color: ema.color, lineWidth: 2 });
              series.setData(ema.data.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean));
              seriesRef.current['ema' + idx] = series;
            }
          });
        }
        if (activeTools.includes('bollinger') && indicators.bollingerData) {
          const upper = chart.addLineSeries({ color: '#ec4899', lineWidth: 1 });
          upper.setData(indicators.bollingerData.upper.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean));
          const lower = chart.addLineSeries({ color: '#ec4899', lineWidth: 1 });
          lower.setData(indicators.bollingerData.lower.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean));
          seriesRef.current.bbUpper = upper;
          seriesRef.current.bbLower = lower;
        }
        if (activeTools.includes('vwap') && indicators.vwapData) {
          const series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 2, lineStyle: 2 });
          series.setData(indicators.vwapData.map((v, i) => v ? { time: data[i].time, value: v } : null).filter(Boolean));
          seriesRef.current.vwap = series;
        }
        if (activeTools.includes('fibonacci') && indicators.fibData) {
          [indicators.fibData.level236, indicators.fibData.level382, indicators.fibData.level50, indicators.fibData.level618].forEach((level, idx) => {
            const line = chart.addLineSeries({ color: '#14b8a6', lineWidth: 1, lineStyle: 2 });
            line.setData(data.map(d => ({ time: d.time, value: level })));
            seriesRef.current['fib' + idx] = line;
          });
        }
        if (activeTools.includes('support')) {
          if (indicators.support) indicators.support.forEach((level, idx) => {
            const line = chart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 1 });
            line.setData(data.map(d => ({ time: d.time, value: level })));
            seriesRef.current['support' + idx] = line;
          });
          if (indicators.resistance) indicators.resistance.forEach((level, idx) => {
            const line = chart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 1 });
            line.setData(data.map(d => ({ time: d.time, value: level })));
            seriesRef.current['resistance' + idx] = line;
          });
        }
      }, [activeTools, data, indicators]);

      const toggleTool = (toolId) => {
        if (toolId === 'ai') {
          if (!aiEnabled && indicators) {
            setAiEnabled(true);
            const result = performSmartAnalysis(price, indicators, activeTools, toolSettings);
            setAiResult(result);
          } else {
            setAiEnabled(false);
            setAiResult(null);
          }
        } else {
          setActiveTools(prev => prev.includes(toolId) ? prev.filter(t => t !== toolId) : [...prev, toolId]);
          if (aiEnabled && indicators) {
            setTimeout(() => {
              const newActiveTools = activeTools.includes(toolId) ? activeTools.filter(t => t !== toolId) : [...activeTools, toolId];
              const result = performSmartAnalysis(price, indicators, newActiveTools, toolSettings);
              setAiResult(result);
            }, 100);
          }
        }
      };

      const getToolResult = (toolId) => {
        if (!indicators || !price) return null;
        switch (toolId) {
          case 'ema': const above = [20, 50, 200].filter(p => price > indicators['ema' + p]).length; return { value: above + '/3', signal: above >= 2 ? 'bullish' : 'bearish' };
          case 'rsi': return { value: indicators.rsi ? indicators.rsi.toFixed(0) : '-', signal: indicators.rsi < 30 ? 'bullish' : indicators.rsi > 70 ? 'bearish' : 'neutral' };
          case 'macd': return { value: indicators.macdHist > 0 ? '▲' : '▼', signal: indicators.macdHist > 0 ? 'bullish' : 'bearish' };
          case 'bollinger': return { value: price < indicators.bbLower ? '🟢' : price > indicators.bbUpper ? '🔴' : '⚪', signal: price < indicators.bbLower ? 'bullish' : price > indicators.bbUpper ? 'bearish' : 'neutral' };
          case 'vwap': return { value: price > indicators.vwap ? '⬆️' : '⬇️', signal: price > indicators.vwap ? 'bullish' : 'neutral' };
          case 'stochastic': return { value: indicators.stochK ? indicators.stochK.toFixed(0) : '-', signal: indicators.stochK < 20 ? 'bullish' : indicators.stochK > 80 ? 'bearish' : 'neutral' };
          case 'adx': return { value: indicators.adx ? indicators.adx.toFixed(0) : '-', signal: indicators.adx > 25 ? 'bullish' : 'neutral' };
          case 'atr': return { value: indicators.atrPercent ? indicators.atrPercent.toFixed(1) + '%' : '-', signal: 'neutral' };
          case 'fibonacci': return { value: '📐', signal: 'neutral' };
          case 'support': return { value: (indicators.support ? indicators.support.length : 0) + '', signal: 'neutral' };
          default: return null;
        }
      };

      const getSignalColor = (signal) => signal === 'bullish' ? 'bg-green-900/50 text-green-400 border-green-600' : signal === 'bearish' ? 'bg-red-900/50 text-red-400 border-red-600' : 'bg-gray-800 text-gray-400 border-gray-600';
      const periodConfig = TIME_PERIODS.find(p => p.id === period);

      return (
        <div className="pb-20">
          <div className="flex gap-2 overflow-x-auto no-scrollbar px-4 py-3">
            {COINS.map(c => (
              <button key={c.symbol} onClick={() => { setCoin(c); setAiResult(null); setAiEnabled(false); }} className={'flex items-center gap-2 px-4 py-2 rounded-xl whitespace-nowrap ' + (coin.symbol === c.symbol ? 'ai-gradient' : 'glass')}>
                <span className="text-lg">{c.icon}</span>
                <span className="text-sm">{c.name}</span>
              </button>
            ))}
          </div>

          <div className="glass rounded-xl p-3 mx-4 mb-3">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-3">
                <span className="text-3xl">{coin.icon}</span>
                <div>
                  <p className="font-bold">{coin.name}</p>
                  <p className="text-xs text-gray-400">{periodConfig ? periodConfig.label : ''}</p>
                </div>
              </div>
              <div className="text-left">
                <p className="text-2xl font-bold">${formatPrice(price)}</p>
                <p className={'text-sm ' + (priceChange >= 0 ? 'text-green-400' : 'text-red-400')}>{priceChange >= 0 ? '▲' : '▼'} {Math.abs(priceChange).toFixed(2)}%</p>
              </div>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-3">
            {TIME_PERIODS.map(p => (
              <button key={p.id} onClick={() => { setPeriod(p.id); setAiResult(null); setAiEnabled(false); }} className={'px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ' + (period === p.id ? 'ai-gradient' : 'glass')}>{p.label}</button>
            ))}
          </div>

          <div className="glass rounded-xl p-2 mx-4 mb-1">
            {loading ? (
              <div className="h-[220px] flex items-center justify-center">
                <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              </div>
            ) : (
              <div ref={chartContainerRef} style={{ height: 220 }}></div>
            )}
          </div>

          {activeTools.includes('rsi') && indicators && !loading && (
            <div className="glass rounded-xl p-2 mx-4 mb-1 animate-slideUp">
              <div className="flex justify-between items-center px-2 mb-1">
                <span className="text-xs text-purple-400 font-bold">💪 RSI (14)</span>
                <span className={'text-sm font-bold ' + (indicators.rsi < 30 ? 'text-green-400' : indicators.rsi > 70 ? 'text-red-400' : 'text-gray-300')}>{indicators.rsi ? indicators.rsi.toFixed(1) : '-'}</span>
              </div>
              <RSIChart data={data} rsiData={indicators.rsiData} />
            </div>
          )}

          {activeTools.includes('macd') && indicators && !loading && (
            <div className="glass rounded-xl p-2 mx-4 mb-1 animate-slideUp">
              <div className="flex justify-between items-center px-2 mb-1">
                <span className="text-xs text-green-400 font-bold">🚀 MACD</span>
                <span className={'text-sm font-bold ' + (indicators.macdHist > 0 ? 'text-green-400' : 'text-red-400')}>{indicators.macdHist > 0 ? '▲ صعودي' : '▼ هبوطي'}</span>
              </div>
              <MACDChart data={data} macdData={indicators.macdData} />
            </div>
          )}

          {activeTools.includes('stochastic') && indicators && !loading && (
            <div className="glass rounded-xl p-2 mx-4 mb-1 animate-slideUp">
              <div className="flex justify-between items-center px-2 mb-1">
                <span className="text-xs text-cyan-400 font-bold">⚡ Stochastic</span>
                <span className="text-sm font-bold text-gray-300">K: {indicators.stochK ? indicators.stochK.toFixed(0) : '-'} | D: {indicators.stochD ? indicators.stochD.toFixed(0) : '-'}</span>
              </div>
              <StochChart data={data} stochData={indicators.stochData} />
            </div>
          )}

          <div className="px-4 mb-3">
            <p className="text-sm text-gray-400 mb-2">🔧 أدوات التحليل:</p>
            <div className="flex flex-wrap gap-2">
              {TOOLS.map(tool => {
                const isActive = activeTools.includes(tool.id);
                const result = isActive ? getToolResult(tool.id) : null;
                return (
                  <button key={tool.id} onClick={() => toggleTool(tool.id)} className={'flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border ' + (isActive ? getSignalColor(result ? result.signal : 'neutral') : 'glass border-transparent opacity-50')}>
                    <span>{tool.icon}</span>
                    <span>{tool.name}</span>
                    {result && <span className="text-xs opacity-75">({result.value})</span>}
                  </button>
                );
              })}
            </div>
            <button onClick={() => toggleTool('ai')} className={'w-full mt-3 py-3 rounded-xl font-bold flex items-center justify-center gap-2 ' + (aiEnabled ? 'ai-gradient animate-glow' : 'ai-border')}>
              <span className="text-xl">🤖</span>
              <span>تحليل الذكاء الاصطناعي</span>
              <span className={'w-5 h-5 rounded-full border-2 flex items-center justify-center ' + (aiEnabled ? 'bg-white border-white' : 'border-gray-500')}>{aiEnabled && <span className="text-indigo-600 text-xs">✓</span>}</span>
            </button>
          </div>

          {aiEnabled && aiResult && (
            <div className="space-y-3 mx-4 animate-slideUp">
              <div className={'rounded-xl p-4 text-center ' + (aiResult.decision === 'شراء قوي' ? 'bg-gradient-to-r from-green-600 to-emerald-700' : aiResult.decision === 'شراء' ? 'bg-gradient-to-r from-green-700 to-green-800' : aiResult.decision === 'انتظار' ? 'bg-gradient-to-r from-yellow-600 to-amber-700' : aiResult.decision === 'تراجع' ? 'bg-gradient-to-r from-orange-600 to-orange-700' : 'bg-gradient-to-r from-red-600 to-red-700')}>
                <p className="text-4xl mb-2">{aiResult.decisionEmoji}</p>
                <p className="text-3xl font-bold">{aiResult.decision}</p>
                <p className="text-lg mt-1">الثقة: {aiResult.confidence}%</p>
                <div className="flex justify-center gap-4 mt-2 text-sm">
                  <span>🟢 {aiResult.bullishScore ? aiResult.bullishScore.toFixed(1) : '0'}</span>
                  <span>🔴 {aiResult.bearishScore ? aiResult.bearishScore.toFixed(1) : '0'}</span>
                </div>
              </div>

              <div className="ai-border p-4">
                <p className="text-sm text-gray-400 mb-2">🧠 التحليل:</p>
                <p className="text-sm leading-relaxed">{aiResult.analysis}</p>
              </div>

              {aiResult.comparison && aiResult.comparison.length > 0 && (
                <div className="glass rounded-xl p-4">
                  <p className="text-sm text-gray-400 mb-2">📊 مقارنة المؤشرات:</p>
                  <div className="space-y-2">
                    {aiResult.comparison.map((comp, i) => (
                      <div key={i} className={'flex justify-between items-center p-2 rounded-lg ' + (comp.match ? 'bg-green-900/30' : 'bg-yellow-900/30')}>
                        <span className="font-bold text-sm">{comp.tool}</span>
                        <div className="flex items-center gap-2">
                          <span className="text-xs">{comp.your_result}</span>
                          <span>{comp.match ? '✅' : '💡'}</span>
                          <span className="text-xs text-gray-400">{comp.ai_says}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {aiResult.suggestions && (
                <div className="glass rounded-xl p-4">
                  <p className="text-sm text-gray-400 mb-2">💡 اقتراحات:</p>
                  <p className="text-sm">{aiResult.suggestions}</p>
                </div>
              )}

              <div className="glass rounded-xl p-4">
                <p className="text-sm text-gray-400 mb-2">🎯 نقاط الدخول:</p>
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-blue-900/30 rounded-lg p-2 text-center">
                    <p className="text-xs text-blue-300">📍 دخول</p>
                    <p className="font-bold">${formatPrice(aiResult.entry)}</p>
                  </div>
                  <div className="bg-red-900/30 rounded-lg p-2 text-center">
                    <p className="text-xs text-red-300">🛑 وقف</p>
                    <p className="font-bold">${formatPrice(aiResult.stopLoss)}</p>
                  </div>
                  <div className="bg-green-900/30 rounded-lg p-2 text-center">
                    <p className="text-xs text-green-300">🎯 هدف 1</p>
                    <p className="font-bold">${formatPrice(aiResult.target1)}</p>
                  </div>
                  <div className="bg-green-900/40 rounded-lg p-2 text-center">
                    <p className="text-xs text-green-300">🎯 هدف 2</p>
                    <p className="font-bold">${formatPrice(aiResult.target2)}</p>
                  </div>
                </div>
              </div>

              {aiResult.warnings && (
                <div className="bg-yellow-900/30 border border-yellow-600/50 rounded-xl p-4">
                  <p className="text-sm text-yellow-400 mb-1">⚠️ تحذيرات:</p>
                  <p className="text-yellow-200 text-sm">{aiResult.warnings}</p>
                </div>
              )}
            </div>
          )}
        </div>

    function NewsPage() {
      const [news, setNews] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');

      useEffect(() => { loadNews(); }, []);

      const loadNews = async () => {
        setLoading(true);
        try {
          const response = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,ETH,Trading,Regulation');
          const data = await response.json();
          const newsItems = data.Data ? data.Data.slice(0, 15) : [];
          const analyzed = newsItems.map(item => {
            const title = item.title.toLowerCase();
            let sentiment = 'neutral';
            if (title.includes('surge') || title.includes('rally') || title.includes('bull') || title.includes('gain') || title.includes('rise') || title.includes('soar') || title.includes('jump')) sentiment = 'positive';
            else if (title.includes('crash') || title.includes('drop') || title.includes('bear') || title.includes('fall') || title.includes('plunge') || title.includes('sink') || title.includes('warn')) sentiment = 'negative';
            return { ...item, sentiment: sentiment, impact: Math.random() > 0.7 ? 'high' : Math.random() > 0.4 ? 'medium' : 'low' };
          });
          setNews(analyzed);
        } catch (e) {
          console.error(e);
          setNews([]);
        }
        setLoading(false);
      };

      const filteredNews = news.filter(n => filter === 'all' || n.sentiment === filter);

      const getSentimentStyle = (sentiment) => {
        if (sentiment === 'positive') return { bg: 'bg-green-900/30', border: 'border-green-600', dot: 'bg-green-500' };
        if (sentiment === 'negative') return { bg: 'bg-red-900/30', border: 'border-red-600', dot: 'bg-red-500' };
        return { bg: 'bg-gray-800', border: 'border-gray-600', dot: 'bg-yellow-500' };
      };

      const getImpactStars = (impact) => impact === 'high' ? '⭐⭐⭐' : impact === 'medium' ? '⭐⭐' : '⭐';

      const positiveCount = news.filter(n => n.sentiment === 'positive').length;
      const negativeCount = news.filter(n => n.sentiment === 'negative').length;
      const neutralCount = news.filter(n => n.sentiment === 'neutral').length;
      const marketMood = positiveCount > negativeCount ? 'bullish' : negativeCount > positiveCount ? 'bearish' : 'neutral';

      return (
        <div className="pb-20 px-4">
          <div className="flex justify-between items-center py-3">
            <h2 className="text-xl font-bold">📰 أخبار السوق</h2>
            <button onClick={loadNews} className="p-2 glass rounded-lg">{loading ? <span className="animate-spin">⏳</span> : '🔄'}</button>
          </div>

          <div className={'rounded-xl p-4 mb-4 ' + (marketMood === 'bullish' ? 'bg-gradient-to-r from-green-900/50 to-green-800/50' : marketMood === 'bearish' ? 'bg-gradient-to-r from-red-900/50 to-red-800/50' : 'bg-gradient-to-r from-gray-800 to-gray-700')}>
            <div className="flex items-center gap-3 mb-2">
              <span className="text-3xl">{marketMood === 'bullish' ? '🐂' : marketMood === 'bearish' ? '🐻' : '😐'}</span>
              <div>
                <p className="font-bold">مزاج السوق: {marketMood === 'bullish' ? 'صعودي' : marketMood === 'bearish' ? 'هبوطي' : 'محايد'}</p>
              </div>
            </div>
            <div className="flex gap-4 text-sm">
              <span className="text-green-400">🟢 {positiveCount}</span>
              <span className="text-yellow-400">🟡 {neutralCount}</span>
              <span className="text-red-400">🔴 {negativeCount}</span>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar mb-3 -mx-4 px-4">
            {[{ id: 'all', label: 'الكل', icon: '📋' }, { id: 'positive', label: 'إيجابي', icon: '🟢' }, { id: 'neutral', label: 'محايد', icon: '🟡' }, { id: 'negative', label: 'سلبي', icon: '🔴' }].map(f => (
              <button key={f.id} onClick={() => setFilter(f.id)} className={'flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ' + (filter === f.id ? 'ai-gradient' : 'glass')}>
                <span>{f.icon}</span>
                <span>{f.label}</span>
              </button>
            ))}
          </div>

          {loading ? (
            <div className="space-y-3">
              {[1, 2, 3, 4, 5].map(i => (
                <div key={i} className="glass rounded-xl p-4 animate-pulse">
                  <div className="h-4 bg-gray-700 rounded w-3/4 mb-2"></div>
                  <div className="h-3 bg-gray-700 rounded w-1/2"></div>
                </div>
              ))}
            </div>
          ) : (
            <div className="space-y-3">
              {filteredNews.map((item, i) => {
                const style = getSentimentStyle(item.sentiment);
                return (
                  <div key={i} className={'rounded-xl p-4 border ' + style.bg + ' ' + style.border + ' animate-slideUp'}>
                    <div className="flex items-start gap-3">
                      <div className={'w-3 h-3 rounded-full mt-1.5 ' + style.dot}></div>
                      <div className="flex-1">
                        <p className="font-bold text-sm mb-1">{item.title}</p>
                        <div className="flex flex-wrap gap-2 mb-2">
                          <span className="text-xs">{getImpactStars(item.impact)}</span>
                        </div>
                        <div className="flex justify-between items-center text-xs text-gray-400">
                          <span>{item.source || 'CryptoCompare'}</span>
                          <span>{timeAgo(item.published_on * 1000)}</span>
                        </div>
                      </div>
                    </div>
                    {item.url && (
                      <a href={item.url} target="_blank" rel="noopener noreferrer" className="block mt-2 text-xs text-indigo-400 hover:underline">📖 قراءة المزيد</a>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState('analysis');
      return (
        <div className="min-h-screen bg-[#0a0a0f] text-white">
          <div className="ai-gradient p-4 sticky top-0 z-30">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold">⚡ AQ Pro</h1>
                <p className="text-xs opacity-80">التحليل الذكي للعملات الرقمية</p>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-2xl">🤖</span>
                <span className="px-2 py-1 rounded-full text-xs bg-white/20">AI</span>
              </div>
            </div>
          </div>
          <div className="pt-2">
            {page === 'analysis' && <AnalysisPage />}
            {page === 'news' && <NewsPage />}
          </div>
          <div className="fixed bottom-0 left-0 right-0 bg-[#0a0a0f]/95 backdrop-blur-lg border-t border-white/10 px-4 py-3 z-40">
            <div className="flex justify-around max-w-md mx-auto">
              <button onClick={() => setPage('analysis')} className={'flex flex-col items-center gap-1 px-6 py-2 rounded-xl ' + (page === 'analysis' ? 'ai-gradient' : '')}>
                <span className="text-xl">📊</span>
                <span className="text-xs">التحليل</span>
              </button>
              <button onClick={() => setPage('news')} className={'flex flex-col items-center gap-1 px-6 py-2 rounded-xl ' + (page === 'news' ? 'ai-gradient' : '')}>
                <span className="text-xl">📰</span>
                <span className="text-xs">الأخبار</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
