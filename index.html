<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AQ Pro v14 - ML حقيقي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; font-family: system-ui; color: white; overflow-x: hidden; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .ai-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .ml-gradient { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    input[type="number"] { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; color: white; width: 80px; text-align: center; }
    .toggle-btn.active { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .live-dot { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .signal-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .training-bar { transition: width 0.3s ease; }
    .glow { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    let currentPage = 'analysis';
    let currentCoin = 'BTCUSDT';
    let currentPeriod = '1h';
    let chartData = [];
    let currentPrice = 0;
    let priceChange = 0;
    let mainChart = null, rsiChart = null, macdChart = null, aiChart = null, mlChart = null;
    let fearGreedData = null;
    let indicators = {};
    let riskCapital = 1000;
    let riskPercent = 2;
    let priceInterval = null;
    
    // ML Variables
    let mlModel = null;
    let isTraining = false;
    let trainingProgress = 0;
    let trainingEpoch = 0;
    let totalEpochs = 50;
    let trainingLoss = 0;
    let trainingAccuracy = 0;
    let trainingTime = 0;
    let trainingStartTime = null;
    let mlPredictions = null;
    let modelTrained = false;

    let toolSettings = {
      ema: { enabled: true, periods: { 9: true, 20: true, 50: true, 100: false, 200: true } },
      rsi: { enabled: true, period: 14, oversold: 30, overbought: 70 },
      macd: { enabled: true, fast: 12, slow: 26, signal: 9 },
      bollinger: { enabled: true, period: 20, deviation: 2 },
      vwap: { enabled: true }
    };

    const coins = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎' },
      { symbol: 'ADAUSDT', name: 'كاردانو', icon: '₳' },
      { symbol: 'DOGEUSDT', name: 'دوجكوين', icon: 'Ð' },
      { symbol: 'DOTUSDT', name: 'بولكادوت', icon: '●' },
      { symbol: 'AVAXUSDT', name: 'أفالانش', icon: '▲' },
      { symbol: 'MATICUSDT', name: 'بوليجون', icon: '⬡' }
    ];

    const periods = [
      { id: '15m', label: '15د', interval: '1m', limit: 100 },
      { id: '30m', label: '30د', interval: '1m', limit: 100 },
      { id: '1h', label: '1س', interval: '5m', limit: 100 },
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 }
    ];

    // ========== ML Functions ==========
    function prepareMLData(data, lookback = 20) {
      const X = [], y = [];
      const prices = data.map(d => d.close);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const normalized = prices.map(p => (p - min) / (max - min));
      
      for (let i = lookback; i < normalized.length - 1; i++) {
        X.push(normalized.slice(i - lookback, i));
        y.push(normalized[i + 1] > normalized[i] ? 1 : 0);
      }
      return { X, y, min, max, normalized };
    }

    async function buildModel(inputShape) {
      const model = tf.sequential();
      model.add(tf.layers.lstm({ units: 32, returnSequences: true, inputShape: [inputShape, 1] }));
      model.add(tf.layers.dropout({ rate: 0.2 }));
      model.add(tf.layers.lstm({ units: 16, returnSequences: false }));
      model.add(tf.layers.dropout({ rate: 0.2 }));
      model.add(tf.layers.dense({ units: 8, activation: 'relu' }));
      model.add(tf.layers.dense({ units: 1, activation: 'sigmoid' }));
      model.compile({ optimizer: tf.train.adam(0.001), loss: 'binaryCrossentropy', metrics: ['accuracy'] });
      return model;
    }

    async function trainModel() {
      if (isTraining || chartData.length < 50) return;
      
      isTraining = true;
      trainingProgress = 0;
      trainingEpoch = 0;
      trainingStartTime = Date.now();
      modelTrained = false;
      render();
      
      try {
        const lookback = 20;
        const { X, y, min, max } = prepareMLData(chartData, lookback);
        
        if (X.length < 20) {
          alert('بيانات غير كافية');
          isTraining = false;
          render();
          return;
        }
        
        const xTensor = tf.tensor3d(X.map(seq => seq.map(v => [v])));
        const yTensor = tf.tensor2d(y.map(v => [v]));
        
        mlModel = await buildModel(lookback);
        totalEpochs = 50;
        
        await mlModel.fit(xTensor, yTensor, {
          epochs: totalEpochs,
          batchSize: 16,
          validationSplit: 0.2,
          shuffle: true,
          callbacks: {
            onEpochEnd: async (epoch, logs) => {
              trainingEpoch = epoch + 1;
              trainingProgress = ((epoch + 1) / totalEpochs) * 100;
              trainingLoss = logs.loss;
              trainingAccuracy = logs.acc * 100;
              trainingTime = (Date.now() - trainingStartTime) / 1000;
              render();
              await tf.nextFrame();
            }
          }
        });
        
        mlModel.normMin = min;
        mlModel.normMax = max;
        mlModel.lookback = lookback;
        
        await makePredictions();
        modelTrained = true;
        xTensor.dispose();
        yTensor.dispose();
        
      } catch (error) {
        console.error('Training error:', error);
        alert('خطأ: ' + error.message);
      }
      
      isTraining = false;
      render();
    }

    async function makePredictions() {
      if (!mlModel || chartData.length < mlModel.lookback) return;
      
      const lookback = mlModel.lookback;
      const prices = chartData.slice(-lookback).map(d => d.close);
      const min = mlModel.normMin;
      const max = mlModel.normMax;
      const normalized = prices.map(p => (p - min) / (max - min));
      
      const input = tf.tensor3d([[normalized.map(v => [v])]]).reshape([1, lookback, 1]);
      const prediction = mlModel.predict(input);
      const predValue = (await prediction.data())[0];
      
      const avgChange = chartData.slice(-20).reduce((sum, d, i, arr) => {
        if (i === 0) return sum;
        return sum + Math.abs(d.close - arr[i-1].close);
      }, 0) / 19;
      
      const direction = predValue > 0.5 ? 'up' : 'down';
      const confidence = Math.abs(predValue - 0.5) * 200;
      const change = avgChange * (predValue > 0.5 ? 1 : -1) * (confidence / 100);
      
      mlPredictions = {
        direction,
        confidence: Math.min(95, confidence),
        probability: predValue * 100,
        price1h: currentPrice + change,
        price4h: currentPrice + change * 2.5,
        price24h: currentPrice + change * 8,
        timestamp: new Date()
      };
      
      input.dispose();
      prediction.dispose();
    }

    // ========== Price & Indicators ==========
    async function fetchLivePrice() {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentCoin}`);
        const data = await res.json();
        if (data?.price) currentPrice = parseFloat(data.price);
      } catch (e) { console.error(e); }
    }

    function startLiveUpdates() {
      if (priceInterval) clearInterval(priceInterval);
      fetchLivePrice();
      priceInterval = setInterval(fetchLivePrice, 5000);
    }

    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = []; const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return [];
      const result = [null];
      for (let i = 1; i < data.length; i++) {
        if (i < period) { result.push(null); continue; }
        let gains = 0, losses = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const change = data[j].close - data[j-1].close;
          if (change > 0) gains += change; else losses -= change;
        }
        result.push(losses === 0 ? 100 : 100 - (100 / (1 + (gains/period) / (losses/period))));
      }
      return result;
    }

    function calcMACD(data, fast, slow, signal) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);
      const macdLine = emaFast.map((v, i) => (v && emaSlow[i]) ? v - emaSlow[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calcEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => (v && signalLine[i]) ? v - signalLine[i] : null);
      return { histogram };
    }

    function calcBollinger(data, period, deviation) {
      const sma = data.map((d, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);
      const upper = [], lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + deviation * std); lower.push(sma[i] - deviation * std);
      }
      return { upper, lower };
    }

    function calculateIndicators() {
      if (!chartData.length) return;
      const last = chartData.length - 1;
      const s = toolSettings;
      const emaData = {};
      [9, 20, 50, 100, 200].forEach(p => { if (s.ema.periods[p]) emaData[p] = calcEMA(chartData, p); });
      const rsi = calcRSI(chartData, s.rsi.period);
      const macd = calcMACD(chartData, s.macd.fast, s.macd.slow, s.macd.signal);
      const bollinger = calcBollinger(chartData, s.bollinger.period, s.bollinger.deviation);
      indicators = { emaData, rsi: rsi[last], rsiData: rsi, macdHist: macd.histogram[last], macdData: macd, bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bollingerData: bollinger };
    }

    function getSmartSignal() {
      let score = 0; const signals = [];
      if (toolSettings.rsi.enabled && indicators.rsi) {
        if (indicators.rsi < 30) { score += 25; signals.push('RSI مشبع بيع'); }
        else if (indicators.rsi < 45) { score += 10; signals.push('RSI منخفض'); }
        else if (indicators.rsi > 70) { score -= 25; signals.push('RSI مشبع شراء'); }
        else if (indicators.rsi > 55) { score -= 10; signals.push('RSI مرتفع'); }
      }
      if (toolSettings.macd.enabled && indicators.macdHist !== null) {
        if (indicators.macdHist > 0) { score += 15; signals.push('MACD إيجابي'); }
        else { score -= 15; signals.push('MACD سلبي'); }
      }
      if (mlPredictions) {
        if (mlPredictions.direction === 'up' && mlPredictions.confidence > 55) { score += 20; signals.push('🧠 ML صعود'); }
        else if (mlPredictions.direction === 'down' && mlPredictions.confidence > 55) { score -= 20; signals.push('🧠 ML هبوط'); }
      }
      
      let signalEmoji, signalColor, signalText;
      if (score >= 35) { signalEmoji = '🏆'; signalColor = 'from-yellow-500 to-amber-600'; signalText = 'إشارة ذهبية!'; }
      else if (score >= 15) { signalEmoji = '🥈'; signalColor = 'from-gray-400 to-gray-500'; signalText = 'إشارة فضية'; }
      else if (score >= 5) { signalEmoji = '📈'; signalColor = 'from-green-600 to-green-700'; signalText = 'ميل صعودي'; }
      else if (score >= -5) { signalEmoji = '➡️'; signalColor = 'from-gray-600 to-gray-700'; signalText = 'محايد'; }
      else if (score >= -15) { signalEmoji = '📉'; signalColor = 'from-orange-500 to-orange-600'; signalText = 'ميل هبوطي'; }
      else { signalEmoji = '🛑'; signalColor = 'from-red-600 to-red-700'; signalText = 'إشارة بيع'; }
      return { signalEmoji, signalColor, signalText, score, signals };
    }

    function formatPrice(p) { if (!p || isNaN(p)) return '-'; return p >= 1000 ? '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : p >= 1 ? '$' + p.toFixed(4) : '$' + p.toFixed(6); }

    // ========== Render ==========
    function render() {
      const coin = coins.find(c => c.symbol === currentCoin);
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen pb-24">
          <div class="${currentPage === 'ml' ? 'ml-gradient' : 'ai-gradient'} p-4">
            <div class="flex justify-between items-center">
              <div><h1 class="text-xl font-bold">⚡ AQ Pro v14</h1><p class="text-xs opacity-80">${currentPage === 'ml' ? '🧠 Machine Learning' : 'التحليل الذكي'}</p></div>
              <div class="flex items-center gap-2"><span class="live-dot w-2 h-2 bg-green-400 rounded-full"></span><span class="text-xs">LIVE</span></div>
            </div>
          </div>
          ${currentPage === 'analysis' ? renderAnalysisPage(coin) : ''}
          ${currentPage === 'tools' ? renderToolsPage() : ''}
          ${currentPage === 'ai' ? renderAIPage() : ''}
          ${currentPage === 'ml' ? renderMLPage() : ''}
          ${currentPage === 'news' ? renderNewsPage() : ''}
          <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0f]/95 backdrop-blur border-t border-white/10 px-2 py-2 z-50">
            <div class="flex justify-around max-w-md mx-auto">
              <button onclick="switchPage('analysis')" class="flex flex-col items-center gap-1 px-2 py-1.5 rounded-xl ${currentPage === 'analysis' ? 'ai-gradient' : ''}"><span class="text-lg">📊</span><span class="text-[10px]">الشارت</span></button>
              <button onclick="switchPage('tools')" class="flex flex-col items-center gap-1 px-2 py-1.5 rounded-xl ${currentPage === 'tools' ? 'ai-gradient' : ''}"><span class="text-lg">🔧</span><span class="text-[10px]">الأدوات</span></button>
              <button onclick="switchPage('ai')" class="flex flex-col items-center gap-1 px-2 py-1.5 rounded-xl ${currentPage === 'ai' ? 'ai-gradient' : ''}"><span class="text-lg">🤖</span><span class="text-[10px]">الذكاء</span></button>
              <button onclick="switchPage('ml')" class="flex flex-col items-center gap-1 px-2 py-1.5 rounded-xl ${currentPage === 'ml' ? 'ml-gradient glow' : ''}"><span class="text-lg">🧠</span><span class="text-[10px]">ML</span></button>
              <button onclick="switchPage('news')" class="flex flex-col items-center gap-1 px-2 py-1.5 rounded-xl ${currentPage === 'news' ? 'ai-gradient' : ''}"><span class="text-lg">📰</span><span class="text-[10px]">الأخبار</span></button>
            </div>
          </div>
        </div>
      `;
      if (currentPage === 'analysis') setTimeout(createCharts, 100);
      if (currentPage === 'ai') setTimeout(createAIChart, 100);
      if (currentPage === 'ml' && modelTrained) setTimeout(createMLChart, 100);
    }

    function renderAnalysisPage(coin) {
      return `
        <div class="flex gap-2 overflow-x-auto hide-scroll px-4 py-3">${coins.map(c => `<button onclick="selectCoin('${c.symbol}')" class="flex items-center gap-2 px-3 py-2 rounded-xl whitespace-nowrap ${c.symbol === currentCoin ? 'ai-gradient' : 'glass'}"><span>${c.icon}</span><span class="text-sm">${c.name}</span></button>`).join('')}</div>
        <div class="glass rounded-xl p-4 mx-4 mb-3">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-3"><span class="text-3xl">${coin?.icon}</span><div><p class="font-bold">${coin?.name}</p></div></div>
            <div class="text-left"><p class="text-2xl font-bold">${formatPrice(currentPrice)}</p><p class="text-sm ${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%</p></div>
          </div>
        </div>
        <div class="flex gap-2 overflow-x-auto hide-scroll px-4 mb-3">${periods.map(p => `<button onclick="selectPeriod('${p.id}')" class="px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${p.id === currentPeriod ? 'ai-gradient' : 'glass'}">${p.label}</button>`).join('')}</div>
        <div class="glass rounded-xl p-2 mx-4 mb-2"><div id="mainChart" style="height: 250px;"></div></div>
        ${toolSettings.rsi.enabled ? `<div class="glass rounded-xl p-2 mx-4 mb-2"><div class="flex justify-between px-2 mb-1"><span class="text-xs text-purple-400">💪 RSI</span><span class="text-sm font-bold">${indicators.rsi?.toFixed(1) || '-'}</span></div><div id="rsiChart" style="height: 70px;"></div></div>` : ''}
        ${toolSettings.macd.enabled ? `<div class="glass rounded-xl p-2 mx-4 mb-2"><div class="flex justify-between px-2 mb-1"><span class="text-xs text-green-400">🚀 MACD</span><span class="text-sm font-bold">${indicators.macdHist > 0 ? '▲' : '▼'}</span></div><div id="macdChart" style="height: 70px;"></div></div>` : ''}
      `;
    }

    function renderToolsPage() {
      const s = toolSettings;
      return `
        <div class="px-4 py-3 space-y-3">
          <h2 class="text-xl font-bold">🔧 الأدوات</h2>
          <div class="glass rounded-xl p-4 space-y-3">
            <div class="flex justify-between"><span>📈 EMA</span><button onclick="toggleTool('ema')" class="toggle-btn px-3 py-1 rounded-lg ${s.ema.enabled ? 'active' : 'bg-gray-700'}">${s.ema.enabled ? '✓' : '○'}</button></div>
            <div class="flex justify-between"><span>💪 RSI</span><button onclick="toggleTool('rsi')" class="toggle-btn px-3 py-1 rounded-lg ${s.rsi.enabled ? 'active' : 'bg-gray-700'}">${s.rsi.enabled ? '✓' : '○'}</button></div>
            <div class="flex justify-between"><span>🚀 MACD</span><button onclick="toggleTool('macd')" class="toggle-btn px-3 py-1 rounded-lg ${s.macd.enabled ? 'active' : 'bg-gray-700'}">${s.macd.enabled ? '✓' : '○'}</button></div>
            <div class="flex justify-between"><span>📊 بولنجر</span><button onclick="toggleTool('bollinger')" class="toggle-btn px-3 py-1 rounded-lg ${s.bollinger.enabled ? 'active' : 'bg-gray-700'}">${s.bollinger.enabled ? '✓' : '○'}</button></div>
          </div>
          <button onclick="switchPage('analysis')" class="w-full py-4 rounded-xl ai-gradient font-bold">✅ تطبيق</button>
        </div>
      `;
    }

    function renderAIPage() {
      const signal = getSmartSignal();
      const coin = coins.find(c => c.symbol === currentCoin);
      return `
        <div class="px-4 py-3 space-y-4">
          <div class="flex gap-2 overflow-x-auto hide-scroll -mx-4 px-4">${coins.slice(0,5).map(c => `<button onclick="selectCoin('${c.symbol}')" class="flex items-center gap-2 px-3 py-2 rounded-xl whitespace-nowrap ${c.symbol === currentCoin ? 'ai-gradient' : 'glass'}"><span>${c.icon}</span><span class="text-sm">${c.name}</span></button>`).join('')}</div>
          <div class="glass rounded-xl p-4"><div class="flex justify-between"><div><p class="text-gray-400 text-sm">${coin?.name}</p><p class="text-3xl font-bold">${formatPrice(currentPrice)}</p></div><p class="${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%</p></div></div>
          <div class="glass rounded-xl p-2"><div id="aiChart" style="height: 180px;"></div></div>
          <div class="rounded-xl p-4 bg-gradient-to-r ${signal.signalColor} signal-pulse"><div class="text-center"><p class="text-4xl mb-2">${signal.signalEmoji}</p><p class="text-xl font-bold">${signal.signalText}</p><p class="text-sm mt-2">القوة: ${signal.score}</p></div></div>
          ${signal.signals.length ? `<div class="glass rounded-xl p-4"><p class="text-sm text-gray-400 mb-2">الأسباب:</p><div class="flex flex-wrap gap-2">${signal.signals.map(s => `<span class="px-2 py-1 rounded text-xs bg-purple-900/50">${s}</span>`).join('')}</div></div>` : ''}
          ${mlPredictions ? `<div class="glass rounded-xl p-4 border-2 border-purple-500"><div class="flex justify-between"><div><p class="text-purple-400 text-sm">🧠 توقع ML</p><p class="text-xl font-bold">${mlPredictions.direction === 'up' ? '📈 صعود' : '📉 هبوط'}</p></div><p class="text-2xl font-bold">${mlPredictions.confidence.toFixed(0)}%</p></div></div>` : '<div class="glass rounded-xl p-4 text-center text-gray-400">🧠 اذهب لصفحة ML للتدريب</div>'}
        </div>
      `;
    }

    function renderMLPage() {
      const coin = coins.find(c => c.symbol === currentCoin);
      const proAccuracy = 78;
      const myAccuracy = trainingAccuracy || 0;
      const accuracyDiff = myAccuracy - proAccuracy;
      
      return `
        <div class="px-4 py-3 space-y-4">
          <div class="text-center"><h2 class="text-2xl font-bold">🧠 Machine Learning</h2><p class="text-gray-400 text-sm">نموذج LSTM حقيقي - TensorFlow.js</p></div>
          
          <div class="flex gap-2 overflow-x-auto hide-scroll -mx-4 px-4">${coins.slice(0,5).map(c => `<button onclick="selectCoin('${c.symbol}')" class="flex items-center gap-2 px-3 py-2 rounded-xl whitespace-nowrap ${c.symbol === currentCoin ? 'ml-gradient' : 'glass'}"><span>${c.icon}</span><span class="text-sm">${c.name}</span></button>`).join('')}</div>
          
          <div class="glass rounded-xl p-4"><div class="flex justify-between"><div><p class="text-gray-400 text-sm">${coin?.name}</p><p class="text-2xl font-bold">${formatPrice(currentPrice)}</p></div><p class="${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%</p></div></div>
          
          <button onclick="trainModel()" ${isTraining ? 'disabled' : ''} class="w-full py-4 rounded-xl ${isTraining ? 'bg-gray-700' : 'ml-gradient'} text-lg font-bold">${isTraining ? '⏳ جاري التدريب...' : '🚀 بدء تدريب النموذج'}</button>
          
          ${isTraining ? `
          <div class="glass rounded-xl p-4">
            <div class="flex justify-between mb-2"><span>التقدم</span><span>${trainingEpoch}/${totalEpochs}</span></div>
            <div class="w-full bg-gray-700 rounded-full h-4"><div class="training-bar h-full ml-gradient rounded-full" style="width: ${trainingProgress}%"></div></div>
            <p class="text-center text-xs text-gray-400 mt-2">⏱️ ${trainingTime.toFixed(1)} ثانية</p>
          </div>
          ` : ''}
          
          ${modelTrained ? `
          <div class="glass rounded-xl p-4 border-2 border-purple-500">
            <h3 class="font-bold mb-4 text-center">📊 إحصائيات التدريب</h3>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-purple-900/30 rounded-lg p-3 text-center"><p class="text-2xl">⏱️</p><p class="text-xl font-bold">${trainingTime.toFixed(1)}s</p><p class="text-xs text-gray-400">وقت التدريب</p></div>
              <div class="bg-blue-900/30 rounded-lg p-3 text-center"><p class="text-2xl">📊</p><p class="text-xl font-bold">${chartData.length}</p><p class="text-xs text-gray-400">عدد البيانات</p></div>
              <div class="bg-green-900/30 rounded-lg p-3 text-center"><p class="text-2xl">🎯</p><p class="text-xl font-bold">${trainingAccuracy.toFixed(1)}%</p><p class="text-xs text-gray-400">دقة التدريب</p></div>
              <div class="bg-yellow-900/30 rounded-lg p-3 text-center"><p class="text-2xl">🔄</p><p class="text-xl font-bold">${totalEpochs}</p><p class="text-xs text-gray-400">عدد الدورات</p></div>
            </div>
          </div>
          
          <div class="glass rounded-xl p-4">
            <h3 class="font-bold mb-4 text-center">🏆 مقارنة الأداء</h3>
            <div class="space-y-3">
              <div><div class="flex justify-between mb-1"><span class="text-sm">🤖 نموذجك</span><span class="text-sm font-bold ${myAccuracy >= 60 ? 'text-green-400' : 'text-yellow-400'}">${myAccuracy.toFixed(1)}%</span></div><div class="w-full bg-gray-700 rounded-full h-3"><div class="h-full rounded-full ${myAccuracy >= 60 ? 'bg-green-500' : 'bg-yellow-500'}" style="width: ${Math.min(100, myAccuracy)}%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span class="text-sm">🏢 المحترفين</span><span class="text-sm font-bold text-blue-400">${proAccuracy}%</span></div><div class="w-full bg-gray-700 rounded-full h-3"><div class="h-full bg-blue-500 rounded-full" style="width: ${proAccuracy}%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span class="text-sm">🎖️ الأفضل عالمياً</span><span class="text-sm font-bold text-purple-400">85%</span></div><div class="w-full bg-gray-700 rounded-full h-3"><div class="h-full bg-purple-500 rounded-full" style="width: 85%"></div></div></div>
            </div>
            <div class="mt-4 p-3 rounded-lg ${accuracyDiff >= 0 ? 'bg-green-900/30' : 'bg-orange-900/30'}"><p class="text-center">${accuracyDiff >= 0 ? `🎉 متفوق بـ ${accuracyDiff.toFixed(1)}%!` : `📈 تحتاج ${Math.abs(accuracyDiff).toFixed(1)}% للمتوسط`}</p></div>
          </div>
          ` : ''}
          
          ${mlPredictions ? `
          <div class="rounded-xl p-4 ${mlPredictions.direction === 'up' ? 'bg-green-900/30 border-2 border-green-500' : 'bg-red-900/30 border-2 border-red-500'}">
            <h3 class="font-bold mb-4 text-center">🔮 توقعات ML</h3>
            <div class="text-center mb-4"><p class="text-5xl mb-2">${mlPredictions.direction === 'up' ? '📈' : '📉'}</p><p class="text-2xl font-bold">${mlPredictions.direction === 'up' ? 'صعود متوقع' : 'هبوط متوقع'}</p><p class="text-3xl font-bold mt-2">${mlPredictions.confidence.toFixed(0)}%</p></div>
            <div class="space-y-2">
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>📍 الحالي</span><span class="font-bold">${formatPrice(currentPrice)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>⏰ بعد ساعة</span><span class="font-bold ${mlPredictions.price1h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price1h)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>🕓 بعد 4 ساعات</span><span class="font-bold ${mlPredictions.price4h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price4h)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>📅 بعد 24 ساعة</span><span class="font-bold ${mlPredictions.price24h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price24h)}</span></div>
            </div>
          </div>
          
          <div class="glass rounded-xl p-2"><p class="text-sm text-gray-400 px-2 mb-2">📊 الشارت مع التوقع</p><div id="mlChart" style="height: 200px;"></div></div>
          ` : '<div class="glass rounded-xl p-8 text-center"><p class="text-5xl mb-4">🧠</p><p class="text-gray-400">اضغط "بدء التدريب" للحصول على توقعات</p></div>'}
          
          <div class="glass rounded-xl p-4"><h3 class="font-bold mb-3">ℹ️ معلومات النموذج</h3><div class="text-sm text-gray-400 space-y-1"><p>• النوع: LSTM</p><p>• المكتبة: TensorFlow.js</p><p>• الطبقات: 2 LSTM + 2 Dense</p><p>• البيانات: ${chartData.length} شمعة</p></div></div>
          
          <div class="bg-yellow-900/30 border border-yellow-600 rounded-xl p-4"><p class="text-sm text-yellow-400 text-center">⚠️ نموذج تعليمي - لا تعتمد عليه مالياً</p></div>
        </div>
      `;
    }

    function renderNewsPage() {
      return `
        <div class="px-4 py-3">
          <h2 class="text-xl font-bold mb-4">📰 الأخبار</h2>
          ${fearGreedData ? `<div class="rounded-xl p-4 mb-4 ${fearGreedData.value < 25 ? 'bg-red-900/30' : fearGreedData.value > 75 ? 'bg-green-900/30' : 'bg-yellow-900/30'}"><div class="flex justify-between"><div><p class="font-bold">🎭 الخوف والطمع</p><p class="text-3xl font-bold">${fearGreedData.value}</p></div><span class="text-5xl">${fearGreedData.value < 25 ? '😱' : fearGreedData.value < 55 ? '😐' : '🤑'}</span></div></div>` : ''}
          <div class="space-y-3">
            <div class="glass rounded-xl p-4"><p class="font-bold">🏛️ الفيدرالي يثبت الفائدة</p><p class="text-xs text-gray-400 mt-1">Fed • منذ 2س</p></div>
            <div class="glass rounded-xl p-4"><p class="font-bold">✅ SEC توافق على ETF جديد</p><p class="text-xs text-gray-400 mt-1">SEC • منذ 5س</p></div>
            <div class="glass rounded-xl p-4"><p class="font-bold">🏦 BlackRock تزيد حيازتها من BTC</p><p class="text-xs text-gray-400 mt-1">Bloomberg • منذ يوم</p></div>
          </div>
        </div>
      `;
    }

    // ========== Charts ==========
    function createCharts() {
      if (!chartData.length) return;
      const s = toolSettings;
      const mainContainer = document.getElementById('mainChart');
      if (mainContainer) {
        if (mainChart) mainChart.remove();
        mainChart = LightweightCharts.createChart(mainContainer, { width: mainContainer.clientWidth, height: 250, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false, pinch: true } });
        mainChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444' }).setData(chartData);
        if (s.ema.enabled && indicators.emaData) { const colors = { 9: '#f97316', 20: '#3b82f6', 50: '#22c55e', 200: '#eab308' }; Object.entries(s.ema.periods).forEach(([p, en]) => { if (en && indicators.emaData[p]) mainChart.addLineSeries({ color: colors[p], lineWidth: 2 }).setData(indicators.emaData[p].map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); }); }
        if (s.bollinger.enabled && indicators.bollingerData) { mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.upper.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.lower.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); }
        mainChart.timeScale().fitContent();
      }
      if (s.rsi.enabled && indicators.rsiData) { const c = document.getElementById('rsiChart'); if (c) { if (rsiChart) rsiChart.remove(); rsiChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 70, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); rsiChart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 }).setData(indicators.rsiData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); rsiChart.timeScale().fitContent(); } }
      if (s.macd.enabled && indicators.macdData) { const c = document.getElementById('macdChart'); if (c) { if (macdChart) macdChart.remove(); macdChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 70, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); macdChart.addHistogramSeries({}).setData(indicators.macdData.histogram.map((v, i) => v !== null ? { time: chartData[i].time, value: v, color: v >= 0 ? '#22c55e' : '#ef4444' } : null).filter(Boolean)); macdChart.timeScale().fitContent(); } }
    }

    function createAIChart() {
      if (!chartData.length) return;
      const c = document.getElementById('aiChart'); if (!c) return;
      if (aiChart) aiChart.remove();
      aiChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 180, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, timeScale: { visible: false }, handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false } });
      aiChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444' }).setData(chartData);
      aiChart.timeScale().fitContent();
    }

    function createMLChart() {
      if (!chartData.length) return;
      const c = document.getElementById('mlChart'); if (!c) return;
      if (mlChart) mlChart.remove();
      mlChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 200, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false } });
      mlChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444' }).setData(chartData);
      if (mlPredictions) {
        const lastTime = chartData[chartData.length - 1].time;
        const predColor = mlPredictions.direction === 'up' ? '#22c55e' : '#ef4444';
        mlChart.addLineSeries({ color: predColor, lineWidth: 3, lineStyle: 2 }).setData([{ time: lastTime, value: currentPrice }, { time: lastTime + 3600, value: mlPredictions.price1h }]);
      }
      mlChart.timeScale().fitContent();
    }

    // ========== Events ==========
    async function fetchData() {
      const period = periods.find(p => p.id === currentPeriod);
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`);
        const json = await res.json();
        chartData = json.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
        if (chartData.length) { currentPrice = chartData[chartData.length - 1].close; priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100; }
        calculateIndicators(); render(); startLiveUpdates();
      } catch (e) { console.error(e); }
    }

    async function loadFearGreed() {
      try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        const data = await res.json();
        if (data?.data?.[0]) fearGreedData = { value: parseInt(data.data[0].value) };
      } catch (e) {}
    }

    function toggleTool(tool) { toolSettings[tool].enabled = !toolSettings[tool].enabled; calculateIndicators(); render(); }
    function selectCoin(symbol) { currentCoin = symbol; mlModel = null; modelTrained = false; mlPredictions = null; fetchData(); }
    function selectPeriod(id) { currentPeriod = id; fetchData(); }
    function switchPage(page) { currentPage = page; render(); }

    window.selectCoin = selectCoin; window.selectPeriod = selectPeriod; window.switchPage = switchPage;
    window.toggleTool = toggleTool; window.trainModel = trainModel;

    fetchData(); loadFearGreed();
  </script>
</body>
</html>
