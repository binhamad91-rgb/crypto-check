    // ========== Advanced Feature Engineering ==========
    function extractAdvancedFeatures(data, index) {
      if (index < 50) return null;
      
      const slice = data.slice(index - 50, index + 1);
      const prices = slice.map(d => d.close);
      const highs = slice.map(d => d.high);
      const lows = slice.map(d => d.low);
      const volumes = slice.map(d => d.volume);
      const current = prices[prices.length - 1];
      
      // 1. RSI Features
      const rsi = calcRSIValue(slice, 14);
      const rsiPrev = calcRSIValue(slice.slice(0, -1), 14);
      const rsiSlope = rsi - rsiPrev;
      const rsiNorm = rsi / 100;
      const rsiOversold = rsi < 30 ? 1 : 0;
      const rsiOverbought = rsi > 70 ? 1 : 0;
      
      // 2. MACD Features
      const macd = calcMACDValue(slice);
      const macdNorm = Math.tanh(macd.histogram / current * 100);
      const macdCrossUp = macd.histogram > 0 && macd.prevHistogram <= 0 ? 1 : 0;
      const macdCrossDown = macd.histogram < 0 && macd.prevHistogram >= 0 ? 1 : 0;
      const macdTrend = macd.histogram > macd.prevHistogram ? 1 : -1;
      
      // 3. EMA Features
      const ema9 = calcEMAValue(prices, 9);
      const ema20 = calcEMAValue(prices, 20);
      const ema50 = calcEMAValue(prices, 50);
      const priceVsEma9 = (current - ema9) / ema9;
      const priceVsEma20 = (current - ema20) / ema20;
      const priceVsEma50 = (current - ema50) / ema50;
      const emaStack = (ema9 > ema20 && ema20 > ema50) ? 1 : (ema9 < ema20 && ema20 < ema50) ? -1 : 0;
      
      // 4. Bollinger Features
      const bb = calcBollingerValue(prices, 20, 2);
      const bbPosition = (current - bb.lower) / (bb.upper - bb.lower);
      const bbWidth = (bb.upper - bb.lower) / bb.middle;
      const bbSqueeze = bbWidth < 0.02 ? 1 : 0;
      
      // 5. Momentum Features
      const momentum5 = (current - prices[prices.length - 6]) / prices[prices.length - 6];
      const momentum10 = (current - prices[prices.length - 11]) / prices[prices.length - 11];
      const momentum20 = (current - prices[prices.length - 21]) / prices[prices.length - 21];
      
      // 6. Volatility Features
      const returns = [];
      for (let i = 1; i < prices.length; i++) {
        returns.push((prices[i] - prices[i-1]) / prices[i-1]);
      }
      const volatility = Math.sqrt(returns.reduce((sum, r) => sum + r * r, 0) / returns.length);
      const atr = calcATRValue(slice, 14);
      const atrPercent = atr / current;
      
      // 7. Volume Features
      const avgVolume = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
      const volumeRatio = volumes[volumes.length - 1] / avgVolume;
      const volumeTrend = volumes.slice(-5).reduce((a, b) => a + b, 0) / 5 > avgVolume ? 1 : -1;
      
      // 8. Trend Strength (ADX-like)
      const trendStrength = Math.abs(momentum20) / volatility;
      
      // 9. Support/Resistance
      const recentHigh = Math.max(...highs.slice(-20));
      const recentLow = Math.min(...lows.slice(-20));
      const pricePosition = (current - recentLow) / (recentHigh - recentLow);
      
      // 10. Candle Patterns
      const lastCandle = slice[slice.length - 1];
      const bodySize = Math.abs(lastCandle.close - lastCandle.open) / lastCandle.open;
      const upperWick = (lastCandle.high - Math.max(lastCandle.open, lastCandle.close)) / lastCandle.open;
      const lowerWick = (Math.min(lastCandle.open, lastCandle.close) - lastCandle.low) / lastCandle.open;
      const isBullish = lastCandle.close > lastCandle.open ? 1 : 0;
      
      return [
        rsiNorm, rsiSlope / 10, rsiOversold, rsiOverbought,
        macdNorm, macdCrossUp, macdCrossDown, macdTrend,
        priceVsEma9 * 10, priceVsEma20 * 10, priceVsEma50 * 10, emaStack,
        bbPosition, bbWidth * 10, bbSqueeze,
        momentum5 * 10, momentum10 * 10, momentum20 * 10,
        volatility * 100, atrPercent * 100,
        volumeRatio - 1, volumeTrend,
        Math.min(trendStrength, 3) / 3,
        pricePosition,
        bodySize * 100, upperWick * 100, lowerWick * 100, isBullish
      ];
    }

    function calcRSIValue(data, period) {
      if (data.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = data.length - period; i < data.length; i++) {
        const change = data[i].close - data[i-1].close;
        if (change > 0) gains += change;
        else losses -= change;
      }
      if (losses === 0) return 100;
      const rs = (gains / period) / (losses / period);
      return 100 - (100 / (1 + rs));
    }

    function calcMACDValue(data) {
      const prices = data.map(d => d.close);
      const ema12 = calcEMAValue(prices, 12);
      const ema26 = calcEMAValue(prices, 26);
      const macdLine = ema12 - ema26;
      
      const macdHistory = [];
      for (let i = 26; i < prices.length; i++) {
        const e12 = calcEMAValue(prices.slice(0, i + 1), 12);
        const e26 = calcEMAValue(prices.slice(0, i + 1), 26);
        macdHistory.push(e12 - e26);
      }
      
      const signal = calcEMAValue(macdHistory.map(v => ({ close: v })).map(d => d.close), 9);
      const histogram = macdLine - signal;
      const prevHistogram = macdHistory.length > 1 ? macdHistory[macdHistory.length - 2] - calcEMAValue(macdHistory.slice(0, -1), 9) : 0;
      
      return { macdLine, signal, histogram, prevHistogram };
    }

    function calcEMAValue(prices, period) {
      if (prices.length < period) return prices[prices.length - 1];
      const mult = 2 / (period + 1);
      let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < prices.length; i++) {
        ema = (prices[i] - ema) * mult + ema;
      }
      return ema;
    }

    function calcBollingerValue(prices, period, deviation) {
      const slice = prices.slice(-period);
      const sma = slice.reduce((a, b) => a + b, 0) / period;
      const std = Math.sqrt(slice.reduce((sum, p) => sum + Math.pow(p - sma, 2), 0) / period);
      return { upper: sma + deviation * std, middle: sma, lower: sma - deviation * std };
    }

    function calcATRValue(data, period) {
      if (data.length < period + 1) return 0;
      let atr = 0;
      for (let i = data.length - period; i < data.length; i++) {
        const tr = Math.max(
          data[i].high - data[i].low,
          Math.abs(data[i].high - data[i-1].close),
          Math.abs(data[i].low - data[i-1].close)
        );
        atr += tr;
      }
      return atr / period;
    }

    // ========== Market Regime Detection ==========
    function detectMarketRegime(data) {
      if (data.length < 50) return { regime: 'unknown', confidence: 0 };
      
      const prices = data.slice(-50).map(d => d.close);
      const current = prices[prices.length - 1];
      const first = prices[0];
      
      // Trend calculation
      const trendPercent = (current - first) / first * 100;
      
      // Volatility
      const returns = [];
      for (let i = 1; i < prices.length; i++) {
        returns.push((prices[i] - prices[i-1]) / prices[i-1] * 100);
      }
      const volatility = Math.sqrt(returns.reduce((sum, r) => sum + r * r, 0) / returns.length);
      
      // Direction consistency
      let upMoves = 0, downMoves = 0;
      for (let i = 1; i < prices.length; i++) {
        if (prices[i] > prices[i-1]) upMoves++;
        else downMoves++;
      }
      const consistency = Math.abs(upMoves - downMoves) / (upMoves + downMoves);
      
      // EMA alignment
      const ema9 = calcEMAValue(prices, 9);
      const ema20 = calcEMAValue(prices, 20);
      const ema50 = calcEMAValue(prices, Math.min(50, prices.length));
      const emaAligned = (ema9 > ema20 && ema20 > ema50) || (ema9 < ema20 && ema20 < ema50);
      
      let regime, confidence;
      
      if (trendPercent > 3 && consistency > 0.2 && emaAligned && ema9 > ema50) {
        regime = 'uptrend';
        confidence = Math.min(95, 50 + trendPercent * 5 + consistency * 30);
      } else if (trendPercent < -3 && consistency > 0.2 && emaAligned && ema9 < ema50) {
        regime = 'downtrend';
        confidence = Math.min(95, 50 + Math.abs(trendPercent) * 5 + consistency * 30);
      } else if (volatility > 2) {
        regime = 'volatile';
        confidence = Math.min(90, 50 + volatility * 10);
      } else {
        regime = 'ranging';
        confidence = Math.min(85, 50 + (1 - consistency) * 30);
      }
      
      return { regime, confidence, trendPercent, volatility, consistency };
    }

    // ========== Dynamic Weight Calculation ==========
    function calculateDynamicWeights(regime) {
      const weights = {
        rsi: 0,
        macd: 0,
        ema: 0,
        bollinger: 0,
        momentum: 0,
        volume: 0
      };
      
      switch (regime.regime) {
        case 'uptrend':
          // في الصعود: الزخم والـ EMA أهم
          weights.macd = 30;
          weights.ema = 28;
          weights.momentum = 22;
          weights.rsi = 10; // للحذر من overbought
          weights.bollinger = 5;
          weights.volume = 5;
          break;
          
        case 'downtrend':
          // في الهبوط: RSI وبولنجر للارتداد
          weights.rsi = 35;
          weights.bollinger = 28;
          weights.macd = 15;
          weights.ema = 12;
          weights.momentum = 5;
          weights.volume = 5;
          break;
          
        case 'volatile':
          // في التذبذب العالي: بولنجر وVolume
          weights.bollinger = 30;
          weights.volume = 25;
          weights.rsi = 20;
          weights.macd = 15;
          weights.ema = 5;
          weights.momentum = 5;
          break;
          
        case 'ranging':
          // في التذبذب: RSI وبولنجر للدعم/المقاومة
          weights.rsi = 28;
          weights.bollinger = 28;
          weights.macd = 18;
          weights.ema = 13;
          weights.momentum = 8;
          weights.volume = 5;
          break;
          
        default:
          weights.rsi = 20;
          weights.macd = 20;
          weights.ema = 20;
          weights.bollinger = 20;
          weights.momentum = 10;
          weights.volume = 10;
      }
      
      return weights;
    }

    // ========== Advanced ML Model ==========
    async function buildAdvancedModel(inputShape) {
      const model = tf.sequential();
      
      // Input layer with batch normalization
      model.add(tf.layers.dense({
        units: 64,
        activation: 'relu',
        inputShape: [inputShape],
        kernelRegularizer: tf.regularizers.l2({ l2: 0.001 })
      }));
      model.add(tf.layers.batchNormalization());
      model.add(tf.layers.dropout({ rate: 0.3 }));
      
      // Hidden layer 1
      model.add(tf.layers.dense({
        units: 32,
        activation: 'relu',
        kernelRegularizer: tf.regularizers.l2({ l2: 0.001 })
      }));
      model.add(tf.layers.batchNormalization());
      model.add(tf.layers.dropout({ rate: 0.2 }));
      
      // Hidden layer 2
      model.add(tf.layers.dense({
        units: 16,
        activation: 'relu',
        kernelRegularizer: tf.regularizers.l2({ l2: 0.001 })
      }));
      model.add(tf.layers.dropout({ rate: 0.1 }));
      
      // Output layer
      model.add(tf.layers.dense({
        units: 1,
        activation: 'sigmoid'
      }));
      
      model.compile({
        optimizer: tf.train.adam(0.001),
        loss: 'binaryCrossentropy',
        metrics: ['accuracy']
      });
      
      return model;
    }

    async function startAdvancedTraining() {
      if (!tfReady || isTraining || chartData.length < 100) {
        if (chartData.length < 100) alert('نحتاج 100 شمعة على الأقل للتدريب المتقدم');
        return;
      }
      
      isTraining = true;
      trainingProgress = 0;
      trainingEpoch = 0;
      trainingHistory = [];
      trainingStartTime = Date.now();
      modelTrained = false;
      mlPredictions = null;
      
      // Detect market regime
      marketRegime = detectMarketRegime(chartData);
      dynamicWeights = calculateDynamicWeights(marketRegime);
      
      render();
      
      try {
        // Extract features
        const X = [], y = [];
        
        for (let i = 50; i < chartData.length - 5; i++) {
          const features = extractAdvancedFeatures(chartData, i);
          if (features) {
            X.push(features);
            // Label: will price be higher after 5 candles?
            const futurePrice = chartData[i + 5].close;
            const currentPrice = chartData[i].close;
            y.push(futurePrice > currentPrice * 1.001 ? 1 : 0); // 0.1% threshold
          }
        }
        
        if (X.length < 50) {
          alert('بيانات غير كافية');
          isTraining = false;
          render();
          return;
        }
        
        console.log(`📊 Training with ${X.length} samples, ${X[0].length} features`);
        
        // Shuffle data
        const indices = Array.from({ length: X.length }, (_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        
        const shuffledX = indices.map(i => X[i]);
        const shuffledY = indices.map(i => y[i]);
        
        // Split data
        const splitIdx = Math.floor(shuffledX.length * 0.8);
        const trainX = shuffledX.slice(0, splitIdx);
        const trainY = shuffledY.slice(0, splitIdx);
        const valX = shuffledX.slice(splitIdx);
        const valY = shuffledY.slice(splitIdx);
        
        // Convert to tensors
        const xTrain = tf.tensor2d(trainX);
        const yTrain = tf.tensor2d(trainY.map(v => [v]));
        const xVal = tf.tensor2d(valX);
        const yVal = tf.tensor2d(valY.map(v => [v]));
        
        // Build model
        mlModel = await buildAdvancedModel(X[0].length);
        
        totalEpochs = 100;
        
        // Train with early stopping simulation
        let bestValAcc = 0;
        let patience = 10;
        let patienceCounter = 0;
        
        await mlModel.fit(xTrain, yTrain, {
          epochs: totalEpochs,
          batchSize: 32,
          validationData: [xVal, yVal],
          shuffle: true,
          callbacks: {
            onEpochEnd: async (epoch, logs) => {
              trainingEpoch = epoch + 1;
              trainingProgress = ((epoch + 1) / totalEpochs) * 100;
              trainingLoss = logs.loss || 0;
              trainingAccuracy = (logs.acc || 0) * 100;
              trainingValAccuracy = (logs.val_acc || 0) * 100;
              trainingTime = (Date.now() - trainingStartTime) / 1000;
              
              trainingHistory.push({
                epoch: epoch + 1,
                loss: logs.loss,
                acc: logs.acc * 100,
                valAcc: logs.val_acc * 100
              });
              
              // Early stopping check
              if (logs.val_acc > bestValAcc) {
                bestValAcc = logs.val_acc;
                patienceCounter = 0;
              } else {
                patienceCounter++;
              }
              
              render();
              await tf.nextFrame();
            }
          }
        });
        
        // Calculate feature importance (simplified)
        featureImportance = calculateFeatureImportance(X, y);
        
        // Make predictions
        await makeAdvancedPredictions();
        
        modelTrained = true;
        
        // Cleanup
        xTrain.dispose();
        yTrain.dispose();
        xVal.dispose();
        yVal.dispose();
        
      } catch (error) {
        console.error('Training error:', error);
        alert('خطأ في التدريب: ' + error.message);
      }
      
      isTraining = false;
      render();
    }

    function calculateFeatureImportance(X, y) {
      // Simplified correlation-based importance
      const featureNames = [
        'RSI', 'RSI Slope', 'RSI Oversold', 'RSI Overbought',
        'MACD', 'MACD Cross Up', 'MACD Cross Down', 'MACD Trend',
        'Price vs EMA9', 'Price vs EMA20', 'Price vs EMA50', 'EMA Stack',
        'BB Position', 'BB Width', 'BB Squeeze',
        'Momentum 5', 'Momentum 10', 'Momentum 20',
        'Volatility', 'ATR',
        'Volume Ratio', 'Volume Trend',
        'Trend Strength',
        'Price Position',
        'Body Size', 'Upper Wick', 'Lower Wick', 'Is Bullish'
      ];
      
      const importance = [];
      const yMean = y.reduce((a, b) => a + b, 0) / y.length;
      
      for (let f = 0; f < X[0].length; f++) {
        const feature = X.map(x => x[f]);
        const fMean = feature.reduce((a, b) => a + b, 0) / feature.length;
        
        let cov = 0, varF = 0, varY = 0;
        for (let i = 0; i < X.length; i++) {
          cov += (feature[i] - fMean) * (y[i] - yMean);
          varF += Math.pow(feature[i] - fMean, 2);
          varY += Math.pow(y[i] - yMean, 2);
        }
        
        const correlation = Math.abs(cov / Math.sqrt(varF * varY)) || 0;
        importance.push({
          name: featureNames[f] || `Feature ${f}`,
          importance: correlation * 100
        });
      }
      
      return importance.sort((a, b) => b.importance - a.importance).slice(0, 10);
    }

    async function makeAdvancedPredictions() {
      if (!mlModel || chartData.length < 51) return;
      
      try {
        const features = extractAdvancedFeatures(chartData, chartData.length - 1);
        if (!features) return;
        
        const input = tf.tensor2d([features]);
        const prediction = mlModel.predict(input);
        const predValue = (await prediction.data())[0];
        
        // Calculate confidence
        const confidence = Math.abs(predValue - 0.5) * 200;
        const direction = predValue > 0.5 ? 'up' : 'down';
        
        // Estimate price targets
        const atr = calcATRValue(chartData.slice(-15), 14);
        const multiplier = (confidence / 100) * (direction === 'up' ? 1 : -1);
        
        mlPredictions = {
          direction,
          confidence: Math.min(95, Math.max(35, confidence)),
          probability: predValue * 100,
          price1h: currentPrice + atr * multiplier * 0.5,
          price4h: currentPrice + atr * multiplier * 1.5,
          price24h: currentPrice + atr * multiplier * 4,
          regime: marketRegime,
          weights: dynamicWeights
        };
        
        input.dispose();
        prediction.dispose();
        
      } catch (e) {
        console.error('Prediction error:', e);
      }
    }

    // ========== Standard Indicator Calculations ==========
    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = []; const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return [];
      const result = [null];
      for (let i = 1; i < data.length; i++) {
        if (i < period) { result.push(null); continue; }
        let gains = 0, losses = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const change = data[j].close - data[j-1].close;
          if (change > 0) gains += change; else losses -= change;
        }
        result.push(losses === 0 ? 100 : 100 - (100 / (1 + (gains/period) / (losses/period))));
      }
      return result;
    }

    function calcMACD(data, fast, slow, signal) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);
      const macdLine = emaFast.map((v, i) => (v && emaSlow[i]) ? v - emaSlow[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calcEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => (v && signalLine[i]) ? v - signalLine[i] : null);
      return { histogram, macdLine, signalLine };
    }

    function calcBollinger(data, period, deviation) {
      const upper = [], lower = [], middle = [];
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) { upper.push(null); lower.push(null); middle.push(null); continue; }
        const slice = data.slice(i - period + 1, i + 1);
        const sma = slice.reduce((a, b) => a + b.close, 0) / period;
        const std = Math.sqrt(slice.reduce((sum, d) => sum + Math.pow(d.close - sma, 2), 0) / period);
        middle.push(sma); upper.push(sma + deviation * std); lower.push(sma - deviation * std);
      }
      return { upper, lower, middle };
    }

    function calculateIndicators() {
      if (!chartData.length) return;
      const last = chartData.length - 1;
      const s = toolSettings;
      const emaData = {};
      [9, 20, 50, 100, 200].forEach(p => { if (s.ema.periods[p]) emaData[p] = calcEMA(chartData, p); });
      const rsi = calcRSI(chartData, s.rsi.period);
      const macd = calcMACD(chartData, s.macd.fast, s.macd.slow, s.macd.signal);
      const bollinger = calcBollinger(chartData, s.bollinger.period, s.bollinger.deviation);
      
      let emaAbove = 0, emaTotal = 0;
      Object.entries(s.ema.periods).forEach(([p, en]) => {
        if (en && emaData[p] && emaData[p][last]) {
          emaTotal++;
          if (currentPrice > emaData[p][last]) emaAbove++;
        }
      });
      
      indicators = { 
        emaData, emaAbove, emaTotal,
        rsi: rsi[last], rsiData: rsi, 
        macdHist: macd.histogram[last], macdData: macd,
        bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bbMiddle: bollinger.middle[last], bollingerData: bollinger
      };
    }

    function getDetailedAnalysis() {
      const details = [];
      let totalScore = 0;
      const s = toolSettings;
      const weights = dynamicWeights || { rsi: 20, macd: 20, ema: 20, bollinger: 20, momentum: 10, volume: 10 };
      
      // Apply dynamic weights
      if (s.rsi.enabled && indicators.rsi) {
        const rsiVal = indicators.rsi;
        let baseImpact;
        if (rsiVal < 30) baseImpact = 25;
        else if (rsiVal < 45) baseImpact = 10;
        else if (rsiVal <= 55) baseImpact = 0;
        else if (rsiVal < 70) baseImpact = -10;
        else baseImpact = -25;
        
        const impact = Math.round(baseImpact * (weights.rsi / 20));
        const status = rsiVal < 30 ? 'مشبع بيع' : rsiVal > 70 ? 'مشبع شراء' : 'محايد';
        const color = rsiVal < 30 ? '#22c55e' : rsiVal > 70 ? '#ef4444' : '#9ca3af';
        
        details.push({
          name: 'RSI',
          icon: '💪',
          value: rsiVal.toFixed(1),
          status,
          impact,
          weight: weights.rsi,
          reason: `RSI = ${rsiVal.toFixed(0)} | وزن: ${weights.rsi}%`,
          color
        });
        totalScore += impact;
      }
      
      if (s.macd.enabled && indicators.macdHist !== null) {
        const hist = indicators.macdHist;
        let baseImpact = hist > 0 ? 15 : -15;
        const impact = Math.round(baseImpact * (weights.macd / 20));
        const status = hist > 0 ? 'إيجابي' : 'سلبي';
        const color = hist > 0 ? '#22c55e' : '#ef4444';
        
        details.push({
          name: 'MACD',
          icon: '🚀',
          value: hist > 0 ? '▲' : '▼',
          status,
          impact,
          weight: weights.macd,
          reason: `MACD ${hist > 0 ? 'إيجابي' : 'سلبي'} | وزن: ${weights.macd}%`,
          color
        });
        totalScore += impact;
      }
      
      if (s.ema.enabled && indicators.emaTotal > 0) {
        const ratio = indicators.emaAbove / indicators.emaTotal;
        let baseImpact = ratio >= 0.6 ? 15 : ratio <= 0.4 ? -15 : 0;
        const impact = Math.round(baseImpact * (weights.ema / 20));
        const status = ratio >= 0.6 ? 'فوق' : ratio <= 0.4 ? 'تحت' : 'متوسط';
        const color = ratio >= 0.6 ? '#22c55e' : ratio <= 0.4 ? '#ef4444' : '#9ca3af';
        
        details.push({
          name: 'EMA',
          icon: '📈',
          value: `${indicators.emaAbove}/${indicators.emaTotal}`,
          status,
          impact,
          weight: weights.ema,
          reason: `السعر ${status} المتوسطات | وزن: ${weights.ema}%`,
          color
        });
        totalScore += impact;
      }
      
      if (s.bollinger.enabled && indicators.bbUpper) {
        const bbPos = (currentPrice - indicators.bbLower) / (indicators.bbUpper - indicators.bbLower);
        let baseImpact = bbPos < 0.2 ? 20 : bbPos > 0.8 ? -20 : 0;
        const impact = Math.round(baseImpact * (weights.bollinger / 20));
        const status = bbPos < 0.2 ? 'قرب السفلي' : bbPos > 0.8 ? 'قرب العلوي' : 'وسط';
        const color = bbPos < 0.2 ? '#22c55e' : bbPos > 0.8 ? '#ef4444' : '#9ca3af';
        
        details.push({
          name: 'بولنجر',
          icon: '📊',
          value: (bbPos * 100).toFixed(0) + '%',
          status,
          impact,
          weight: weights.bollinger,
          reason: `موقع: ${status} | وزن: ${weights.bollinger}%`,
          color
        });
        totalScore += impact;
      }
      
      // ML Prediction
      if (mlPredictions) {
        const mlImpact = mlPredictions.direction === 'up' ? 
          Math.round(mlPredictions.confidence * 0.3) : 
          -Math.round(mlPredictions.confidence * 0.3);
        
        details.push({
          name: 'ML Model',
          icon: '🧠',
          value: mlPredictions.confidence.toFixed(0) + '%',
          status: mlPredictions.direction === 'up' ? 'صعود' : 'هبوط',
          impact: mlImpact,
          weight: 30,
          reason: `توقع: ${mlPredictions.direction === 'up' ? 'صعود' : 'هبوط'} بثقة ${mlPredictions.confidence.toFixed(0)}%`,
          color: mlPredictions.direction === 'up' ? '#22c55e' : '#ef4444'
        });
        totalScore += mlImpact;
      }
      
      let decision, emoji, bgColor, explanation;
      if (totalScore >= 40) { decision = 'شراء قوي'; emoji = '🏆'; bgColor = 'from-yellow-500 to-amber-600'; explanation = 'إشارات قوية للشراء'; }
      else if (totalScore >= 20) { decision = 'شراء'; emoji = '🥈'; bgColor = 'from-green-500 to-green-600'; explanation = 'فرصة شراء جيدة'; }
      else if (totalScore >= 5) { decision = 'ميل صعودي'; emoji = '📈'; bgColor = 'from-green-600 to-green-700'; explanation = 'ميل إيجابي خفيف'; }
      else if (totalScore >= -5) { decision = 'محايد'; emoji = '➡️'; bgColor = 'from-gray-600 to-gray-700'; explanation = 'انتظر إشارة أوضح'; }
      else if (totalScore >= -20) { decision = 'ميل هبوطي'; emoji = '📉'; bgColor = 'from-orange-500 to-orange-600'; explanation = 'احذر من الهبوط'; }
      else { decision = 'بيع'; emoji = '🛑'; bgColor = 'from-red-600 to-red-700'; explanation = 'إشارات بيع قوية'; }
      
      return { details, totalScore, decision, emoji, bgColor, explanation };
    }

          </div>
          ` : ''}
          
          ${modelTrained && regime.regime !== 'unknown' ? `
          <!-- حالة السوق المكتشفة -->
          <div class="rounded-xl p-4 ${regime.regime === 'uptrend' ? 'bg-green-900/30 border border-green-500' : regime.regime === 'downtrend' ? 'bg-red-900/30 border border-red-500' : regime.regime === 'volatile' ? 'bg-orange-900/30 border border-orange-500' : 'bg-blue-900/30 border border-blue-500'}">
            <p class="text-sm text-gray-400 mb-2">🎯 حالة السوق المكتشفة</p>
            <div class="flex justify-between items-center">
              <p class="text-2xl font-bold">${regime.regime === 'uptrend' ? '📈 اتجاه صاعد' : regime.regime === 'downtrend' ? '📉 اتجاه هابط' : regime.regime === 'volatile' ? '⚡ تذبذب عالي' : '↔️ تذبذب جانبي'}</p>
              <p class="text-xl font-bold">${regime.confidence?.toFixed(0)}%</p>
            </div>
          </div>
          
          <!-- الاستراتيجية المستخدمة -->
          <div class="glass rounded-xl p-4">
            <p class="font-bold mb-3">🎮 الاستراتيجية المختارة:</p>
            <p class="text-gray-300">${
              regime.regime === 'uptrend' ? '📈 متابعة الاتجاه: التركيز على MACD و EMA للزخم' :
              regime.regime === 'downtrend' ? '📉 البحث عن الارتداد: التركيز على RSI وبولنجر' :
              regime.regime === 'volatile' ? '⚡ إدارة المخاطر: التركيز على بولنجر والحجم' :
              '↔️ التداول في النطاق: التركيز على RSI وبولنجر'
            }</p>
          </div>
          ` : ''}
          
          ${modelTrained ? `
          <div class="glass rounded-xl p-4 border border-green-500">
            <h3 class="font-bold mb-3 text-green-400">✅ التدريب مكتمل!</h3>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-purple-900/30 rounded-lg p-3 text-center"><p class="text-xl font-bold">${trainingTime.toFixed(1)}s</p><p class="text-xs text-gray-400">الوقت</p></div>
              <div class="bg-blue-900/30 rounded-lg p-3 text-center"><p class="text-xl font-bold">28</p><p class="text-xs text-gray-400">ميزة</p></div>
              <div class="bg-green-900/30 rounded-lg p-3 text-center"><p class="text-xl font-bold">${trainingAccuracy.toFixed(1)}%</p><p class="text-xs text-gray-400">دقة التدريب</p></div>
              <div class="bg-cyan-900/30 rounded-lg p-3 text-center"><p class="text-xl font-bold">${trainingValAccuracy.toFixed(1)}%</p><p class="text-xs text-gray-400">دقة الاختبار</p></div>
            </div>
          </div>
          
          <!-- أهم الميزات -->
          ${featureImportance ? `
          <div class="glass rounded-xl p-4">
            <p class="font-bold mb-3">🔥 أهم الميزات المؤثرة:</p>
            <div class="space-y-2">
              ${featureImportance.slice(0, 5).map((f, i) => `
                <div class="flex items-center gap-2">
                  <span class="w-6 text-center">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '•'}</span>
                  <span class="flex-1 text-sm">${f.name}</span>
                  <div class="w-20 bg-gray-700 rounded-full h-2">
                    <div class="h-full bg-cyan-500 rounded-full" style="width: ${f.importance}%"></div>
                  </div>
                  <span class="w-10 text-xs text-left">${f.importance.toFixed(0)}%</span>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}
          ` : ''}
          
          ${mlPredictions ? `
          <div class="rounded-xl p-4 ${mlPredictions.direction === 'up' ? 'bg-green-900/30 border-2 border-green-500' : 'bg-red-900/30 border-2 border-red-500'}">
            <div class="text-center mb-4">
              <p class="text-5xl mb-2">${mlPredictions.direction === 'up' ? '📈' : '📉'}</p>
              <p class="text-2xl font-bold">${mlPredictions.direction === 'up' ? 'صعود متوقع' : 'هبوط متوقع'}</p>
              <p class="text-3xl font-bold mt-2">${mlPredictions.confidence.toFixed(0)}%</p>
            </div>
            <div class="space-y-2">
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>📍 الحالي</span><span class="font-bold">${formatPrice(currentPrice)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>⏰ بعد ساعة</span><span class="font-bold ${mlPredictions.price1h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price1h)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>🕓 بعد 4س</span><span class="font-bold ${mlPredictions.price4h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price4h)}</span></div>
              <div class="flex justify-between p-3 rounded-lg bg-black/30"><span>📅 بعد 24س</span><span class="font-bold ${mlPredictions.price24h > currentPrice ? 'text-green-400' : 'text-red-400'}">${formatPrice(mlPredictions.price24h)}</span></div>
            </div>
          </div>
          ` : `
          <div class="glass rounded-xl p-8 text-center">
            <p class="text-5xl mb-4">🧠</p>
            <p class="text-gray-400">اضغط "تدريب متقدم" للبدء</p>
            <p class="text-xs text-gray-500 mt-2">التدريب يستغرق 1-2 دقيقة</p>
          </div>
          `}
          
          <div class="glass rounded-xl p-4">
            <h3 class="font-bold mb-2">ℹ️ مميزات النموذج المتقدم:</h3>
            <div class="text-sm text-gray-400 space-y-1">
              <p>• 28 ميزة متقدمة (RSI, MACD, EMA, Bollinger, Momentum...)</p>
              <p>• كشف تلقائي لحالة السوق (صعود/هبوط/تذبذب)</p>
              <p>• أوزان ديناميكية تتغير حسب الحالة</p>
              <p>• 100 دورة تدريب مع Early Stopping</p>
              <p>• تقسيم البيانات 80/20 للتحقق</p>
            </div>
          </div>
          
          <div class="bg-yellow-900/30 border border-yellow-600 rounded-xl p-4">
            <p class="text-sm text-yellow-400 text-center">⚠️ للأغراض التعليمية فقط</p>
          </div>
        </div>
      `;
    }

    function renderNewsPage() {
      return `
        <div class="px-4 py-3">
          <h2 class="text-xl font-bold mb-4">📰 الأخبار</h2>
          ${fearGreedData ? `<div class="rounded-xl p-4 mb-4 ${fearGreedData.value < 35 ? 'bg-red-900/30' : fearGreedData.value > 65 ? 'bg-green-900/30' : 'bg-yellow-900/30'}"><div class="flex justify-between"><div><p class="font-bold">🎭 الخوف والطمع</p><p class="text-3xl font-bold">${fearGreedData.value}</p></div><span class="text-5xl">${fearGreedData.value < 35 ? '😱' : fearGreedData.value > 65 ? '🤑' : '😐'}</span></div></div>` : ''}
          <div class="space-y-3">
            <div class="glass rounded-xl p-4"><p class="font-bold">🏛️ الفيدرالي يثبت الفائدة</p><p class="text-xs text-gray-400 mt-1">Fed • منذ 2س</p></div>
            <div class="glass rounded-xl p-4"><p class="font-bold">✅ SEC توافق على ETF</p><p class="text-xs text-gray-400 mt-1">SEC • منذ 5س</p></div>
          </div>
        </div>
      `;
    }

    function createCharts() {
      if (!chartData.length) return;
      const s = toolSettings;
      const coin = coins.find(c => c.symbol === currentCoin);
      const upColor = coin?.isGold ? '#f59e0b' : '#22c55e';
      
      const mainContainer = document.getElementById('mainChart');
      if (mainContainer) {
        if (mainChart) mainChart.remove();
        mainChart = LightweightCharts.createChart(mainContainer, { width: mainContainer.clientWidth, height: 250, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false, pinch: true } });
        mainChart.addCandlestickSeries({ upColor, downColor: '#ef4444', borderUpColor: upColor, borderDownColor: '#ef4444', wickUpColor: upColor, wickDownColor: '#ef4444' }).setData(chartData);
        if (s.ema.enabled && indicators.emaData) { const colors = { 9: '#f97316', 20: '#3b82f6', 50: '#22c55e', 200: '#eab308' }; Object.entries(s.ema.periods).forEach(([p, en]) => { if (en && indicators.emaData[p]) mainChart.addLineSeries({ color: colors[p], lineWidth: 2 }).setData(indicators.emaData[p].map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); }); }
        if (s.bollinger.enabled && indicators.bollingerData) { mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.upper.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); mainChart.addLineSeries({ color: '#ec4899', lineWidth: 1 }).setData(indicators.bollingerData.lower.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); }
        mainChart.timeScale().fitContent();
      }
      if (s.rsi.enabled && indicators.rsiData) { const c = document.getElementById('rsiChart'); if (c) { if (rsiChart) rsiChart.remove(); rsiChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 70, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); rsiChart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 }).setData(indicators.rsiData.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); rsiChart.timeScale().fitContent(); } }
      if (s.macd.enabled && indicators.macdData) { const c = document.getElementById('macdChart'); if (c) { if (macdChart) macdChart.remove(); macdChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 70, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } }, timeScale: { visible: false }, handleScroll: false, handleScale: false }); macdChart.addHistogramSeries({}).setData(indicators.macdData.histogram.map((v, i) => v !== null ? { time: chartData[i].time, value: v, color: v >= 0 ? '#22c55e' : '#ef4444' } : null).filter(Boolean)); macdChart.timeScale().fitContent(); } }
    }

    function createAIChart() {
      if (!chartData.length) return;
      const c = document.getElementById('aiChart'); if (!c) return;
      if (aiChart) aiChart.remove();
      const coin = coins.find(c => c.symbol === currentCoin);
      const upColor = coin?.isGold ? '#f59e0b' : '#22c55e';
      aiChart = LightweightCharts.createChart(c, { width: c.clientWidth, height: 180, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' }, grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } }, handleScroll: { mouseWheel: false }, handleScale: { mouseWheel: false } });
      aiChart.addCandlestickSeries({ upColor, downColor: '#ef4444' }).setData(chartData);
      if (toolSettings.ema.enabled && indicators.emaData) { const colors = { 9: '#f97316', 20: '#3b82f6', 50: '#22c55e' }; Object.entries(toolSettings.ema.periods).forEach(([p, en]) => { if (en && indicators.emaData[p] && colors[p]) aiChart.addLineSeries({ color: colors[p], lineWidth: 1 }).setData(indicators.emaData[p].map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean)); }); }
      aiChart.timeScale().fitContent();
    }

    async function fetchData() {
      const period = periods.find(p => p.id === currentPeriod);
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`);
        const json = await res.json();
        chartData = json.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
        if (chartData.length) { currentPrice = chartData[chartData.length - 1].close; priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100; }
        
        // Auto detect market regime
        marketRegime = detectMarketRegime(chartData);
        dynamicWeights = calculateDynamicWeights(marketRegime);
        
        calculateIndicators(); render(); startLiveUpdates();
      } catch (e) { console.error(e); }
    }

    async function loadFearGreed() {
      try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        const data = await res.json();
        if (data?.data?.[0]) fearGreedData = { value: parseInt(data.data[0].value) };
      } catch (e) {}
    }

    function toggleTool(tool) { toolSettings[tool].enabled = !toolSettings[tool].enabled; calculateIndicators(); render(); }
    function selectCoin(symbol) { currentCoin = symbol; mlModel = null; modelTrained = false; mlPredictions = null; marketRegime = null; dynamicWeights = null; fetchData(); }
    function selectPeriod(id) { currentPeriod = id; fetchData(); }
    function switchPage(page) { currentPage = page; render(); }

    window.selectCoin = selectCoin;
    window.selectPeriod = selectPeriod;
    window.switchPage = switchPage;
    window.toggleTool = toggleTool;
    window.startAdvancedTraining = startAdvancedTraining;

    function init() { fetchData(); loadFearGreed(); }
    setTimeout(() => { if (!tfReady) init(); }, 2000);
  </script>
</body>
</html>
