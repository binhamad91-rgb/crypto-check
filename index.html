<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AQ Pro v15 - ذهب + كريبتو</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; font-family: system-ui; color: white; overflow-x: hidden; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .ai-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .ml-gradient { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
    .gold-gradient { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .toggle-btn.active { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .live-dot { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .signal-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .training-bar { transition: width 0.3s ease; }
    .glow { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
    .gold-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
    .indicator-card { border-right: 4px solid; }
  </style>
</head>
<body>
  <div id="app"><div class="flex items-center justify-center min-h-screen"><p class="text-xl">⏳ جاري التحميل...</p></div></div>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
  
  <script>
    let tfReady = false;
    function checkTF() {
      if (typeof tf !== 'undefined') { tfReady = true; init(); }
      else setTimeout(checkTF, 100);
    }
    setTimeout(checkTF, 500);

    let currentPage = 'analysis';
    let currentCoin = 'BTCUSDT';
    let currentPeriod = '1h';
    let chartData = [];
    let currentPrice = 0;
    let priceChange = 0;
    let mainChart = null, rsiChart = null, macdChart = null, aiChart = null, mlChart = null;
    let fearGreedData = null;
    let indicators = {};
    let priceInterval = null;
    
    let mlModel = null;
    let isTraining = false;
    let trainingProgress = 0;
    let trainingEpoch = 0;
    let totalEpochs = 30;
    let trainingLoss = 0;
    let trainingAccuracy = 0;
    let trainingTime = 0;
    let trainingStartTime = null;
    let mlPredictions = null;
    let modelTrained = false;

    let toolSettings = {
      ema: { enabled: true, periods: { 9: true, 20: true, 50: true, 100: false, 200: true } },
      rsi: { enabled: true, period: 14, oversold: 30, overbought: 70 },
      macd: { enabled: true, fast: 12, slow: 26, signal: 9 },
      bollinger: { enabled: true, period: 20, deviation: 2 }
    };

    // الأصول: الذهب أولاً ثم العملات
    const coins = [
      { symbol: 'PAXGUSDT', name: 'الذهب', icon: '🥇', color: '#f59e0b', isGold: true },
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿', color: '#f7931a' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ', color: '#627eea' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈', color: '#f3ba2f' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕', color: '#00aae4' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎', color: '#00ffa3' },
      { symbol: 'ADAUSDT', name: 'كاردانو', icon: '₳', color: '#0033ad' },
      { symbol: 'DOGEUSDT', name: 'دوجكوين', icon: 'Ð', color: '#c2a633' },
      { symbol: 'DOTUSDT', name: 'بولكادوت', icon: '●', color: '#e6007a' },
      { symbol: 'AVAXUSDT', name: 'أفالانش', icon: '▲', color: '#e84142' },
      { symbol: 'MATICUSDT', name: 'بوليجون', icon: '⬡', color: '#8247e5' }
    ];

    const periods = [
      { id: '15m', label: '15د', interval: '1m', limit: 100 },
      { id: '30m', label: '30د', interval: '1m', limit: 100 },
      { id: '1h', label: '1س', interval: '5m', limit: 100 },
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 }
    ];

    // ========== ML Functions ==========
    function prepareMLData(data, lookback = 15) {
      const X = [], y = [];
      const prices = data.map(d => d.close);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;
      const normalized = prices.map(p => (p - min) / range);
      for (let i = lookback; i < normalized.length - 1; i++) {
        X.push(normalized.slice(i - lookback, i));
        y.push(normalized[i + 1] > normalized[i] ? 1 : 0);
      }
      return { X, y, min, max };
    }

    async function buildModel(inputShape) {
      const model = tf.sequential();
      model.add(tf.layers.dense({ units: 32, activation: 'relu', inputShape: [inputShape] }));
      model.add(tf.layers.dropout({ rate: 0.2 }));
      model.add(tf.layers.dense({ units: 16, activation: 'relu' }));
      model.add(tf.layers.dense({ units: 1, activation: 'sigmoid' }));
      model.compile({ optimizer: tf.train.adam(0.01), loss: 'binaryCrossentropy', metrics: ['accuracy'] });
      return model;
    }

    async function startTraining() {
      if (!tfReady || isTraining || chartData.length < 50) return;
      isTraining = true; trainingProgress = 0; trainingEpoch = 0;
      trainingStartTime = Date.now(); modelTrained = false; mlPredictions = null;
      render();
      try {
        const lookback = 15;
        const { X, y, min, max } = prepareMLData(chartData, lookback);
        if (X.length < 20) { isTraining = false; render(); return; }
        const xTensor = tf.tensor2d(X);
        const yTensor = tf.tensor2d(y.map(v => [v]));
        mlModel = await buildModel(lookback);
        totalEpochs = 30;
        await mlModel.fit(xTensor, yTensor, {
          epochs: totalEpochs, batchSize: 8, validationSplit: 0.2, shuffle: true,
          callbacks: {
            onEpochEnd: async (epoch, logs) => {
              trainingEpoch = epoch + 1;
              trainingProgress = ((epoch + 1) / totalEpochs) * 100;
              trainingLoss = logs.loss || 0;
              trainingAccuracy = (logs.acc || 0) * 100;
              trainingTime = (Date.now() - trainingStartTime) / 1000;
              render(); await tf.nextFrame();
            }
          }
        });
        mlModel.normMin = min; mlModel.normMax = max; mlModel.lookback = lookback;
        await makePredictions();
        modelTrained = true;
        xTensor.dispose(); yTensor.dispose();
      } catch (error) { console.error(error); }
      isTraining = false; render();
    }

    async function makePredictions() {
      if (!mlModel || chartData.length < mlModel.lookback) return;
      try {
        const lookback = mlModel.lookback;
        const prices = chartData.slice(-lookback).map(d => d.close);
        const min = mlModel.normMin, max = mlModel.normMax;
        const range = max - min || 1;
        const normalized = prices.map(p => (p - min) / range);
        const input = tf.tensor2d([normalized]);
        const prediction = mlModel.predict(input);
        const predValue = (await prediction.data())[0];
        const avgChange = chartData.slice(-20).reduce((sum, d, i, arr) => i === 0 ? sum : sum + Math.abs(d.close - arr[i-1].close), 0) / 19;
        const direction = predValue > 0.5 ? 'up' : 'down';
        const confidence = Math.abs(predValue - 0.5) * 200;
        const change = avgChange * (predValue > 0.5 ? 1 : -1) * (confidence / 100);
        mlPredictions = { direction, confidence: Math.min(95, Math.max(30, confidence)), price1h: currentPrice + change, price4h: currentPrice + change * 2.5, price24h: currentPrice + change * 8 };
        input.dispose(); prediction.dispose();
      } catch (e) { console.error(e); }
    }

    async function fetchLivePrice() {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentCoin}`);
        const data = await res.json();
        if (data?.price) currentPrice = parseFloat(data.price);
      } catch (e) {}
    }

    function startLiveUpdates() {
      if (priceInterval) clearInterval(priceInterval);
      fetchLivePrice();
      priceInterval = setInterval(fetchLivePrice, 5000);
    }

    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = []; const mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return [];
      const result = [null];
      for (let i = 1; i < data.length; i++) {
        if (i < period) { result.push(null); continue; }
        let gains = 0, losses = 0;
        for (let j = i - period + 1; j <= i; j++) {
          const change = data[j].close - data[j-1].close;
          if (change > 0) gains += change; else losses -= change;
        }
        result.push(losses === 0 ? 100 : 100 - (100 / (1 + (gains/period) / (losses/period))));
      }
      return result;
    }

    function calcMACD(data, fast, slow, signal) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);
      const macdLine = emaFast.map((v, i) => (v && emaSlow[i]) ? v - emaSlow[i] : null);
      const macdData = data.map((d, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calcEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => (v && signalLine[i]) ? v - signalLine[i] : null);
      return { histogram, macdLine, signalLine };
    }

    function calcBollinger(data, period, deviation) {
      const upper = [], lower = [], middle = [];
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) { upper.push(null); lower.push(null); middle.push(null); continue; }
        const slice = data.slice(i - period + 1, i + 1);
        const sma = slice.reduce((a, b) => a + b.close, 0) / period;
        const std = Math.sqrt(slice.reduce((sum, d) => sum + Math.pow(d.close - sma, 2), 0) / period);
        middle.push(sma); upper.push(sma + deviation * std); lower.push(sma - deviation * std);
      }
      return { upper, lower, middle };
    }

    function calculateIndicators() {
      if (!chartData.length) return;
      const last = chartData.length - 1;
      const s = toolSettings;
      const emaData = {};
      [9, 20, 50, 100, 200].forEach(p => { if (s.ema.periods[p]) emaData[p] = calcEMA(chartData, p); });
      const rsi = calcRSI(chartData, s.rsi.period);
      const macd = calcMACD(chartData, s.macd.fast, s.macd.slow, s.macd.signal);
      const bollinger = calcBollinger(chartData, s.bollinger.period, s.bollinger.deviation);
      
      let emaAbove = 0, emaTotal = 0;
      Object.entries(s.ema.periods).forEach(([p, en]) => {
        if (en && emaData[p] && emaData[p][last]) {
          emaTotal++;
          if (currentPrice > emaData[p][last]) emaAbove++;
        }
      });
      
      indicators = { 
        emaData, emaAbove, emaTotal,
        rsi: rsi[last], rsiData: rsi, 
        macdHist: macd.histogram[last], macdData: macd,
        bbUpper: bollinger.upper[last], bbLower: bollinger.lower[last], bbMiddle: bollinger.middle[last], bollingerData: bollinger
      };
    }

    function getDetailedAnalysis() {
      const details = [];
      let totalScore = 0;
      const s = toolSettings;
      const currentCoinData = coins.find(c => c.symbol === currentCoin);
      const isGold = currentCoinData?.isGold;
      
      // RSI
      if (s.rsi.enabled && indicators.rsi) {
        const rsiVal = indicators.rsi;
        let status, impact, reason, color;
        if (rsiVal < 25) { status = 'مشبع بيع قوي'; impact = 30; reason = `RSI = ${rsiVal.toFixed(0)} أقل من 25، فرصة شراء قوية`; color = '#22c55e'; }
        else if (rsiVal < 30) { status = 'مشبع بيع'; impact = 20; reason = `RSI = ${rsiVal.toFixed(0)} أقل من 30، منطقة شراء`; color = '#22c55e'; }
        else if (rsiVal < 45) { status = 'منخفض'; impact = 10; reason = `RSI = ${rsiVal.toFixed(0)} تحت المتوسط`; color = '#84cc16'; }
        else if (rsiVal <= 55) { status = 'محايد'; impact = 0; reason = `RSI = ${rsiVal.toFixed(0)} في المنطقة المحايدة`; color = '#9ca3af'; }
        else if (rsiVal < 70) { status = 'مرتفع'; impact = -10; reason = `RSI = ${rsiVal.toFixed(0)} فوق المتوسط`; color = '#f97316'; }
        else if (rsiVal < 80) { status = 'مشبع شراء'; impact = -20; reason = `RSI = ${rsiVal.toFixed(0)} أكثر من 70`; color = '#ef4444'; }
        else { status = 'مشبع شراء قوي'; impact = -30; reason = `RSI = ${rsiVal.toFixed(0)} أكثر من 80`; color = '#ef4444'; }
        details.push({ name: 'RSI', icon: '💪', value: rsiVal.toFixed(1), status, impact, reason, color });
        totalScore += impact;
      }
      
      // MACD
      if (s.macd.enabled && indicators.macdHist !== null) {
        const hist = indicators.macdHist;
        const prevHist = indicators.macdData?.histogram?.[chartData.length - 2];
        let status, impact, reason, color;
        if (prevHist !== null && prevHist < 0 && hist > 0) { status = 'تقاطع صعودي'; impact = 25; reason = 'MACD عبر للموجب، إشارة شراء'; color = '#22c55e'; }
        else if (prevHist !== null && prevHist > 0 && hist < 0) { status = 'تقاطع هبوطي'; impact = -25; reason = 'MACD عبر للسالب، إشارة بيع'; color = '#ef4444'; }
        else if (hist > 0 && hist > (prevHist || 0)) { status = 'صاعد'; impact = 15; reason = `Histogram موجب ويزداد`; color = '#22c55e'; }
        else if (hist > 0) { status = 'إيجابي'; impact = 8; reason = `Histogram موجب`; color = '#84cc16'; }
        else if (hist < 0 && hist < (prevHist || 0)) { status = 'هابط'; impact = -15; reason = `Histogram سالب ويزداد سلبية`; color = '#ef4444'; }
        else { status = 'سلبي'; impact = -8; reason = `Histogram سالب`; color = '#f97316'; }
        details.push({ name: 'MACD', icon: '🚀', value: hist > 0 ? '▲' : '▼', status, impact, reason, color });
        totalScore += impact;
      }
      
      // EMA
      if (s.ema.enabled && indicators.emaTotal > 0) {
        const above = indicators.emaAbove;
        const total = indicators.emaTotal;
        const ratio = above / total;
        let status, impact, reason, color;
        if (ratio >= 0.8) { status = 'فوق الكل'; impact = 20; reason = `السعر فوق ${above}/${total} متوسطات`; color = '#22c55e'; }
        else if (ratio >= 0.6) { status = 'فوق الأغلب'; impact = 12; reason = `السعر فوق ${above}/${total} متوسطات`; color = '#84cc16'; }
        else if (ratio >= 0.4) { status = 'متوسط'; impact = 0; reason = `السعر فوق ${above}/${total} متوسطات`; color = '#9ca3af'; }
        else if (ratio >= 0.2) { status = 'تحت الأغلب'; impact = -12; reason = `السعر تحت أغلب المتوسطات`; color = '#f97316'; }
        else { status = 'تحت الكل'; impact = -20; reason = `السعر تحت كل المتوسطات`; color = '#ef4444'; }
        details.push({ name: 'EMA', icon: '📈', value: `${above}/${total}`, status, impact, reason, color });
        totalScore += impact;
      }
      
      // Bollinger
      if (s.bollinger.enabled && indicators.bbUpper && indicators.bbLower) {
        const upper = indicators.bbUpper, lower = indicators.bbLower, middle = indicators.bbMiddle;
        let status, impact, reason, color;
        if (currentPrice < lower) { status = 'تحت السفلي'; impact = 20; reason = `السعر أسفل الباند، قد يرتد`; color = '#22c55e'; }
        else if (currentPrice < middle * 0.98) { status = 'قرب السفلي'; impact = 10; reason = `السعر قريب من الباند السفلي`; color = '#84cc16'; }
        else if (currentPrice > upper) { status = 'فوق العلوي'; impact = -20; reason = `السعر فوق الباند، قد يهبط`; color = '#ef4444'; }
        else if (currentPrice > middle * 1.02) { status = 'قرب العلوي'; impact = -10; reason = `السعر قريب من الباند العلوي`; color = '#f97316'; }
        else { status = 'في المنتصف'; impact = 0; reason = `السعر في منتصف النطاق`; color = '#9ca3af'; }
        details.push({ name: 'بولنجر', icon: '📊', value: status, status, impact, reason, color });
        totalScore += impact;
      }
      
      // Fear & Greed (للكريبتو فقط)
      if (fearGreedData && !isGold) {
        const val = fearGreedData.value;
        let status, impact, reason, color;
        if (val < 20) { status = 'خوف شديد'; impact = 15; reason = `مؤشر = ${val}، فرصة شراء`; color = '#22c55e'; }
        else if (val < 35) { status = 'خوف'; impact = 10; reason = `مؤشر = ${val}، قد تكون فرصة`; color = '#84cc16'; }
        else if (val <= 65) { status = 'محايد'; impact = 0; reason = `مؤشر = ${val}، السوق متوازن`; color = '#9ca3af'; }
        else if (val < 80) { status = 'طمع'; impact = -10; reason = `مؤشر = ${val}، احذر`; color = '#f97316'; }
        else { status = 'طمع شديد'; impact = -15; reason = `مؤشر = ${val}، خطر`; color = '#ef4444'; }
        details.push({ name: 'الخوف/الطمع', icon: '🎭', value: val.toString(), status, impact, reason, color });
        totalScore += impact;
      }
      
      // Gold specific - الدولار (للذهب فقط)
      if (isGold) {
        // الذهب عادة يرتفع عند ضعف الدولار وعند الأزمات
        const volatility = chartData.slice(-10).reduce((sum, d) => sum + Math.abs(d.close - d.open), 0) / 10;
        const avgPrice = chartData.slice(-10).reduce((sum, d) => sum + d.close, 0) / 10;
        const volPercent = (volatility / avgPrice) * 100;
        
        let status, impact, reason, color;
        if (volPercent < 0.3) { status = 'مستقر'; impact = 5; reason = 'الذهب مستقر، جيد للاحتفاظ'; color = '#22c55e'; }
        else if (volPercent < 0.8) { status = 'طبيعي'; impact = 0; reason = 'تذبذب طبيعي للذهب'; color = '#9ca3af'; }
        else { status = 'متذبذب'; impact = -5; reason = 'تذبذب عالي، احذر'; color = '#f97316'; }
        details.push({ name: 'التذبذب', icon: '📉', value: volPercent.toFixed(2) + '%', status, impact, reason, color });
        totalScore += impact;
      }
      
      // ML
      if (mlPredictions) {
        const dir = mlPredictions.direction;
        const conf = mlPredictions.confidence;
        let status, impact, reason, color;
        if (dir === 'up' && conf > 60) { status = 'صعود قوي'; impact = 15; reason = `ML يتوقع صعود ${conf.toFixed(0)}%`; color = '#22c55e'; }
        else if (dir === 'up') { status = 'صعود'; impact = 8; reason = `ML يتوقع صعود ${conf.toFixed(0)}%`; color = '#84cc16'; }
        else if (dir === 'down' && conf > 60) { status = 'هبوط قوي'; impact = -15; reason = `ML يتوقع هبوط ${conf.toFixed(0)}%`; color = '#ef4444'; }
        else { status = 'هبوط'; impact = -8; reason = `ML يتوقع هبوط ${conf.toFixed(0)}%`; color = '#f97316'; }
        details.push({ name: 'ML', icon: '🧠', value: `${conf.toFixed(0)}%`, status, impact, reason, color });
        totalScore += impact;
      }
      
      let decision, emoji, bgColor, explanation;
      if (totalScore >= 40) { decision = 'شراء قوي'; emoji = '🏆'; bgColor = 'from-yellow-500 to-amber-600'; explanation = isGold ? 'فرصة ممتازة لشراء الذهب' : 'فرصة شراء ممتازة'; }
      else if (totalScore >= 20) { decision = 'شراء'; emoji = '🥈'; bgColor = 'from-green-500 to-green-600'; explanation = isGold ? 'يمكن شراء الذهب للاحتفاظ' : 'فرصة شراء جيدة'; }
      else if (totalScore >= 5) { decision = 'ميل صعودي'; emoji = '📈'; bgColor = 'from-green-600 to-green-700'; explanation = 'ميل إيجابي خفيف، راقب'; }
      else if (totalScore >= -5) { decision = 'محايد'; emoji = '➡️'; bgColor = 'from-gray-600 to-gray-700'; explanation = 'المؤشرات متضاربة، انتظر'; }
      else if (totalScore >= -20) { decision = 'ميل هبوطي'; emoji = '📉'; bgColor = 'from-orange-500 to-orange-600'; explanation = 'ميل سلبي، احذر'; }
      else if (totalScore >= -40) { decision = 'بيع'; emoji = '⚠️'; bgColor = 'from-red-500 to-red-600'; explanation = 'المؤشرات سلبية'; }
      else { decision = 'بيع قوي'; emoji = '🛑'; bgColor = 'from-red-600 to-red-700'; explanation = 'ابتعد حالياً'; }
      
      return { details, totalScore, decision, emoji, bgColor, explanation };
    }

    function formatPrice(p) { 
      if (!p || isNaN(p)) return '-'; 
      const coin = coins.find(c => c.symbol === currentCoin);
      if (coin?.isGold) {
        return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      return p >= 1000 ? '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : p >= 1 ? '$' + p.toFixed(4) : '$' + p.toFixed(6); 
    }

    function render() {
      const coin = coins.find(c => c.symbol === currentCoin);
      const isGold = coin?.isGold;
      
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen pb-24">
          <div class="${currentPage === 'ml' ? 'ml-gradient' : isGold ? 'gold-gradient' : 'ai-gradient'} p-4">
            <div class="flex justify-between items-center">
              <div>

      const period = periods.find(p => p.id === currentPeriod);
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`);
        const json = await res.json();
        chartData = json.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
        if (chartData.length) { currentPrice = chartData[chartData.length - 1].close; priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100; }
        calculateIndicators(); render(); startLiveUpdates();
      } catch (e) { console.error(e); }
    }

    async function loadFearGreed() {
      try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        const data = await res.json();
        if (data?.data?.[0]) fearGreedData = { value: parseInt(data.data[0].value) };
      } catch (e) {}
    }

    function toggleTool(tool) { toolSettings[tool].enabled = !toolSettings[tool].enabled; calculateIndicators(); render(); }
    function selectCoin(symbol) { currentCoin = symbol; mlModel = null; modelTrained = false; mlPredictions = null; fetchData(); }
    function selectPeriod(id) { currentPeriod = id; fetchData(); }
    function switchPage(page) { currentPage = page; render(); }

    window.selectCoin = selectCoin;
    window.selectPeriod = selectPeriod;
    window.switchPage = switchPage;
    window.toggleTool = toggleTool;
    window.startTraining = startTraining;

    function init() { fetchData(); loadFearGreed(); }
    setTimeout(() => { if (!tfReady) init(); }, 2000);
  </script>
</body>
</html>
