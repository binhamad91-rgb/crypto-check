  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const formatPrice = (p) => {
      if (!p || isNaN(p)) return '-';
      if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return p.toFixed(p >= 1 ? 4 : 6);
    };

    const timeAgo = (date) => {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return 'الآن';
      if (seconds < 3600) return `منذ ${Math.floor(seconds / 60)} د`;
      if (seconds < 86400) return `منذ ${Math.floor(seconds / 3600)} س`;
      return `منذ ${Math.floor(seconds / 86400)} ي`;
    };

    // Technical Indicators
    const calculateEMA = (data, period) => {
      if (!data || data.length < period) return data?.map(() => null) || [];
      const result = [], mult = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    };

    const calculateSMA = (data, period) => data.map((_, i) => i < period - 1 ? null : data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0) / period);

    const calculateRSI = (data, period = 14) => {
      if (!data || data.length < period + 1) return data?.map(() => null) || [];
      const result = [null], gains = [], losses = [];
      for (let i = 1; i < data.length; i++) {
        const change = data[i].close - data[i - 1].close;
        gains.push(change > 0 ? change : 0);
        losses.push(change < 0 ? Math.abs(change) : 0);
      }
      for (let i = 0; i < gains.length; i++) {
        if (i < period - 1) result.push(null);
        else {
          const avgGain = gains.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          const avgLoss = losses.slice(Math.max(0, i - period + 1), i + 1).reduce((a, b) => a + b, 0) / period;
          result.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
        }
      }
      return result;
    };

    const calculateMACD = (data, fast = 12, slow = 26, signal = 9) => {
      const emaFast = calculateEMA(data, fast), emaSlow = calculateEMA(data, slow);
      const macdLine = emaFast.map((v, i) => v && emaSlow[i] ? v - emaSlow[i] : null);
      const macdData = data.map((_, i) => ({ close: macdLine[i] || 0 }));
      const signalLine = calculateEMA(macdData, signal);
      const histogram = macdLine.map((v, i) => v && signalLine[i] ? v - signalLine[i] : null);
      return { macdLine, signalLine, histogram };
    };

    const calculateBollingerBands = (data, period = 20, stdDev = 2) => {
      const sma = calculateSMA(data, period), upper = [], lower = [];
      for (let i = 0; i < data.length; i++) {
        if (!sma[i]) { upper.push(null); lower.push(null); continue; }
        const slice = data.slice(Math.max(0, i - period + 1), i + 1).map(d => d.close);
        const std = Math.sqrt(slice.reduce((sum, val) => sum + Math.pow(val - sma[i], 2), 0) / slice.length);
        upper.push(sma[i] + stdDev * std); lower.push(sma[i] - stdDev * std);
      }
      return { sma, upper, lower };
    };

    const calculateVWAP = (data) => {
      let cumVol = 0, cumVolPrice = 0;
      return data.map(d => { cumVol += d.volume || 1; cumVolPrice += ((d.high + d.low + d.close) / 3) * (d.volume || 1); return cumVol > 0 ? cumVolPrice / cumVol : null; });
    };

    const calculateStochastic = (data, kPeriod = 14, dPeriod = 3) => {
      const kValues = data.map((_, i) => {
        if (i < kPeriod - 1) return null;
        const slice = data.slice(i - kPeriod + 1, i + 1);
        const high = Math.max(...slice.map(d => d.high)), low = Math.min(...slice.map(d => d.low));
        return high === low ? 50 : ((data[i].close - low) / (high - low)) * 100;
      });
      const dValues = kValues.map((_, i) => {
        if (i < kPeriod + dPeriod - 2) return null;
        const slice = kValues.slice(i - dPeriod + 1, i + 1).filter(v => v !== null);
        return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
      });
      return { k: kValues, d: dValues };
    };

    const calculateADX = (data, period = 14) => {
      if (data.length < period + 1) return data.map(() => null);
      const tr = [], plusDM = [], minusDM = [];
      for (let i = 1; i < data.length; i++) {
        tr.push(Math.max(data[i].high - data[i].low, Math.abs(data[i].high - data[i-1].close), Math.abs(data[i].low - data[i-1].close)));
        const highDiff = data[i].high - data[i-1].high, lowDiff = data[i-1].low - data[i].low;
        plusDM.push(highDiff > lowDiff && highDiff > 0 ? highDiff : 0);
        minusDM.push(lowDiff > highDiff && lowDiff > 0 ? lowDiff : 0);
      }
      const smoothedTR = [], smoothedPlusDM = [], smoothedMinusDM = [];
      for (let i = 0; i < tr.length; i++) {
        if (i < period - 1) { smoothedTR.push(null); smoothedPlusDM.push(null); smoothedMinusDM.push(null); }
        else if (i === period - 1) { smoothedTR.push(tr.slice(0, period).reduce((a, b) => a + b, 0)); smoothedPlusDM.push(plusDM.slice(0, period).reduce((a, b) => a + b, 0)); smoothedMinusDM.push(minusDM.slice(0, period).reduce((a, b) => a + b, 0)); }
        else { smoothedTR.push(smoothedTR[i-1] - smoothedTR[i-1]/period + tr[i]); smoothedPlusDM.push(smoothedPlusDM[i-1] - smoothedPlusDM[i-1]/period + plusDM[i]); smoothedMinusDM.push(smoothedMinusDM[i-1] - smoothedMinusDM[i-1]/period + minusDM[i]); }
      }
      const plusDI = smoothedTR.map((tr, i) => tr ? (smoothedPlusDM[i] / tr) * 100 : null);
      const minusDI = smoothedTR.map((tr, i) => tr ? (smoothedMinusDM[i] / tr) * 100 : null);
      const dx = plusDI.map((plus, i) => { if (!plus || !minusDI[i]) return null; const sum = plus + minusDI[i]; return sum === 0 ? 0 : (Math.abs(plus - minusDI[i]) / sum) * 100; });
      const adx = dx.map((_, i) => { if (i < period * 2 - 2) return null; const slice = dx.slice(i - period + 1, i + 1).filter(v => v !== null); return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null; });
      return [null, ...adx];
    };

    const calculateFibonacci = (data) => {
      const high = Math.max(...data.map(d => d.high)), low = Math.min(...data.map(d => d.low)), diff = high - low;
      return { level0: low, level236: low + diff * 0.236, level382: low + diff * 0.382, level50: low + diff * 0.5, level618: low + diff * 0.618, level100: high };
    };

    const calculateATR = (data, period = 14) => {
      const tr = data.map((d, i) => i === 0 ? d.high - d.low : Math.max(d.high - d.low, Math.abs(d.high - data[i-1].close), Math.abs(d.low - data[i-1].close)));
      return tr.map((_, i) => i < period - 1 ? null : tr.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period);
    };

    const calculateSupportResistance = (data) => {
      if (data.length < 20) return { support: [], resistance: [] };
      const highs = data.map(d => d.high), lows = data.map(d => d.low), support = [], resistance = [];
      for (let i = 5; i < data.length - 5; i++) {
        if (lows.slice(i - 5, i).every(l => l >= lows[i]) && lows.slice(i + 1, i + 6).every(l => l >= lows[i])) support.push(lows[i]);
        if (highs.slice(i - 5, i).every(h => h <= highs[i]) && highs.slice(i + 1, i + 6).every(h => h <= highs[i])) resistance.push(highs[i]);
      }
      return { support: [...new Set(support)].sort((a, b) => a - b).slice(-3), resistance: [...new Set(resistance)].sort((a, b) => b - a).slice(-3) };
    };

    // ═══════════════════════════════════════════════════════════════
    // 🤖 SMART AI ANALYSIS (No API needed!)
    // ═══════════════════════════════════════════════════════════════
    
    function performSmartAnalysis(price, indicators, activeTools, toolSettings) {
      const signals = [];
      const analysis = [];
      const comparison = [];
      
      // EMA Analysis
      if (activeTools.includes('ema')) {
        const emaPeriods = toolSettings.emaPeriods || [20, 50, 200];
        let bullish = 0, bearish = 0;
        emaPeriods.forEach(p => {
          const emaVal = indicators[`ema${p}`];
          if (emaVal) {
            if (price > emaVal) bullish++;
            else bearish++;
          }
        });
        const emaSignal = bullish > bearish ? 'bullish' : bullish < bearish ? 'bearish' : 'neutral';
        signals.push({ tool: 'EMA', signal: emaSignal, weight: 2 });
        comparison.push({
          tool: 'EMA',
          your_result: `${bullish}/${emaPeriods.length} فوق`,
          ai_says: emaSignal === 'bullish' ? '✅ إيجابي' : emaSignal === 'bearish' ? '❌ سلبي' : '⚪ محايد',
          match: emaSignal === 'bullish'
        });
        
        if (emaSignal === 'bullish') analysis.push('السعر فوق أغلب المتوسطات المتحركة مما يشير لاتجاه صعودي');
        else if (emaSignal === 'bearish') analysis.push('السعر تحت أغلب المتوسطات المتحركة مما يشير لضغط بيعي');
        
        // Golden Cross / Death Cross
        if (indicators.ema50 && indicators.ema200) {
          if (indicators.ema50 > indicators.ema200) analysis.push('🌟 تقاطع ذهبي: EMA50 فوق EMA200');
          else analysis.push('💀 تقاطع الموت: EMA50 تحت EMA200');
        }
      }
      
      // RSI Analysis
      if (activeTools.includes('rsi')) {
        const rsi = indicators.rsi;
        let rsiSignal = 'neutral';
        if (rsi < 30) { rsiSignal = 'bullish'; analysis.push('🟢 RSI في منطقة التشبع البيعي - فرصة شراء محتملة'); }
        else if (rsi > 70) { rsiSignal = 'bearish'; analysis.push('🔴 RSI في منطقة التشبع الشرائي - احذر من التصحيح'); }
        else if (rsi < 45) { rsiSignal = 'bullish'; analysis.push('RSI يقترب من منطقة الشراء'); }
        else if (rsi > 55) { rsiSignal = 'bearish'; analysis.push('RSI مرتفع نسبياً'); }
        else { analysis.push('RSI في المنطقة المحايدة'); }
        
        signals.push({ tool: 'RSI', signal: rsiSignal, weight: 2 });
        comparison.push({
          tool: 'RSI',
          your_result: rsi?.toFixed(0),
          ai_says: rsiSignal === 'bullish' ? '✅ فرصة' : rsiSignal === 'bearish' ? '⚠️ حذر' : '⚪ محايد',
          match: rsiSignal !== 'bearish'
        });
      }
      
      // MACD Analysis
      if (activeTools.includes('macd')) {
        const hist = indicators.macdHist;
        const macdSignal = hist > 0 ? 'bullish' : 'bearish';
        signals.push({ tool: 'MACD', signal: macdSignal, weight: 2 });
        comparison.push({
          tool: 'MACD',
          your_result: hist > 0 ? '▲ إيجابي' : '▼ سلبي',
          ai_says: macdSignal === 'bullish' ? '✅ صعودي' : '❌ هبوطي',
          match: macdSignal === 'bullish'
        });
        
        if (macdSignal === 'bullish') analysis.push('MACD إيجابي مع زخم صعودي');
        else analysis.push('MACD سلبي مع ضغط هبوطي');
      }
      
      // Bollinger Analysis
      if (activeTools.includes('bollinger')) {
        let bbSignal = 'neutral';
        if (price < indicators.bbLower) { bbSignal = 'bullish'; analysis.push('🟢 السعر تحت البولنجر السفلي - قد يرتد للأعلى'); }
        else if (price > indicators.bbUpper) { bbSignal = 'bearish'; analysis.push('🔴 السعر فوق البولنجر العلوي - قد يتراجع'); }
        else { analysis.push('السعر داخل نطاق البولنجر'); }
        
        signals.push({ tool: 'Bollinger', signal: bbSignal, weight: 1.5 });
        comparison.push({
          tool: 'بولنجر',
          your_result: bbSignal === 'bullish' ? 'تحت' : bbSignal === 'bearish' ? 'فوق' : 'داخل',
          ai_says: bbSignal === 'bullish' ? '✅ ارتداد' : bbSignal === 'bearish' ? '⚠️ تصحيح' : '⚪ طبيعي',
          match: bbSignal !== 'bearish'
        });
      }
      
      // VWAP Analysis
      if (activeTools.includes('vwap')) {
        const vwapSignal = price > indicators.vwap ? 'bullish' : 'bearish';
        signals.push({ tool: 'VWAP', signal: vwapSignal, weight: 1 });
        comparison.push({
          tool: 'VWAP',
          your_result: price > indicators.vwap ? 'فوق' : 'تحت',
          ai_says: vwapSignal === 'bullish' ? '✅ قوة' : '❌ ضعف',
          match: vwapSignal === 'bullish'
        });
      }
      
      // Stochastic Analysis
      if (activeTools.includes('stochastic')) {
        const stochK = indicators.stochK;
        let stochSignal = 'neutral';
        if (stochK < 20) { stochSignal = 'bullish'; analysis.push('🟢 Stochastic في تشبع بيعي'); }
        else if (stochK > 80) { stochSignal = 'bearish'; analysis.push('🔴 Stochastic في تشبع شرائي'); }
        
        signals.push({ tool: 'Stochastic', signal: stochSignal, weight: 1.5 });
        comparison.push({
          tool: 'Stoch',
          your_result: `K:${stochK?.toFixed(0)}`,
          ai_says: stochSignal === 'bullish' ? '✅ شراء' : stochSignal === 'bearish' ? '⚠️ بيع' : '⚪ محايد',
          match: stochSignal !== 'bearish'
        });
      }
      
      // ADX Analysis
      if (activeTools.includes('adx')) {
        const adx = indicators.adx;
        const adxSignal = adx > 25 ? 'bullish' : 'neutral';
        signals.push({ tool: 'ADX', signal: adxSignal, weight: 1 });
        comparison.push({
          tool: 'ADX',
          your_result: adx?.toFixed(0),
          ai_says: adx > 25 ? '💪 اتجاه قوي' : '😐 ضعيف',
          match: adx > 20
        });
        
        if (adx > 25) analysis.push('💪 ADX يشير لاتجاه قوي في السوق');
        else analysis.push('ADX ضعيف - السوق بدون اتجاه واضح');
      }
      
      // ATR Analysis
      if (activeTools.includes('atr')) {
        const atrPercent = indicators.atrPercent;
        if (atrPercent > 5) analysis.push('⚠️ تقلب عالي - استخدم وقف خسارة واسع');
        else if (atrPercent < 2) analysis.push('✅ تقلب منخفض - مناسب للدخول');
      }
      
      // Calculate final score
      let bullishScore = 0, bearishScore = 0, totalWeight = 0;
      signals.forEach(s => {
        totalWeight += s.weight;
        if (s.signal === 'bullish') bullishScore += s.weight;
        else if (s.signal === 'bearish') bearishScore += s.weight;
      });
      
      const confidence = totalWeight > 0 ? Math.round(((bullishScore > bearishScore ? bullishScore : bearishScore) / totalWeight) * 100) : 50;
      const netScore = bullishScore - bearishScore;
      
      let decision, decisionEmoji;
      if (netScore >= 4) { decision = 'شراء قوي'; decisionEmoji = '🚀'; }
      else if (netScore >= 2) { decision = 'شراء'; decisionEmoji = '🟢'; }
      else if (netScore >= -1) { decision = 'انتظار'; decisionEmoji = '🟡'; }
      else if (netScore >= -3) { decision = 'تراجع'; decisionEmoji = '🟠'; }
      else { decision = 'ابتعد'; decisionEmoji = '🔴'; }
      
      // Calculate entry points
      const atr = indicators.atr || price * 0.02;
      const entry = price;
      const stopLoss = price - (atr * 2);
      const target1 = price + (atr * 2);
      const target2 = price + (atr * 4);
      const target3 = price + (atr * 6);
      
      // Suggestions
      let suggestions = [];
      if (!activeTools.includes('rsi')) suggestions.push('جرب إضافة RSI لتحديد مناطق التشبع');
      if (!activeTools.includes('macd')) suggestions.push('أضف MACD لتأكيد الزخم');
      if (!activeTools.includes('ema')) suggestions.push('المتوسطات المتحركة مهمة لتحديد الاتجاه');
      if (activeTools.length < 3) suggestions.push('استخدم على الأقل 3 أدوات للتحليل الأفضل');
      
      // Warnings
      let warnings = [];
      if (indicators.rsi > 70) warnings.push('RSI مرتفع جداً - خطر تصحيح');
      if (indicators.atrPercent > 5) warnings.push('تقلب عالي - احذر');
      if (indicators.adx < 20) warnings.push('لا يوجد اتجاه واضح');
      
      return {
        decision,
        decisionEmoji,
        confidence,
        analysis: analysis.join(' | '),
        comparison,
        suggestions: suggestions.join(' • ') || 'تحليلك جيد! استمر',
        entry,
        stopLoss,
        target1,
        target2,
        target3,
        warnings: warnings.join(' • ') || null,
        bullishScore,
        bearishScore,
        signals
      };
    }

    const COINS = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿', color: '#f7931a' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ', color: '#627eea' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈', color: '#f3ba2f' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎', color: '#00ffa3' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕', color: '#00aae4' },
    ];

    const TIME_PERIODS = [
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '3m', label: '3 شهور', interval: '1d', limit: 90 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 },
      { id: '3y', label: '3 سنوات', interval: '1w', limit: 156 },
    ];

    const TOOLS = [
      { id: 'ema', name: 'EMA', icon: '📈' },
      { id: 'rsi', name: 'RSI', icon: '💪' },
      { id: 'macd', name: 'MACD', icon: '🚀' },
      { id: 'bollinger', name: 'بولنجر', icon: '📊' },
      { id: 'vwap', name: 'VWAP', icon: '⚖️' },
      { id: 'stochastic', name: 'Stoch', icon: '⚡' },
      { id: 'adx', name: 'ADX', icon: '💎' },
      { id: 'fibonacci', name: 'فيبو', icon: '🔢' },
      { id: 'atr', name: 'ATR', icon: '📉' },
      { id: 'support', name: 'دعم', icon: '🎯' },
    ];

    const EMA_PERIODS = [9, 20, 50, 100, 200];
    const EMA_COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];

    const useLocalStorage = (key, initialValue) => {
      const [value, setValue] = useState(() => { try { return JSON.parse(localStorage.getItem(key)) || initialValue; } catch { return initialValue; } });
      useEffect(() => { localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
      return [value, setValue];
    };

    function useMarketData(symbol, period) {
      const [data, setData] = useState([]);
      const [price, setPrice] = useState(null);
      const [loading, setLoading] = useState(true);
      const [priceChange, setPriceChange] = useState(0);
      const wsRef = useRef(null);

      useEffect(() => {
        setLoading(true);
        const fetchKlines = async () => {
          try {
            const periodConfig = TIME_PERIODS.find(p => p.id === period) || TIME_PERIODS[4];
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${periodConfig.interval}&limit=${periodConfig.limit}`);
            const json = await res.json();
            const formatted = json.map(c => ({ time: c[0] / 1000, open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
            setData(formatted);

        };
        fetchKlines();

        wsRef.current = ws;

        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [symbol, period]);

                    <p className="text-xs text-green-300">🎯 هدف 2</p>
                    <p className="font-bold">${formatPrice(aiResult.target2)}</p>
                  </div>
                </div>
              </div>

              {/* Warnings */}
              {aiResult.warnings && (
                <div className="bg-yellow-900/30 border border-yellow-600/50 rounded-xl p-4">
                  <p className="text-sm text-yellow-400 mb-1">⚠️ تحذيرات:</p>
                  <p className="text-yellow-200 text-sm">{aiResult.warnings}</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function NewsPage() {
      const [news, setNews] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');

      useEffect(() => { loadNews(); }, []);

      const loadNews = async () => {
        setLoading(true);
        try {
          const response = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,ETH,Trading,Regulation');
          const data = await response.json();
          const newsItems = data.Data?.slice(0, 15) || [];
          // Simple sentiment analysis based on keywords
          const analyzed = newsItems.map(item => {
            const title = item.title.toLowerCase();
            let sentiment = 'neutral';
            if (title.includes('surge') || title.includes('rally') || title.includes('bull') || title.includes('gain') || title.includes('rise') || title.includes('high') || title.includes('buy')) sentiment = 'positive';
            else if (title.includes('crash') || title.includes('drop') || title.includes('bear') || title.includes('fall') || title.includes('low') || title.includes('sell') || title.includes('warn')) sentiment = 'negative';
            return { ...item, sentiment, impact: Math.random() > 0.7 ? 'high' : Math.random() > 0.4 ? 'medium' : 'low' };
          });
          setNews(analyzed);
        } catch { setNews([]); }
        setLoading(false);
      };

      const filteredNews = news.filter(n => filter === 'all' || n.sentiment === filter);

      const getSentimentStyle = (sentiment) => sentiment === 'positive' ? { bg: 'bg-green-900/30', border: 'border-green-600', dot: 'bg-green-500' } : sentiment === 'negative' ? { bg: 'bg-red-900/30', border: 'border-red-600', dot: 'bg-red-500' } : { bg: 'bg-gray-800', border: 'border-gray-600', dot: 'bg-yellow-500' };
      const getImpactStars = (impact) => impact === 'high' ? '⭐⭐⭐' : impact === 'medium' ? '⭐⭐' : '⭐';

      const positiveCount = news.filter(n => n.sentiment === 'positive').length;
      const negativeCount = news.filter(n => n.sentiment === 'negative').length;
      const neutralCount = news.filter(n => n.sentiment === 'neutral').length;

      const marketMood = positiveCount > negativeCount ? 'bullish' : negativeCount > positiveCount ? 'bearish' : 'neutral';

      return (
        <div className="pb-20 px-4">
          <div className="flex justify-between items-center py-3"><h2 className="text-xl font-bold">📰 أخبار السوق</h2><button onClick={loadNews} className="p-2 glass rounded-lg">{loading ? <span className="animate-spin">⏳</span> : '🔄'}</button></div>

          <div className={`rounded-xl p-4 mb-4 ${marketMood === 'bullish' ? 'bg-gradient-to-r from-green-900/50 to-green-800/50' : marketMood === 'bearish' ? 'bg-gradient-to-r from-red-900/50 to-red-800/50' : 'bg-gradient-to-r from-gray-800 to-gray-700'}`}>
            <div className="flex items-center gap-3 mb-2">
              <span className="text-3xl">{marketMood === 'bullish' ? '🐂' : marketMood === 'bearish' ? '🐻' : '😐'}</span>
              <div>
                <p className="font-bold">مزاج السوق: {marketMood === 'bullish' ? 'صعودي' : marketMood === 'bearish' ? 'هبوطي' : 'محايد'}</p>
              </div>
            </div>
            <div className="flex gap-4 text-sm"><span className="text-green-400">🟢 {positiveCount}</span><span className="text-yellow-400">🟡 {neutralCount}</span><span className="text-red-400">🔴 {negativeCount}</span></div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar mb-3 -mx-4 px-4">
            {[{ id: 'all', label: 'الكل', icon: '📋' }, { id: 'positive', label: 'إيجابي', icon: '🟢' }, { id: 'neutral', label: 'محايد', icon: '🟡' }, { id: 'negative', label: 'سلبي', icon: '🔴' }].map(f => (<button key={f.id} onClick={() => setFilter(f.id)} className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${filter === f.id ? 'ai-gradient' : 'glass'}`}><span>{f.icon}</span><span>{f.label}</span></button>))}
          </div>

          {loading ? (<div className="space-y-3">{[1, 2, 3, 4, 5].map(i => (<div key={i} className="glass rounded-xl p-4 animate-pulse"><div className="h-4 bg-gray-700 rounded w-3/4 mb-2"></div><div className="h-3 bg-gray-700 rounded w-1/2"></div></div>))}</div>) : (
            <div className="space-y-3">
              {filteredNews.map((item, i) => { const style = getSentimentStyle(item.sentiment); return (
                <div key={i} className={`rounded-xl p-4 border ${style.bg} ${style.border} animate-slideUp`} style={{ animationDelay: `${i * 50}ms` }}>
                  <div className="flex items-start gap-3">
                    <div className={`w-3 h-3 rounded-full mt-1.5 ${style.dot}`}></div>
                    <div className="flex-1">
                      <p className="font-bold text-sm mb-1">{item.title}</p>
                      <div className="flex flex-wrap gap-2 mb-2"><span className="text-xs">{getImpactStars(item.impact)}</span></div>
                      <div className="flex justify-between items-center text-xs text-gray-400"><span>{item.source || 'CryptoCompare'}</span><span>{timeAgo(item.published_on * 1000)}</span></div>
                    </div>
                  </div>
                  {item.url && (<a href={item.url} target="_blank" rel="noopener noreferrer" className="block mt-2 text-xs text-indigo-400 hover:underline">📖 قراءة المزيد</a>)}
                </div>
              ); })}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState('analysis');
      return (
        <div className="min-h-screen bg-[#0a0a0f] text-white">
          <div className="ai-gradient p-4 sticky top-0 z-30"><div className="flex justify-between items-center"><div><h1 className="text-xl font-bold">⚡ AQ Pro</h1><p className="text-xs opacity-80">التحليل الذكي للعملات الرقمية</p></div><div className="flex items-center gap-2"><span className="text-2xl">🤖</span><span className="px-2 py-1 rounded-full text-xs bg-white/20 animate-pulse">AI</span></div></div></div>
          <div className="pt-2">{page === 'analysis' && <AnalysisPage />}{page === 'news' && <NewsPage />}</div>
          <div className="fixed bottom-0 left-0 right-0 bg-[#0a0a0f]/95 backdrop-blur-lg border-t border-white/10 px-4 py-3 z-40"><div className="flex justify-around max-w-md mx-auto"><button onClick={() => setPage('analysis')} className={`flex flex-col items-center gap-1 px-6 py-2 rounded-xl ${page === 'analysis' ? 'ai-gradient' : ''}`}><span className="text-xl">📊</span><span className="text-xs">التحليل</span></button><button onClick={() => setPage('news')} className={`flex flex-col items-center gap-1 px-6 py-2 rounded-xl ${page === 'news' ? 'ai-gradient' : ''}`}><span className="text-xl">📰</span><span className="text-xs">الأخبار</span></button></div></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
