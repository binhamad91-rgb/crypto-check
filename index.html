<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQ Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; font-family: system-ui; color: white; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .ai-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // Data
    let currentCoin = 'BTCUSDT';
    let currentPeriod = '1d';
    let chartData = [];
    let currentPrice = 0;
    let priceChange = 0;
    let chart = null;
    let candleSeries = null;
    let ema20Series = null;
    let ema50Series = null;
    let aiEnabled = false;

    const coins = [
      { symbol: 'BTCUSDT', name: 'بيتكوين', icon: '₿' },
      { symbol: 'ETHUSDT', name: 'إيثيريوم', icon: 'Ξ' },
      { symbol: 'BNBUSDT', name: 'BNB', icon: '◈' },
      { symbol: 'SOLUSDT', name: 'سولانا', icon: '◎' },
      { symbol: 'XRPUSDT', name: 'ريبل', icon: '✕' }
    ];

    const periods = [
      { id: '1d', label: 'يوم', interval: '15m', limit: 96 },
      { id: '1w', label: 'أسبوع', interval: '1h', limit: 168 },
      { id: '1m', label: 'شهر', interval: '4h', limit: 180 },
      { id: '1y', label: 'سنة', interval: '1d', limit: 365 }
    ];

    // Calculate EMA
    function calcEMA(data, period) {
      if (!data || data.length < period) return [];
      const result = [];
      const mult = 2 / (period + 1);
      let ema = 0;
      for (let i = 0; i < period; i++) ema += data[i].close;
      ema = ema / period;
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) result.push(null);
        else if (i === period - 1) result.push(ema);
        else { ema = (data[i].close - ema) * mult + ema; result.push(ema); }
      }
      return result;
    }

    // Calculate RSI
    function calcRSI(data, period) {
      if (!data || data.length < period + 1) return 50;
      const gains = [];
      const losses = [];
      for (let i = 1; i < data.length; i++) {
        const change = data[i].close - data[i - 1].close;
        gains.push(change > 0 ? change : 0);
        losses.push(change < 0 ? Math.abs(change) : 0);
      }
      const last = gains.length - 1;
      const avgGain = gains.slice(Math.max(0, last - period + 1), last + 1).reduce((a, b) => a + b, 0) / period;
      const avgLoss = losses.slice(Math.max(0, last - period + 1), last + 1).reduce((a, b) => a + b, 0) / period;
      return avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
    }

    // Calculate MACD
    function calcMACD(data) {
      if (!data || data.length < 26) return 0;
      const ema12 = calcEMA(data, 12);
      const ema26 = calcEMA(data, 26);
      const last = data.length - 1;
      if (!ema12[last] || !ema26[last]) return 0;
      const macdLine = ema12[last] - ema26[last];
      return macdLine;
    }

    // Format price
    function formatPrice(p) {
      if (!p || isNaN(p)) return '-';
      if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return '$' + p.toFixed(4);
    }

    // Render UI
    function render() {
      const coin = coins.find(c => c.symbol === currentCoin);
      const period = periods.find(p => p.id === currentPeriod);
      
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen">
          <!-- Header -->
          <div class="ai-gradient p-4">
            <div class="flex justify-between items-center">
              <div>
                <h1 class="text-xl font-bold">⚡ AQ Pro</h1>
                <p class="text-xs opacity-80">التحليل الذكي</p>
              </div>
              <span class="text-2xl">🤖</span>
            </div>
          </div>

          <!-- Coins -->
          <div class="flex gap-2 overflow-x-auto p-4">
            ${coins.map(c => `
              <button onclick="selectCoin('${c.symbol}')" class="flex items-center gap-2 px-4 py-2 rounded-xl whitespace-nowrap ${c.symbol === currentCoin ? 'ai-gradient' : 'glass'}">
                <span>${c.icon}</span>
                <span class="text-sm">${c.name}</span>
              </button>
            `).join('')}
          </div>

          <!-- Price -->
          <div class="glass rounded-xl p-4 mx-4 mb-3">
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-3">
                <span class="text-3xl">${coin ? coin.icon : ''}</span>
                <div>
                  <p class="font-bold text-lg">${coin ? coin.name : ''}</p>
                  <p class="text-xs text-gray-400">${period ? period.label : ''}</p>
                </div>
              </div>
              <div class="text-left">
                <p class="text-2xl font-bold">${formatPrice(currentPrice)}</p>
                <p class="text-sm ${priceChange >= 0 ? 'text-green-400' : 'text-red-400'}">
                  ${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%
                </p>
              </div>
            </div>
          </div>

          <!-- Periods -->
          <div class="flex gap-2 px-4 mb-3">
            ${periods.map(p => `
              <button onclick="selectPeriod('${p.id}')" class="px-4 py-2 rounded-lg text-sm ${p.id === currentPeriod ? 'ai-gradient' : 'glass'}">
                ${p.label}
              </button>
            `).join('')}
          </div>

          <!-- Chart -->
          <div class="glass rounded-xl p-2 mx-4 mb-3">
            <div id="chart" style="height: 280px;"></div>
          </div>

          <!-- AI Button -->
          <div class="px-4 mb-3">
            <button onclick="toggleAI()" class="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 ${aiEnabled ? 'ai-gradient' : 'glass border-2 border-purple-500'}">
              <span class="text-xl">🤖</span>
              <span>تحليل الذكاء الاصطناعي</span>
              ${aiEnabled ? '<span class="w-5 h-5 rounded-full bg-white flex items-center justify-center text-purple-600 text-xs">✓</span>' : ''}
            </button>
          </div>

          <!-- AI Result -->
          <div id="aiResult" class="px-4"></div>
        </div>
      `;

      // Create chart after render
      setTimeout(createChart, 100);
    }

    // Create chart
    function createChart() {
      const container = document.getElementById('chart');
      if (!container || !chartData.length) return;

      // Remove old chart
      if (chart) {
        chart.remove();
        chart = null;
      }

      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 280,
        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#9ca3af' },
        grid: { vertLines: { color: 'rgba(255,255,255,0.05)' }, horzLines: { color: 'rgba(255,255,255,0.05)' } },
        rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
        timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true }
      });

      candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e', downColor: '#ef4444',
        borderUpColor: '#22c55e', borderDownColor: '#ef4444',
        wickUpColor: '#22c55e', wickDownColor: '#ef4444'
      });
      candleSeries.setData(chartData);

      // Add EMA lines
      const ema20 = calcEMA(chartData, 20);
      const ema50 = calcEMA(chartData, 50);

      ema20Series = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2 });
      ema20Series.setData(ema20.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));

      ema50Series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 2 });
      ema50Series.setData(ema50.map((v, i) => v ? { time: chartData[i].time, value: v } : null).filter(Boolean));

      chart.timeScale().fitContent();

      // Handle resize
      window.addEventListener('resize', () => {
        if (chart && container) {
          chart.applyOptions({ width: container.clientWidth });
        }
      });
    }

    // Fetch data
    async function fetchData() {
      const period = periods.find(p => p.id === currentPeriod);
      if (!period) return;

      try {
        const url = `https://api.binance.com/api/v3/klines?symbol=${currentCoin}&interval=${period.interval}&limit=${period.limit}`;
        const res = await fetch(url);
        const json = await res.json();
        
        chartData = json.map(c => ({
          time: Math.floor(c[0] / 1000),
          open: parseFloat(c[1]),
          high: parseFloat(c[2]),
          low: parseFloat(c[3]),
          close: parseFloat(c[4])
        }));

        if (chartData.length > 0) {
          currentPrice = chartData[chartData.length - 1].close;
          priceChange = ((chartData[chartData.length - 1].close - chartData[0].open) / chartData[0].open) * 100;
        }

        render();
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    // Select coin
    function selectCoin(symbol) {
      currentCoin = symbol;
      aiEnabled = false;
      fetchData();
    }

    // Select period
    function selectPeriod(id) {
      currentPeriod = id;
      aiEnabled = false;
      fetchData();
    }

    // Toggle AI
    function toggleAI() {
      aiEnabled = !aiEnabled;
      
      if (aiEnabled && chartData.length > 0) {
        const rsi = calcRSI(chartData, 14);
        const macd = calcMACD(chartData);
        const ema20 = calcEMA(chartData, 20);
        const ema50 = calcEMA(chartData, 50);
        const last = chartData.length - 1;

        let score = 0;
        const analysis = [];

        // EMA Analysis
        let emaAbove = 0;
        if (currentPrice > ema20[last]) emaAbove++;
        if (currentPrice > ema50[last]) emaAbove++;
        if (emaAbove >= 1) { score += 2; analysis.push('السعر فوق المتوسطات ✅'); }
        else { score -= 2; analysis.push('السعر تحت المتوسطات ❌'); }

        // RSI Analysis
        if (rsi < 30) { score += 2; analysis.push('RSI مشبع بيع 🟢'); }
        else if (rsi > 70) { score -= 2; analysis.push('RSI مشبع شراء 🔴'); }
        else { analysis.push('RSI طبيعي (' + rsi.toFixed(0) + ')'); }

        // MACD Analysis
        if (macd > 0) { score += 2; analysis.push('MACD إيجابي ▲'); }
        else { score -= 2; analysis.push('MACD سلبي ▼'); }

        // Decision
        let decision, emoji, bgColor;
        if (score >= 4) { decision = 'شراء قوي'; emoji = '🚀'; bgColor = 'from-green-600 to-green-700'; }
        else if (score >= 2) { decision = 'شراء'; emoji = '🟢'; bgColor = 'from-green-700 to-green-800'; }
        else if (score >= -1) { decision = 'انتظار'; emoji = '🟡'; bgColor = 'from-yellow-600 to-yellow-700'; }
        else { decision = 'ابتعد'; emoji = '🔴'; bgColor = 'from-red-600 to-red-700'; }

        const confidence = Math.min(90, 50 + Math.abs(score) * 10);
        const atr = currentPrice * 0.02;

        document.getElementById('aiResult').innerHTML = `
          <div class="space-y-3 mb-4">
            <!-- Decision -->
            <div class="rounded-xl p-4 text-center bg-gradient-to-r ${bgColor}">
              <p class="text-4xl mb-2">${emoji}</p>
              <p class="text-3xl font-bold">${decision}</p>
              <p class="text-lg mt-1">الثقة: ${confidence}%</p>
            </div>

            <!-- Analysis -->
            <div class="glass rounded-xl p-4">
              <p class="text-sm text-gray-400 mb-2">🧠 التحليل:</p>
              <p class="text-sm">${analysis.join(' | ')}</p>
            </div>

            <!-- Entry Points -->
            <div class="glass rounded-xl p-4">
              <p class="text-sm text-gray-400 mb-2">🎯 نقاط الدخول:</p>
              <div class="grid grid-cols-2 gap-2">
                <div class="bg-blue-900/30 rounded-lg p-2 text-center">
                  <p class="text-xs text-blue-300">📍 دخول</p>
                  <p class="font-bold">${formatPrice(currentPrice)}</p>
                </div>
                <div class="bg-red-900/30 rounded-lg p-2 text-center">
                  <p class="text-xs text-red-300">🛑 وقف</p>
                  <p class="font-bold">${formatPrice(currentPrice - atr * 2)}</p>
                </div>
                <div class="bg-green-900/30 rounded-lg p-2 text-center">
                  <p class="text-xs text-green-300">🎯 هدف 1</p>
                  <p class="font-bold">${formatPrice(currentPrice + atr * 2)}</p>
                </div>
                <div class="bg-green-900/40 rounded-lg p-2 text-center">
                  <p class="text-xs text-green-300">🎯 هدف 2</p>
                  <p class="font-bold">${formatPrice(currentPrice + atr * 4)}</p>
                </div>
              </div>
            </div>
          </div>
        `;
      } else {
        document.getElementById('aiResult').innerHTML = '';
      }

      // Update button
      const btn = document.querySelector('[onclick="toggleAI()"]');
      if (btn) {
        btn.className = `w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 ${aiEnabled ? 'ai-gradient' : 'glass border-2 border-purple-500'}`;
      }
    }

    // Make functions global
    window.selectCoin = selectCoin;
    window.selectPeriod = selectPeriod;
    window.toggleAI = toggleAI;

    // Start
    fetchData();
  </script>
</body>
</html>
